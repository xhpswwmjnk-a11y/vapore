<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Enciclopedia — VaporeLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c18;--glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.1);--accent:#c0420a;--purple:#534AB7;
  --green:#1a7a3a;--text1:#f0f0f0;--text2:#b0b8c8;--text3:#606880;
  --adim:rgba(192,66,10,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text1);font-family:'Geist',sans-serif}

/* HEADER */
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.back-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--glass2);color:var(--text1)}
.header-title{font-family:'Instrument Serif',serif;font-size:20px;flex:1}
.header-count{font-family:'Geist Mono',monospace;font-size:10px;color:#4ade80;background:rgba(26,122,58,0.12);border:1px solid rgba(26,122,58,0.3);padding:4px 10px;border-radius:20px;letter-spacing:1px}

.main{max-width:800px;margin:0 auto;padding:28px 18px 80px}

/* INTRO */
.intro{margin-bottom:28px}
.intro-title{font-family:'Instrument Serif',serif;font-size:32px;margin-bottom:8px}
.intro-sub{color:var(--text3);font-size:14px;line-height:1.6}

/* SEARCH + FILTERS */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;color:var(--text1);font-family:'Geist',sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:.18s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;font-size:12px;color:var(--text3);cursor:pointer;transition:.18s;font-family:'Geist',sans-serif;white-space:nowrap}
.filter-btn:hover{color:var(--text1);border-color:rgba(255,255,255,0.2)}
.filter-btn.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}

/* ARTICLE GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.article-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;padding:20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px}
.article-card:hover{background:var(--glass2);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
.card-cat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase}
.card-title{font-family:'Instrument Serif',serif;font-size:19px;color:var(--text1);line-height:1.3}
.card-preview{font-size:13px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;padding:3px 9px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text3)}
.card-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);margin-left:auto}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--text2);margin-bottom:8px}
.empty-sub{font-size:13px;line-height:1.6}

/* ARTICLE OVERLAY */
.art-ov{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg);overflow-y:auto}
.art-ov.open{display:flex}
.art-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.art-back{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s}
.art-back:hover{background:var(--glass2);color:var(--text1)}
.art-body{max-width:720px;margin:0 auto;padding:32px 20px 80px;width:100%}
.art-cat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.art-title{font-family:'Instrument Serif',serif;font-size:34px;line-height:1.2;margin-bottom:16px;color:var(--text1)}
.art-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--glass-border)}
.art-text{font-size:16px;color:var(--text2);line-height:1.8;white-space:pre-wrap}
.art-text p{margin-bottom:16px}
.art-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:24px 0}
.art-img{width:100%;border-radius:12px;cursor:pointer;transition:.2s}
.art-img:hover{opacity:.85;transform:scale(1.02)}
.art-pdf{display:flex;align-items:center;gap:12px;padding:16px 18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;text-decoration:none;color:var(--text1);transition:.18s;margin-top:20px}
.art-pdf:hover{background:var(--glass2);border-color:var(--accent)}
.art-pdf-icon{font-size:28px}
.art-pdf-info{flex:1}
.art-pdf-name{font-size:14px;font-weight:500}
.art-pdf-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-family:'Geist Mono',monospace;font-size:13px}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← Home</a>
  <div class="header-title">📖 Enciclopedia</div>
  <div class="header-count" id="art-count">0 ARTICOLI</div>
</header>

<main class="main">
  <div class="intro">
    <div class="intro-title">Enciclopedia VaporeLab</div>
    <div class="intro-sub">Approfondimenti, schemi e documenti tecnici sui generatori di vapore.</div>
  </div>

  <div class="search-bar">
    <input class="search-input" id="search" placeholder="🔍  Cerca articoli, argomenti, tag..." oninput="render()">
  </div>

  <div class="filters" id="filters"></div>

  <div id="grid-wrap"></div>
</main>

<!-- ARTICLE OVERLAY -->
<div class="art-ov" id="art-ov">
  <div class="art-header">
    <button class="art-back" onclick="closeArticle()">← Indietro</button>
  </div>
  <div class="art-body" id="art-body"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const JSON_URL = 'docs/articoli.json';
let articles = [];
let activeFilter = 'Tutti';

async function loadArticles() {
  document.getElementById('grid-wrap').innerHTML = '<div class="loading">Caricamento articoli...</div>';
  try {
    const res = await fetch(JSON_URL + '?t=' + Date.now());
    articles = await res.json();
    buildFilters();
    render();
  } catch(e) {
    document.getElementById('grid-wrap').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Nessun articolo disponibile</div><div class="empty-sub">Gli articoli verranno pubblicati a breve.</div></div>';
  }
  document.getElementById('art-count').textContent = articles.length + ' ARTICOLI';
}

function buildFilters() {
  const cats = ['Tutti', ...new Set(articles.map(a => a.categoria).filter(Boolean))].sort((a,b) => a==='Tutti'?-1:b==='Tutti'?1:a.localeCompare(b));
  const wrap = document.getElementById('filters');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-btn${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  buildFilters();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = articles.filter(a => {
    const matchCat = activeFilter === 'Tutti' || a.categoria === activeFilter;
    const matchQ = !q ||
      a.titolo.toLowerCase().includes(q) ||
      (a.testo||'').toLowerCase().includes(q) ||
      (a.tags||[]).some(t => t.toLowerCase().includes(q)) ||
      (a.categoria||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const wrap = document.getElementById('grid-wrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nessun risultato</div><div class="empty-sub">Prova con altre parole chiave o cambia il filtro.</div></div>';
    return;
  }

  wrap.innerHTML = '<div class="grid">' + filtered.map(a => `
    <div class="article-card" onclick="openArticle('${a.id}')">
      <div class="card-cat">${a.categoria || '—'}</div>
      <div class="card-title">${a.titolo}</div>
      ${a.testo ? `<div class="card-preview">${a.testo.substring(0,120)}...</div>` : ''}
      <div class="card-footer">
        ${(a.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
        <span class="card-badge">${a.immagini?.length ? '🖼️ '+a.immagini.length : ''}${a.pdf ? ' 📄' : ''}</span>
      </div>
    </div>
  `).join('') + '</div>';
}

function openArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;

  const imgsHtml = a.immagini?.length
    ? `<div class="art-images">${a.immagini.map(img =>
        `<img class="art-img" src="${img.url}" alt="${img.didascalia||''}" onclick="openLightbox('${img.url}')" title="${img.didascalia||''}">`
      ).join('')}</div>` : '';

  const pdfHtml = a.pdf
    ? `<a class="art-pdf" href="${a.pdf.url}" target="_blank" rel="noopener">
        <div class="art-pdf-icon">📄</div>
        <div class="art-pdf-info">
          <div class="art-pdf-name">${a.pdf.nome || 'Documento PDF'}</div>
          <div class="art-pdf-sub">Tocca per aprire o scaricare</div>
        </div>
        <span style="color:var(--accent);font-size:18px">↗</span>
      </a>` : '';

  const testoHtml = (a.testo||'').split('\n\n').map(p => `<p>${p}</p>`).join('');

  document.getElementById('art-body').innerHTML = `
    <div class="art-cat">${a.categoria || ''}</div>
    <div class="art-title">${a.titolo}</div>
    <div class="art-meta">
      ${(a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="art-text">${testoHtml}</div>
    ${imgsHtml}
    ${pdfHtml}
  `;

  document.getElementById('art-ov').classList.add('open');
  document.getElementById('art-ov').scrollTop = 0;
}

function closeArticle() {
  document.getElementById('art-ov').classList.remove('open');
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeArticle(); closeLightbox(); }
});

loadArticles();
</script>
</body>
</html>
