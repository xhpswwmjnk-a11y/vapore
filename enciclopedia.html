<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Enciclopedia — Vapore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#080c18;--glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);--glass-border:rgba(255,255,255,0.1);--accent:#c0420a;--purple:#534AB7;--green:#1a7a3a;--text1:#f0f0f0;--text2:#b0b8c8;--text3:#606880;--adim:rgba(192,66,10,0.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text1);font-family:'Geist',sans-serif}
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.back-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--glass2);color:var(--text1)}
.header-title{font-family:'Instrument Serif',serif;font-size:20px;flex:1}
.header-count{font-family:'Geist Mono',monospace;font-size:10px;color:#4ade80;background:rgba(26,122,58,0.12);border:1px solid rgba(26,122,58,0.3);padding:4px 10px;border-radius:20px;letter-spacing:1px}
.main{max-width:800px;margin:0 auto;padding:28px 18px 80px}
.intro{margin-bottom:28px}
.intro-title{font-family:'Instrument Serif',serif;font-size:32px;margin-bottom:8px}
.intro-sub{color:var(--text3);font-size:14px;line-height:1.6}
.search-bar{margin-bottom:14px}
.search-input{width:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;color:var(--text1);font-family:'Geist',sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:.18s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;font-size:12px;color:var(--text3);cursor:pointer;transition:.18s;font-family:'Geist',sans-serif;white-space:nowrap}
.filter-btn:hover{color:var(--text1);border-color:rgba(255,255,255,0.2)}
.filter-btn.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.article-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;padding:20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:10px}
.article-card:hover{background:var(--glass2);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
.card-cat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase}
.card-title{font-family:'Instrument Serif',serif;font-size:19px;color:var(--text1);line-height:1.3}
.card-preview{font-size:13px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;padding:3px 9px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text3)}
.card-date{font-size:11px;color:var(--text3);margin-left:auto;font-family:'Geist Mono',monospace}
.state-box{text-align:center;padding:60px 20px;color:var(--text3)}
.state-icon{font-size:48px;margin-bottom:12px}
.state-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--text2);margin-bottom:8px}
.state-sub{font-size:13px;line-height:1.6}
.spinner-ring{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.art-ov{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg);overflow-y:auto}
.art-ov.open{display:flex}
.art-header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.art-back{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s}
.art-back:hover{background:var(--glass2);color:var(--text1)}
.art-body{max-width:720px;margin:0 auto;padding:32px 20px 80px;width:100%}
.art-cat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.art-title{font-family:'Instrument Serif',serif;font-size:34px;line-height:1.2;margin-bottom:16px;color:var(--text1)}
.art-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--glass-border)}
.art-date{font-size:12px;color:var(--text3);font-family:'Geist Mono',monospace;margin-left:auto}
.art-content{font-size:15px;color:var(--text2);line-height:1.8}
.art-content p{margin-bottom:16px}
.art-content h1,.art-content h2{font-family:'Instrument Serif',serif;color:var(--text1);margin:28px 0 12px;line-height:1.2}
.art-content h1{font-size:26px}
.art-content h2{font-size:22px}
.art-content h3{font-size:18px;color:var(--text1);margin:20px 0 8px;font-weight:600}
.art-content strong{color:var(--text1);font-weight:600}
.art-content em{color:var(--accent);font-style:italic}
.art-content code{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:2px 7px;font-family:'Geist Mono',monospace;font-size:13px;color:#a78bfa}
.art-content pre{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;overflow-x:auto;margin:16px 0}
.art-content pre code{background:none;border:none;padding:0;font-size:13px;color:#4ade80}
.art-content blockquote{border-left:3px solid var(--accent);padding:12px 16px;margin:16px 0;background:var(--adim);border-radius:0 10px 10px 0;color:var(--text2)}
.art-content ul,.art-content ol{padding-left:22px;margin-bottom:16px}
.art-content li{margin-bottom:6px;line-height:1.6}
.art-content hr{border:none;border-top:1px solid var(--glass-border);margin:24px 0}
.art-content a{color:var(--accent);text-decoration:none}
.art-content a:hover{text-decoration:underline}
.art-content img{max-width:100%;border-radius:12px;margin:12px 0;cursor:pointer;transition:.2s}
.art-content img:hover{opacity:.85}
.art-content table{width:100%;border-collapse:collapse;margin:20px 0;font-size:14px;border-radius:12px;overflow:hidden}
.art-content thead{background:rgba(192,66,10,0.15)}
.art-content th{padding:12px 14px;text-align:left;font-weight:600;color:var(--accent);font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.5px;border-bottom:1px solid rgba(192,66,10,0.3)}
.art-content td{padding:11px 14px;color:var(--text2);border-bottom:1px solid rgba(255,255,255,0.06)}
.art-content tr:last-child td{border-bottom:none}
.art-content tr:hover td{background:rgba(255,255,255,0.03)}
.art-content tbody tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← Home</a>
  <div class="header-title">📖 Enciclopedia</div>
  <div class="header-count" id="art-count">— ARTICOLI</div>
</header>

<main class="main">
  <div class="intro">
    <div class="intro-title">Enciclopedia VaporeLab</div>
    <div class="intro-sub">Approfondimenti, schemi e documenti tecnici sui generatori di vapore.</div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="search" placeholder="🔍  Cerca articoli, argomenti, tag..." oninput="render()">
  </div>
  <div class="filters" id="filters"></div>
  <div id="grid-wrap"></div>
</main>

<div class="art-ov" id="art-ov">
  <div class="art-header">
    <button class="art-back" onclick="closeArticle()">← Indietro</button>
  </div>
  <div class="art-body" id="art-body"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const REPO = 'xhpswwmjnk-a11y/vapore';
const LABEL = 'pubblicato';
const API = 'https://api.github.com/repos/' + REPO + '/issues?labels=' + LABEL + '&state=open&per_page=100';

marked.setOptions({breaks:true, gfm:true});

let articles = [];
let activeFilter = 'Tutti';

async function loadArticles() {
  document.getElementById('grid-wrap').innerHTML = '<div class="state-box"><div class="spinner-ring"></div><div class="state-sub">Caricamento articoli...</div></div>';
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('GitHub API: ' + res.status);
    const issues = await res.json();
    articles = issues.map(function(issue) {
      var labels = issue.labels.map(function(l){return l.name;}).filter(function(l){return l !== LABEL;});
      var categoria = labels.find(function(l){return !l.startsWith('#');}) || 'Generale';
      var tags = labels.filter(function(l){return l.startsWith('#');}).map(function(l){return l.slice(1);});
      var preview = issue.body ? issue.body.replace(/#{1,6}\s/g,'').replace(/\*{1,2}([^*]+)\*{1,2}/g,'$1').replace(/`[^`]+`/g,'').replace(/\|[^\n]+/g,'').replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/[-*]\s/g,'').trim() : '';
      return {
        id: issue.number,
        titolo: issue.title,
        categoria: categoria,
        tags: tags,
        testo: issue.body || '',
        preview: preview.substring(0,150),
        data: new Date(issue.created_at).toLocaleDateString('it-IT')
      };
    });
    document.getElementById('art-count').textContent = articles.length + ' ARTICOLI';
    buildFilters();
    render();
  } catch(e) {
    document.getElementById('grid-wrap').innerHTML = '<div class="state-box"><div class="state-icon">📭</div><div class="state-title">Nessun articolo disponibile</div><div class="state-sub">Gli articoli verranno pubblicati a breve.</div></div>';
  }
}

function buildFilters() {
  var cats = ['Tutti'].concat(Array.from(new Set(articles.map(function(a){return a.categoria;}))).sort());
  document.getElementById('filters').innerHTML = cats.map(function(c) {
    return '<button class="filter-btn' + (c===activeFilter?' active':'') + '" onclick="setFilter(\'' + c + '\')">' + c + '</button>';
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  buildFilters();
  render();
}

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var filtered = articles.filter(function(a) {
    var matchCat = activeFilter === 'Tutti' || a.categoria === activeFilter;
    var matchQ = !q || a.titolo.toLowerCase().includes(q) || a.testo.toLowerCase().includes(q) || a.tags.some(function(t){return t.toLowerCase().includes(q);}) || a.categoria.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  if (filtered.length === 0) {
    document.getElementById('grid-wrap').innerHTML = '<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">Nessun risultato</div><div class="state-sub">Prova con altre parole chiave.</div></div>';
    return;
  }
  document.getElementById('grid-wrap').innerHTML = '<div class="grid">' + filtered.map(function(a) {
    return '<div class="article-card" onclick="openArticle(' + a.id + ')">' +
      '<div class="card-cat">' + a.categoria + '</div>' +
      '<div class="card-title">' + a.titolo + '</div>' +
      (a.preview ? '<div class="card-preview">' + a.preview + '...</div>' : '') +
      '<div class="card-footer">' + a.tags.slice(0,3).map(function(t){return '<span class="tag">#' + t + '</span>';}).join('') + '<span class="card-date">' + a.data + '</span></div>' +
      '</div>';
  }).join('') + '</div>';
}

function openArticle(id) {
  var a = articles.find(function(x){return x.id===id;});
  if (!a) return;
  var htmlContent = marked.parse(a.testo);
  document.getElementById('art-body').innerHTML =
    '<div class="art-cat">' + a.categoria + '</div>' +
    '<div class="art-title">' + a.titolo + '</div>' +
    '<div class="art-meta">' + a.tags.map(function(t){return '<span class="tag">#' + t + '</span>';}).join('') + '<span class="art-date">' + a.data + '</span></div>' +
    '<div class="art-content">' + htmlContent + '</div>';
  document.querySelectorAll('.art-content img').forEach(function(img){
    img.onclick = function(){openLightbox(img.src);};
  });
  document.getElementById('art-ov').classList.add('open');
  document.getElementById('art-ov').scrollTop = 0;
}

function closeArticle() {
  document.getElementById('art-ov').classList.remove('open');
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeArticle(); closeLightbox(); }
});

loadArticles();
</script>
</body>
</html>
