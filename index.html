<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VAPORE</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#e8820a;
  --accent2:#ff9a2e;
  --adim:rgba(232,130,10,0.18);
  --glass:rgba(255,255,255,0.08);
  --glass2:rgba(255,255,255,0.13);
  --glass-border:rgba(255,255,255,0.18);
  --glass-border2:rgba(255,255,255,0.28);
  --text:#f0f4ff;
  --text2:rgba(240,244,255,0.65);
  --text3:rgba(240,244,255,0.35);
  --green:#4ade80;
  --green-dim:rgba(74,222,128,0.15);
  --red:#f87171;
}
html,body{width:100%;min-height:100%;background:#080c18;color:var(--text);font-family:'Geist',sans-serif;overflow-x:hidden}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── APP ── */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;gap:16px;
  background:rgba(8,12,24,0.6);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;z-index:20;
}
.logo{
  font-family:'Instrument Serif',serif;
  font-size:24px;letter-spacing:1px;color:var(--text);
  flex-shrink:0;
}
.logo em{font-style:italic;color:var(--accent)}




.btn-g:hover,.btn-g:active{
  background:rgba(232,130,10,0.28);
  box-shadow:0 0 24px rgba(232,130,10,0.4);
  transform:translateY(-1px);
}

/* ── MAIN ── */
.main{
  flex:1;padding:40px 24px 80px;
  max-width:760px;width:100%;margin:0 auto;
}

/* intro */
.intro{margin-bottom:36px;text-align:center}
.intro-title{
  font-family:'Instrument Serif',serif;font-size:clamp(32px,5vw,52px);
  line-height:1.1;margin-bottom:10px;
}
.intro-title em{font-style:italic;color:var(--accent)}
.intro-sub{font-size:14px;color:var(--text2);font-weight:300;letter-spacing:.3px}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media(max-width:480px){.grid{grid-template-columns:1fr;gap:10px}}

/* ── CARD ── */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:18px;
  padding:22px 20px 18px;
  cursor:pointer;
  transition:all .22s ease;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;
  text-decoration:none;
  animation:fadeUp .5s ease both;
}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.10s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.20s}
.card:nth-child(5){animation-delay:.25s}
.card:nth-child(6){animation-delay:.30s}
.card:nth-child(7){animation-delay:.35s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Glow top-left */
.card::before{
  content:'';position:absolute;top:-40px;left:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(232,130,10,0.12),transparent 70%);
  pointer-events:none;transition:opacity .3s;opacity:0;
}
.card:hover::before{opacity:1}

/* shine on hover */
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);
  pointer-events:none;border-radius:18px;
  opacity:0;transition:opacity .3s;
}
.card:hover::after{opacity:1}

.card:hover{
  border-color:var(--glass-border2);
  background:var(--glass2);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(232,130,10,.12);
}
.card:active{transform:translateY(0)}

/* stato completato */
.card.done{border-color:rgba(74,222,128,0.25)}
.card.done::before{background:radial-gradient(circle,rgba(74,222,128,0.08),transparent 70%)}
.card.done:hover{box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(74,222,128,.15)}

/* stato in corso */
.card.wip{border-color:rgba(232,130,10,0.3)}

/* top row */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-emoji{font-size:28px;line-height:1;flex-shrink:0}
.card-badge{
  font-family:'Geist Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text3);letter-spacing:1px;
  padding:3px 8px;border-radius:20px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
}
.card.done .card-badge{color:var(--green);background:var(--green-dim);border-color:rgba(74,222,128,0.2)}
.card.wip .card-badge{color:var(--accent);background:var(--adim);border-color:rgba(232,130,10,0.2)}

/* titolo */
.card-title{
  font-family:'Instrument Serif',serif;
  font-size:17px;line-height:1.25;color:var(--text);
  flex:1;
}

/* barra progresso */
.card-bar-wrap{display:flex;flex-direction:column;gap:5px}
.card-bar-row{display:flex;align-items:center;gap:8px}
.card-bar{flex:1;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden}
.card-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .6s ease}
.card.done .card-fill{background:var(--green)}
.card-pct{font-family:'Geist Mono',monospace;font-size:10px;color:var(--text3);min-width:28px;text-align:right}
.card-quiz{font-family:'Geist Mono',monospace;font-size:10px;color:var(--text3)}

/* ── GLOSSARIO ── */
.ov{position:fixed;inset:0;z-index:100;display:none}
.ov.open{display:flex}
.ovb{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.ovp{
  position:absolute;right:0;top:0;bottom:0;width:min(500px,100vw);
  background:rgba(10,14,28,0.97);
  border-left:1px solid var(--glass-border2);
  display:flex;flex-direction:column;
  animation:slin .28s ease;
  backdrop-filter:blur(40px);
}
@keyframes slin{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ovh{
  padding:22px 24px 18px;border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.ovt{font-family:'Instrument Serif',serif;font-size:22px;color:var(--text)}
.ovc{
  width:32px;height:32px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:8px;color:var(--text2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.ovc:hover{border-color:var(--red);color:var(--red)}
.ovs{padding:14px 24px;border-bottom:1px solid var(--glass-border);flex-shrink:0}
.si2{
  width:100%;padding:10px 14px;
  background:var(--glass);border:1px solid var(--glass-border2);
  border-radius:10px;color:var(--text);
  font-family:'Geist',sans-serif;font-size:14px;outline:none;
  transition:border .2s;backdrop-filter:blur(8px);
}
.si2::placeholder{color:var(--text3)}
.si2:focus{border-color:var(--accent)}
.ovf{padding:10px 24px;border-bottom:1px solid var(--glass-border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.fb{
  padding:5px 12px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:20px;color:var(--text3);font-family:'Geist Mono',monospace;
  font-size:9px;letter-spacing:.5px;cursor:pointer;transition:all .18s;text-transform:uppercase;
}
.fb.active,.fb:hover{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.ovl2{padding:8px 24px;border-bottom:1px solid var(--glass-border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.lb{
  width:24px;height:24px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:6px;color:var(--text3);font-family:'Geist Mono',monospace;font-size:9px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.lb.active,.lb:hover{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.ovlist{flex:1;overflow-y:auto;padding:14px 24px;display:flex;flex-direction:column;gap:10px}
.ovlist::-webkit-scrollbar{width:3px}
.ovlist::-webkit-scrollbar-thumb{background:var(--glass-border2);border-radius:2px}
.tc{
  padding:14px 16px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;border-left:2px solid transparent;
  transition:border-color .2s;
}
.tc:hover{border-left-color:var(--accent)}
.tcr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.tcn{font-family:'Instrument Serif',serif;font-size:16px;color:var(--text)}
.tct{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.5px;
  padding:2px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0;
  background:var(--adim);color:var(--accent);border:1px solid rgba(232,130,10,.2);
}
.tct.acque{background:rgba(56,189,248,0.1);color:#38bdf8;border-color:rgba(56,189,248,.2)}
.tct.normativa{background:rgba(167,139,250,0.1);color:#a78bfa;border-color:rgba(167,139,250,.2)}
.tct.sicurezza{background:rgba(74,222,128,0.1);color:#4ade80;border-color:rgba(74,222,128,.2)}
.tct.combustione{background:rgba(251,113,133,0.1);color:#fb7185;border-color:rgba(251,113,133,.2)}
.tct.caldaie{background:rgba(251,191,36,0.1);color:#fbbf24;border-color:rgba(251,191,36,.2)}
.tct.fisica{background:rgba(99,102,241,0.1);color:#818cf8;border-color:rgba(99,102,241,.2)}
.tct.bruciatori{background:rgba(251,113,133,0.12);color:#f87171;border-color:rgba(251,113,133,.25)}
.tct.conduzione{background:rgba(52,211,153,0.1);color:#34d399;border-color:rgba(52,211,153,.2)}
.tcd{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px;font-weight:300}
.tce{font-size:12px;color:var(--text3);border-left:2px solid var(--accent);padding-left:8px;line-height:1.5;font-style:italic}
.nr{text-align:center;padding:40px;color:var(--text3);font-size:13px;font-family:'Geist Mono',monospace}

/* ── BIBLIOTECA ─────────────────────────────────── */


.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:4px 2px}
.lib-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;cursor:pointer;transition:.2s;text-decoration:none;display:flex;flex-direction:column;gap:8px}
.lib-card:hover{background:rgba(255,255,255,0.11);border-color:var(--accent);transform:translateY(-2px)}
.lib-icon{font-size:32px;line-height:1}
.lib-name{font-family:'Instrument Serif',serif;font-size:15px;color:var(--text1);line-height:1.3}
.lib-desc{font-size:12px;color:var(--text3);font-family:'Geist',sans-serif;line-height:1.4}
.lib-tag{display:inline-block;font-size:10px;font-family:'Geist Mono',monospace;padding:2px 7px;border-radius:8px;background:rgba(192,66,10,0.18);color:var(--accent);border:1px solid rgba(192,66,10,0.3)}
.lib-empty{text-align:center;padding:60px 20px;color:var(--text3);font-family:'Geist Mono',monospace;font-size:13px}
.lib-search{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;color:var(--text1);font-family:'Geist',sans-serif;font-size:14px;outline:none;box-sizing:border-box}
.lib-search:focus{border-color:var(--accent)}

.footer{text-align:center;padding:24px 20px 48px;color:var(--text3);font-family:'Geist',sans-serif;font-size:12px}
.footer em{color:var(--accent);font-style:normal}
.footer-cta{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:14px 28px;background:var(--adim);border:1px solid rgba(192,66,10,0.4);border-radius:20px;color:var(--accent);text-decoration:none;font-family:'Geist',sans-serif;font-size:15px;font-weight:600;transition:.2s}
.footer-cta:hover{background:rgba(192,66,10,0.25);border-color:var(--accent);transform:translateY(-2px)}

/* ── IMAGE OVERLAY ─────────────────────────────────────────── */
.img-ov{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.92)}
.img-ov.open{display:flex}
.img-ov-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-ov-close:hover{background:rgba(255,255,255,0.2)}
.img-ov-title{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:#fff;font-family:'Geist',sans-serif;font-size:14px;opacity:.8}
.img-ov img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}

.nav-btns{display:flex;align-items:center;gap:6px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:12px;cursor:pointer;transition:all .18s;text-decoration:none;font-family:'Geist',sans-serif;border:1px solid transparent;background:none}
.nav-btn:hover{transform:translateY(-1px)}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.nav-quiz{background:rgba(83,74,183,0.15);border-color:rgba(83,74,183,0.4)}.nav-quiz .nav-lbl{color:#a78bfa}
.nav-quiz:hover{background:rgba(83,74,183,0.28);border-color:#a78bfa}
.nav-enc{background:rgba(26,122,58,0.12);border-color:rgba(26,122,58,0.4)}.nav-enc .nav-lbl{color:#4ade80}
.nav-enc:hover{background:rgba(26,122,58,0.25);border-color:#4ade80}
.nav-doc{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12)}.nav-doc .nav-lbl{color:#b0b8c8}
.nav-doc:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.25)}
.nav-glos{background:rgba(192,66,10,0.15);border-color:rgba(192,66,10,0.4)}.nav-glos .nav-lbl{color:#c0420a}
.nav-glos:hover{background:rgba(192,66,10,0.25);border-color:var(--accent)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">

<header class="header">
  <div class="logo">Vap<em>o</em>re</div>
  <div class="nav-btns">
    <a href="allenamento.html" class="nav-btn nav-quiz">
      <span class="nav-icon">🎓</span>
      <span class="nav-lbl">QUIZ</span>
    </a>
    <a href="enciclopedia.html" class="nav-btn nav-enc">
      <span class="nav-icon">📖</span>
      <span class="nav-lbl">ENC.</span>
    </a>
    <button class="nav-btn nav-doc" onclick="openLib()">
      <span class="nav-icon">📁</span>
      <span class="nav-lbl">DOC</span>
    </button>
    <button class="nav-btn nav-glos" onclick="openG()">
      <span class="nav-icon">⬡</span>
      <span class="nav-lbl">GLOSS</span>
    </button>
  </div>
</header>

<main class="main">
  <div class="intro">
    <h1 class="intro-title">Generatori<br>di <em>Vapore</em></h1>
    <p class="intro-sub">Seleziona un modulo per iniziare — i progressi sono salvati automaticamente</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer class="footer">
  Le informazioni contenute in questa app sono da considerarsi indicative. <em>Verifica sempre quanto appreso con fonti ufficiali.</em><br>
  <a href="segnalazioni.html" class="footer-cta">📣 Invia una segnalazione</a>
</footer>
</div>

<!-- GLOSSARIO -->
<div class="ov" id="gov">
  <div class="ovb" onclick="closeG()"></div>
  <div class="ovp">
    <div class="ovh">
      <span class="ovt">Glossario</span>
      <button class="ovc" onclick="closeG()">✕</button>
    </div>
    <div class="ovs"><input class="si2" id="gsrch" placeholder="Cerca termine o definizione..." oninput="rg()"></div>
    <div class="ovf">
      <button class="fb active" onclick="sc('all',this)">Tutti</button>
      <button class="fb" onclick="sc('termodinamica',this)">🌡️ Termodin.</button>
      <button class="fb" onclick="sc('combustione',this)">🔥 Combustione</button>
      <button class="fb" onclick="sc('caldaie',this)">⚙️ Caldaie</button>
      <button class="fb" onclick="sc('sicurezza',this)">🛡️ Sicurezza</button>
      <button class="fb" onclick="sc('normativa',this)">📋 Normativa</button>
      <button class="fb" onclick="sc('acque',this)">💧 Acque</button>
      <button class="fb" onclick="sc('fisica',this)">📐 Fisica</button>
      <button class="fb" onclick="sc('conduzione',this)">🕹️ Conduzione</button>
    </div>
    <div class="ovl2" id="glets"></div>
    <div class="ovlist" id="glist"></div>
  </div>
</div>

<!-- BIBLIOTECA -->
<div class="ov" id="libov">
  <div class="ovb" onclick="closeLib()"></div>
  <div class="ovp">
    <div class="ovh">
      <span class="ovt">📁 Documenti utili</span>
      <button class="ovc" onclick="closeLib()">✕</button>
    </div>
    <div class="ovs">
      <input class="lib-search" id="libsrch" placeholder="Cerca documento..." oninput="renderLib()">
    </div>
    <div class="ovlist" id="liblist" style="padding-top:8px"></div>
  </div>
</div>



<script>
const MDS=[
  {id:1,name:"Termodinamica del Vapore",icon:"🌡️",file:"modulo1_termodinamica.html"},
  {id:2,name:"Combustione e Combustibili",icon:"🔥",file:"modulo2_combustione.html"},
  {id:3,name:"Costruzione Caldaie",icon:"⚙️",file:"modulo3_costruzione.html"},
  {id:4,name:"Sicurezze e Dispositivi",icon:"🛡️",file:"modulo4_sicurezze.html"},
  {id:5,name:"Normativa e Patenti",icon:"📋",file:"modulo5_normativa.html"},
  {id:6,name:"Trattamento Acque",icon:"💧",file:"modulo6_acque.html"},
  {id:7,name:"Rendimento ed Efficienza",icon:"📈",file:"modulo7_rendimento.html"},
  {id:8,name:"Fisica e Misure",icon:"📐",file:"modulo8_fisica.html"},
  {id:9,name:"Sicurezza sul Lavoro",icon:"🦺",file:"modulo9_sicurezza.html"},
  {id:10,name:"Conduzione e Avviamento",icon:"🕹️",file:"modulo10_conduzione.html"},
];

function goTo(n){window.location.href=MDS[n-1].file;}
function gm(n){try{const r=localStorage.getItem('vlm'+n);return r?JSON.parse(r):{stato:'non_iniziato',pct:0,quiz_punteggio:null};}catch{return{stato:'non_iniziato',pct:0,quiz_punteggio:null};}}

function buildGrid(){
  const html=MDS.map(m=>{
    const d=gm(m.id);
    const cls=d.stato==='completato'?'done':d.stato==='in_corso'?'wip':'';
    const badgeT=d.stato==='completato'?'✓ Completato':d.stato==='in_corso'?'In corso':'0'+m.id;
    const quizT=d.quiz_punteggio!==null?'Quiz '+d.quiz_punteggio+'/10':'Quiz non svolto';
    return`<div class="card ${cls}" onclick="goTo(${m.id})">
      <div class="card-top">
        <span class="card-emoji">${m.icon}</span>
        <span class="card-badge">${badgeT}</span>
      </div>
      <div class="card-title">${m.name}</div>
      <div class="card-bar-wrap">
        <div class="card-bar-row">
          <div class="card-bar"><div class="card-fill" style="width:${d.pct}%"></div></div>
          <span class="card-pct">${d.pct}%</span>
        </div>
        <div class="card-quiz">${quizT}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('grid').innerHTML=html;
}

// GLOSSARIO
const GL=[
  {term:"Calore sensibile",cat:"termodinamica",def:"Energia che varia la temperatura senza cambio di stato. Q=m·c·ΔT. Acqua: c=1 kcal/kg·°C",ex:"1 kg acqua da 0°C a 100°C = 100 kcal"},
  {term:"Calore latente",cat:"termodinamica",def:"Energia assorbita nel cambio di stato a T costante. A 1 bar: 540 kcal/kg. Decresce con la pressione",ex:"A 10 bar scende a 478 kcal/kg"},
  {term:"Calore specifico",cat:"termodinamica",def:"Energia per alzare di 1°C 1 kg di sostanza. Acqua=1, Nafta=0,5, Acciaio=0,115 kcal/kg·°C",ex:"La nafta si scalda il doppio più veloce dell'acqua"},
  {term:"Entalpia",cat:"termodinamica",def:"Contenuto energetico totale del fluido per unità di massa (kcal/kg o kJ/kg). h = u + Pv",ex:"Vapore saturo secco a 10 bar: h=664 kcal/kg"},
  {term:"Entalpia acqua di alimento",cat:"termodinamica",def:"h_a ≈ T[°C] fino a ~120°C. Approssimazione pratica valida per calcoli rapidi",ex:"Acqua a 80°C → h_a ≈ 80 kcal/kg"},
  {term:"Entalpia vapore saturo umido",cat:"termodinamica",def:"h_u = (1-X)·h_l + X·h_v. Media pesata sul titolo tra liquido e vapore secco",ex:"X=0,9 a 10 bar: h=(0,1×186)+(0,9×664)=616 kcal/kg"},
  {term:"Entropia",cat:"termodinamica",def:"Misura del disordine termodinamico. ΔS=Q/T [kJ/K]. Aumenta sempre nei processi irreali",ex:"Espansione isentropica in turbina ideale: ΔS=0 (linea verticale sul diagramma h-s)"},
  {term:"Temperatura di saturazione",cat:"termodinamica",def:"T alla quale acqua bolle alla pressione data. 100°C a 1 bar, 184°C a 10 bar, 212°C a 20 bar",ex:"Manometro segna 9 bar → P_ass=10 bar → T_sat=184°C"},
  {term:"Pressione critica",cat:"termodinamica",def:"221 bar e 374°C: oltre questi valori non esiste distinzione liquido/vapore (stato supercritico)",ex:"Sopra 221 bar non c'è ebollizione visibile: il fluido passa direttamente da liquido a vapore"},
  {term:"Punto critico",cat:"termodinamica",def:"Condizione in cui densità liquido e vapore si equalizzano. P=221 bar, T=374°C, ρ=322 kg/m³",ex:"Caldaie supercritiche (>221 bar) eliminano il drum di separazione vapore/acqua"},
  {term:"Flash evaporation",cat:"termodinamica",def:"Vaporizzazione istantanea per calo brusco di pressione. Formula: Vap.flash=(h_l1-h_l2)/r_medio",ex:"A 10 bar → rottura → 1 bar: ~17% dell'acqua vaporizza in millisecondi"},
  {term:"Calore latente di fusione",cat:"termodinamica",def:"Energia per trasformare ghiaccio in acqua a 0°C: 80 kcal/kg. Molto meno del latente di vaporizzazione (540 kcal/kg)",ex:"Il calore latente di vaporizzazione è 6,75 volte quello di fusione"},
  {term:"Titolo del vapore (X)",cat:"termodinamica",def:"X = m_vapore_secco / m_totale. Varia tra 0 (liquido saturo) e 1 (vapore saturo secco)",ex:"X<0,92 in turbina: le gocce erodono le palette. X=0,90 significa 10% acqua nel vapore"},
  {term:"Vapore saturo secco",cat:"termodinamica",def:"X=1: tutto il calore latente assorbito, nessuna goccia residua. T uguale alla T_sat alla pressione data",ex:"Vapore saturo secco a 10 bar: T=184°C, h=664 kcal/kg"},
  {term:"Vapore saturo umido",cat:"termodinamica",def:"Miscela acqua-vapore in equilibrio. 0<X<1. Coesistenza delle due fasi alla stessa T e P di saturazione",ex:"Normale in caldaia durante la vaporizzazione: il drum separa le due fasi"},
  {term:"Vapore surriscaldato",cat:"termodinamica",def:"Vapore riscaldato oltre T_sat a P costante. Maggiore entalpia disponibile. Ideale per le turbine",ex:"T_sat a 10 bar = 184°C → vapore surriscaldato a 300°C ha h molto più alta"},
  {term:"Liquido saturo",cat:"termodinamica",def:"Acqua al punto esatto di ebollizione, X=0. Pronta a vaporizzare ma ancora tutta liquida",ex:"A 10 bar: liquido saturo a 184°C, h_l=186 kcal/kg"},
  {term:"Principio zero",cat:"termodinamica",def:"Se A è in equilibrio termico con C e B è in equilibrio con C → A e B sono in equilibrio tra loro",ex:"Base logica della misurazione della temperatura con il termometro"},
  {term:"Primo principio",cat:"termodinamica",def:"L'energia si conserva: non si crea né si distrugge. Per sistemi aperti: Q-W=ΔH",ex:"Tutto il calore del combustibile finisce nel vapore o nelle perdite"},
  {term:"Secondo principio",cat:"termodinamica",def:"Impossibile convertire tutto il calore in lavoro. Parte va ceduta alla sorgente fredda",ex:"Rendimento Carnot = 1 - T_cold/T_hot. Limite insuperabile per qualsiasi macchina termica"},
  {term:"Ciclo Rankine",cat:"termodinamica",def:"Ciclo termodinamico delle centrali a vapore: 1)Pompa 2)Caldaia 3)Turbina 4)Condensatore",ex:"Rendimento tipico 25-45%. Migliora aumentando T vapore e abbassando T condensatore"},
  {term:"Rendimento di Carnot",cat:"termodinamica",def:"η_Carnot = 1 - T_cold/T_hot (T in Kelvin). Limite teorico massimo per qualsiasi macchina tra due sorgenti",ex:"Caldaia 400°C (673K), condensatore 30°C (303K): η_Carnot = 1 - 303/673 = 55%"},
  {term:"Diagramma di Mollier",cat:"termodinamica",def:"Grafico entalpia vs entropia (h-s). Mostra zone liquido, saturo, surriscaldato. Espansione isentropica = linea verticale",ex:"Standard per analisi cicli a vapore e calcolo lavoro delle turbine"},
  {term:"Ebullioscopia",cat:"termodinamica",def:"Innalzamento punto di ebollizione per sali disciolti. ΔT = K_b × m (K_b=0,512 °C·kg/mol per acqua)",ex:"Acqua salina in caldaia bolle a T leggermente superiore a quella delle tavole del vapore"},
  {term:"Tonalità termica",cat:"termodinamica",def:"τ = Hi / (1+L₀) kcal/kg miscela. Spiega perché combustibili diversi danno T di fiamma simili",ex:"Metano: τ≈657, Carbone: τ≈625. Differenza piccola nonostante grandi differenze di Hi"},
  {term:"Potere calorifico inferiore (Hi)",cat:"combustione",def:"Calore con H₂O nei fumi allo stato gassoso. SI USA SEMPRE per il rendimento nelle caldaie convenzionali",ex:"Metano: Hi=8.570 kcal/Nm³. Non include calore latente dell'acqua prodotta"},
  {term:"Potere calorifico superiore (Hs)",cat:"combustione",def:"Calore con H₂O nei fumi condensata. Hs > Hi. Differenza ~10% per metano, ~6% per nafta",ex:"Solo le caldaie a condensazione usano Hs come riferimento (recuperano il latente)"},
  {term:"Aria teorica stechiometrica (L₀)",cat:"combustione",def:"Quantità minima d'aria per combustione completa. L₀=(1/0,232)×(8/3·C+8·H+S-O)",ex:"Metano: 17,2 kg/kg = 9,52 Nm³/Nm³. Nafta: 13,8 kg/kg"},
  {term:"Indice d'aria (n)",cat:"combustione",def:"n = L_reale / L₀. n=1: stechiometrico. n>1: eccesso d'aria",ex:"n=1,15 → eccesso d'aria = 15%. Da O₂: e% = O₂%/(21-O₂%)×100"},
  {term:"Eccesso d'aria ottimale",cat:"combustione",def:"Metano: O₂=1-2% nei fumi. Nafta: O₂=2-3%. Carbone: O₂=3-5%. Ogni 1% in più: -0,02% rendimento",ex:"Eccesso 20% invece di 10% ottimale: perde ~4 kW per ogni MW di potenza nominale"},
  {term:"Formula di Hassenstein",cat:"combustione",def:"P_camino% = K×(T_fumi-T_aria)/CO₂%. K: metano=0,46, nafta=0,58, carbone=0,65",ex:"Metano, T_fumi=220°C, T_aria=20°C, CO₂=9%: P=0,46×200/9=10,2%"},
  {term:"Combustione completa",cat:"combustione",def:"Tutto il C→CO₂. Nessun CO. Serve eccesso d'aria sufficiente e buona miscelazione",ex:"C+O₂→CO₂+8.130 kcal/kg. Massima resa energetica dal carbonio"},
  {term:"Combustione incompleta",cat:"combustione",def:"Parte C→CO (2.449 kcal/kg = 30% della completa). CO tossico, 200 ppm già pericoloso",ex:"Perdita del 70% dell'energia del carbonio + rischio intossicazione letale a 1.600 ppm"},
  {term:"Analizzatore di combustione",cat:"combustione",def:"Misura: T_fumi, O₂%, CO(ppm), NO, SO₂. Calcola automaticamente rendimento% e perdite%",ex:"Marche: Testo 300-330, Wöhler, Kane. Calibrazione annuale obbligatoria per misure ufficiali"},
  {term:"Apparecchio di Orsat",cat:"combustione",def:"Misura CO₂, O₂, CO nei fumi anidri. Tre soluzioni: KOH(CO₂), Pirogallolo(O₂), CuCl(CO). N₂ per differenza",ex:"Metodo di riferimento. Analizzatori elettronici moderni più rapidi ma richiedono taratura con Orsat"},
  {term:"Triangolo di Ostwald",cat:"combustione",def:"Grafico CO₂% vs O₂%. Mostra zona combustione completa e zona con CO. CO₂ max: metano 11,7%, gasolio 15,4%",ex:"Identifica CO nei fumi senza misurarlo direttamente, da CO₂ e O₂"},
  {term:"CO₂ massima di combustione",cat:"combustione",def:"Valore CO₂ con n=1 (stechiometrica): metano 11,7%, gasolio 15,4%, nafta 15,8%, carbone ~20%",ex:"Valori misurati inferiori indicano eccesso d'aria. È il punto massimo sul triangolo di Ostwald"},
  {term:"Calorimetro di Junkers",cat:"combustione",def:"Misura Hs dei combustibili GASSOSI a pressione costante. Gas→camera combustione→scambiatore→acqua raffreddamento",ex:"Hs,p = (m_acqua×c×ΔT + Q_condensazione) / V_gas"},
  {term:"Bomba di Mahler",cat:"combustione",def:"Misura Hs di combustibili SOLIDI e LIQUIDI a volume costante in O₂ puro a 25-30 bar",ex:"Strumento di laboratorio di massima precisione per analisi certificazione combustibili"},
  {term:"Punto di infiammabilità",cat:"combustione",def:"T minima alla quale i vapori formano miscela infiammabile con fonte di innesco esterna. Nafta: max 65°C per legge",ex:"Non è T di autoaccensione (molto più alta). Motivo per cui i serbatoi nafta devono essere ventilati"},
  {term:"Temperatura di autoaccensione",cat:"combustione",def:"T alla quale il combustibile si accende spontaneamente senza sorgente esterna. Metano: ~537°C, Gasolio: ~250°C",ex:"Importante per valutare rischi in zone calde dell'impianto (superfici a >250°C vicino a gasolio)"},
  {term:"Viscosità in gradi Engler",cat:"combustione",def:"°E = t_combustibile/t_acqua nel viscosimetro a 50°C. Ottimale atomizzazione: 3-5°E",ex:"Nafta BTZ: 7-15°E. Nafta ATZ densa: 15-40°E. Preriscaldo a 90-120°C per raggiungere 3-5°E"},
  {term:"Viscosità dinamica",cat:"combustione",def:"μ [Pa·s o mPa·s]. Resistenza interna al flusso. Acqua 20°C: 1 mPa·s. Nafta 50°C: 50-500 mPa·s",ex:"Alta viscosità = gocce grandi = atomizzazione scadente = incombusti e fuliggine"},
  {term:"Atomizzazione",cat:"combustione",def:"Riduzione del combustibile liquido in goccioline 10-100 µm per massimizzare la superficie di vaporizzazione",ex:"Tipi: pressione meccanica (20-50 bar), vapore (steam atomization), aria compressa, rotativa"},
  {term:"LEL e UEL",cat:"combustione",def:"Limite inferiore ed superiore di esplosività. Metano: LEL=5%, UEL=15% in aria",ex:"Rilevatori di gas devono allarmare al 20% del LEL = 1% vol. metano in aria"},
  {term:"NOx",cat:"combustione",def:"Ossidi di azoto formati da N₂+O₂ a T>1.300°C. Formazione esponenziale oltre 1.300°C",ex:"Limite tipico: 100-200 mg/Nm³ per nuovi impianti. Riduzione: bruciatori low-NOx, ricircolo fumi"},
  {term:"Tiraggio naturale",cat:"combustione",def:"Δp[mmH₂O] = H×(353/T_aria - 353/T_fumi). Aumenta con camino alto, fumi caldi, aria fredda",ex:"H=15m, T_fumi=473K, T_aria=283K: Δp=8,6 mmH₂O=84 Pa"},
  {term:"Tiraggio bilanciato",cat:"combustione",def:"Sistema con ventilatore aria + ventilatore fumi. Camera a -2÷-5 Pa. Standard industriale moderno",ex:"Nessuna infiltrazione aria falsa + nessuna fuga di fumi. Controllato con deprimometro"},
  {term:"Purgatura camera combustione",cat:"combustione",def:"Obbligatoria prima di ogni accensione: ≥30 secondi con ventilatore ≥30%. Elimina gas residui",ex:"Senza purga: deflagrazione o detonazione all'accensione. Reato omettere la purga"},
  {term:"Deflagrazione",cat:"combustione",def:"Propagazione fronte di fiamma a velocità subsonica (<340 m/s). Sovrapressione contenuta",ex:"Meno distruttiva della detonazione. Tipica dell'accumulo di gas in un locale chiuso"},
  {term:"Detonazione",cat:"combustione",def:"Propagazione supersonica (1.500-3.000 m/s) con onda d'urto. Sovrapressione 15-30 bar in microsecondi",ex:"Estremamente distruttiva. In camera di combustione può causare danni strutturali immediati"},
  {term:"Fuliggine",cat:"combustione",def:"Deposito di C e idrocarburi incombusti sui tubi. λ=0,1 W/m·K (500× più isolante dell'acciaio)",ex:"1 mm fuliggine: +20-30°C T_fumi, -2-3% rendimento, rischio incendio nei condotti"},
  {term:"Temperatura adiabatica",cat:"combustione",def:"T massima teorica dei fumi senza perdite. Metano: ~2.000°C, Gasolio: ~2.100°C con aria a 20°C",ex:"T reale in camera 1.200-1.600°C per irraggiamento, eccesso aria, raffreddamento ad acqua"},
  {term:"Odorizzazione gas",cat:"combustione",def:"Il metano naturale è inodore: viene odorizzato con THT (tetraidrotiofen). Obbligatoria per legge",ex:"Senza odorizzazione una perdita di gas non viene avvertita fino a concentrazioni pericolose"},
  {term:"Metano vs GPL sicurezza",cat:"combustione",def:"Metano: densità 0,717 kg/Nm³, più leggero dell'aria→rilevatori in ALTO. GPL: più pesante→rilevatori in BASSO",ex:"Errore nella posizione dei rilevatori = rischio esplosione non rilevata"},
  {term:"Caldaia Cornovaglia",cat:"caldaie",def:"Tubi di fumo, focolare interno, grande volume (~200 L/m²), P_max=15 bar, elastica, avviamento 2-3 ore",ex:"Livello minimo acqua: 8 cm sopra superficie riscaldamento. Focolare ondulato Morrison: +10% scambio"},
  {term:"Caldaia B&W",cat:"caldaie",def:"Babcock&Wilcox: tubi d'acqua, piccolo volume (~70 L/m²), P illimitata, avviamento 20-30 min, \"non esplodente\"",ex:"Brevettata 1867. Riser sale per galleggiamento, downcomer scende per densità: circolazione naturale"},
  {term:"Caldaia a tre giri di fumo",cat:"caldaie",def:"Fumi percorrono: focolare→tubi inferiori→tubi superiori→camino. Rendimento 84-87%. La più diffusa in Italia",ex:"Turbolatori nei tubi fumogeni: +20-30% scambio termico, +10-20% perdite di carico"},
  {term:"Caldaia a ritorno di fiamma",cat:"caldaie",def:"Focolare con fondo cieco: inversione dei gas all'interno. Compatta, stesse prestazioni del tre giri",ex:"Molto diffusa nelle versioni 500 kg/h - 5 t/h. Nessuna camera di inversione esterna"},
  {term:"Caldaia HRSG",cat:"caldaie",def:"Heat Recovery Steam Generator: recupera calore fumi di turbogas (500-600°C) senza combustione",ex:"Usata nei cicli combinati. Rendimento elettrico totale impianto: 55-60%"},
  {term:"Caldaia monotobolure",cat:"caldaie",def:"Acqua percorre un unico tubo a serpentino, circolazione forzata. Avviamento in 3-5 min. Pompa: 110% producibilità",ex:"Sensibilissima alle incrostazioni: 1 mm nel tubo unico = rischio surriscaldamento e rottura"},
  {term:"Corpo cilindrico",cat:"caldaie",def:"Serbatoio principale in pressione dove avviene la separazione vapore/acqua. La parte più critica per la sicurezza",ex:"Spessore minimo: s=(P·D)/(2·σ_amm·η)+c. Coefficiente giuntura η=1,0 con controllo radiografico 100%"},
  {term:"Fasciame e virole",cat:"caldaie",def:"Il cilindro è costruito da anelli (virole) saldati longitudinalmente e poi uniti con giunti circolari",ex:"Coefficiente giuntura η: 1,0 (radiografia 100%), 0,85 (parziale), 0,70 (non controllata)"},
  {term:"Focolare ondulato Morrison",cat:"caldaie",def:"Focolare con profilo ondulato: +10% superficie scambio, maggiore resistenza al collasso, migliore dilatazione",ex:"Alternativa al focolare liscio. Standard nelle Cornovaglie moderne per sicurezza strutturale"},
  {term:"Drum superiore (steam drum)",cat:"caldaie",def:"Collettore superiore caldaia B&W: separa vapore/acqua tramite cicloni interni. Accumula vapore saturo secco",ex:"Dotato di passi d'uomo per ispezione. Dallo spurgo di fondo si rimuovono i fanghi"},
  {term:"Drum inferiore (mud drum)",cat:"caldaie",def:"Collettore inferiore caldaia B&W: raccoglie l'acqua dai downcomer. Zona accumulo fanghi e spurgo di fondo",ex:"Da qui avviene lo spurgo di fondo per rimuovere i depositi sedimentati"},
  {term:"Piastre tubiere",cat:"caldaie",def:"Pareti terminali del corpo cilindrico, attraversate dai tubi fumogeni. Le parti più sollecitate strutturalmente",ex:"Collegamento tubi-piastra: mandrinatura (espansione meccanica) e/o saldatura. Spessore 25-50 mm"},
  {term:"Duomo",cat:"caldaie",def:"Camera a cupola sulla sommità del corpo cilindrico. Raccoglie vapore più secco per bassa velocità e distanza dalla superficie",ex:"Ogni generatore deve avere valvola di presa vapore. P>6 bar: valvola automatica a distanza obbligatoria"},
  {term:"Passo d'uomo",cat:"caldaie",def:"Apertura per accesso interno. Dimensioni minime: 300×400 mm (ellittico) o Ø400 mm (circolare)",ex:"Tipo autoclave: la pressione aumenta la tenuta. Va aperto SOLO a pressione = zero"},
  {term:"Pareti membranate",cat:"caldaie",def:"Tubi verticali saldati da piattine di acciaio → parete stagna e raffreddata ad acqua. No muratura refrattaria",ex:"Vantaggi: tenuta totale (no aria falsa), avviamento rapido, massima superficie scambio, manutenzione minima"},
  {term:"Circolazione naturale",cat:"caldaie",def:"Downcomer (acqua densa→scende) + Riser (miscela vapore-acqua→sale per Archimede). No pompe",ex:"Diventa meno efficace ad alta pressione (densità liquido/vapore si avvicinano al punto critico)"},
  {term:"Circolazione La Mont",cat:"caldaie",def:"Circolazione assistita con pompa La Mont. Permette geometrie flessibili, funziona bene ad alta P",ex:"Usata per caldaie industriali di grande potenza (>20-30 t/h) e alte pressioni"},
  {term:"Surriscaldatore",cat:"caldaie",def:"Fascio tubiero che porta il vapore oltre T_sat a P costante. Posizionato nelle zone più calde dei fumi",ex:"Protetto dal naso refrattario (schermatura dall'irraggiamento diretto della fiamma)"},
  {term:"Risurriscaldatore",cat:"caldaie",def:"Riscalda il vapore parzialmente espanso nella turbina prima del secondo stadio di espansione",ex:"Aumenta il rendimento del ciclo Rankine e mantiene il titolo >0,92 negli stadi finali"},
  {term:"Economizzatore",cat:"caldaie",def:"Scambiatore che recupera calore fumi per preriscaldare l'acqua di alimento. Deve lavorare in subcooling (T_uscita < T_sat-5°C)",ex:"Ogni 10°C di preriscaldo: +0,5% rendimento. Payback tipico 1-3 anni"},
  {term:"LUVO (preriscaldatore aria)",cat:"caldaie",def:"Preriscalda l'aria comburente con i fumi. Tipo Ljungström: cestello rotante (2-6 giri/min)",ex:"Ogni 10°C di preriscaldo aria: +0,5% rendimento. Rischio: condensazione acida sotto il punto di rugiada"},
  {term:"Turbolatori",cat:"caldaie",def:"Barre in acciaio inox attorcigliate a elica nei tubi fumogeni. Aumentano il numero di Reynolds",ex:"+20-30% coefficiente di scambio, +10-20% perdite di carico. Estraibili per la pulizia"},
  {term:"Subcooling",cat:"caldaie",def:"Condizione acqua sotto la T di saturazione. Nell'economizzatore: T_uscita = T_sat - 5°C minimo",ex:"Se l'acqua raggiunge T_sat nell'economizzatore: bolle → colpi d'ariete → surriscaldamento parete"},
  {term:"Decapaggio chimico",cat:"caldaie",def:"Rimozione incrostazioni con HCl 3-5% + inibitore di corrosione. Seguito da passivazione",ex:"Ogni 3-7 anni o quando il rendimento cala significativamente. Eseguire da ditte specializzate"},
  {term:"Passivazione",cat:"caldaie",def:"Formazione strato protettivo magnetite (Fe₃O₄) a pH 10-11, O₂ basso, T alta. 3Fe+4H₂O→Fe₃O₄+4H₂",ex:"Protegge l'acciaio dalla corrosione. Da eseguire dopo decapaggio e prima messa in servizio nuova caldaia"},
  {term:"Conservazione umida",cat:"caldaie",def:"Caldaia ferma riempita completamente con acqua alcalina pH 11-12 + ossigeno scavenger (N₂H₄)",ex:"Per fermi fino a 6 mesi. Nessun contatto aria = nessuna corrosione da ossigeno"},
  {term:"Conservazione a secco",cat:"caldaie",def:"Caldaia ferma svuotata, asciugata, atmosfera interna secca con silica gel o azoto",ex:"Per fermi oltre 6 mesi. Lato fumi: pulire fuliggine + sigillare condotti"},
  {term:"Producibilità specifica",cat:"caldaie",def:"PS = W/A_riscaldamento [kg_vapore/m²·h]. Cornovaglia: 25-30. Tre giri: 30-50. B&W: 20-100 kg/m²h",ex:"La superficie si misura DAL LATO FUMI (diametro esterno tubi × lunghezza)"},
  {term:"Prodotto P×V",cat:"caldaie",def:"P_bollo[kg/cm²] × Volume[litri]. >30.000: 1ª cat.→patente 2°. 8.000-30.000: 2ª cat.→patente 1°",ex:"Esempio: P=12 bar, V=3.000L → P×V=36.000 → 1ª categoria → patente di 2° grado"},
  {term:"Incrostazione calcarea",cat:"caldaie",def:"CaCO₃ sulle superfici riscaldanti. λ=0,9 W/m·K (55× più isolante dell'acciaio)",ex:"1 mm: +20-30°C parete, -2-3% rendimento. 3 mm: >50°C, >5% perdita. Rischio deformazione focolare"},
  {term:"Colpo d'ariete",cat:"caldaie",def:"Condensazione istantanea del vapore in sacche di condensa → riduzione volume 1.725× in millisecondi → urto violento",ex:"Causa: tubazioni con pendenza errata, apertura brusca valvole, scaricatori guasti. Prevenzione: pendenza 1%"},
  {term:"Priming",cat:"caldaie",def:"Trascinamento goccioline d'acqua nel vapore. Cause: TDS alto (tensione superficiale bassa), livello troppo alto, aumento brusco prelievo",ex:"Effetti: colpi d'ariete, depositi di sali negli scambiatori, erosione palette turbine"},
  {term:"Volume specifico vapore",cat:"caldaie",def:"v=1/ρ [m³/kg]. A 1 bar: v_vapore=1,671 m³/kg (vs acqua 0,001044). A 10 bar: v_vapore=0,194 m³/kg",ex:"Rapporto v_vapore/v_acqua: 1.600× a 1 bar, 172× a 10 bar. Diminuisce con la pressione"},
  {term:"Valvola di sicurezza",cat:"sicurezza",def:"Dispositivo meccanico di scarico: si apre automaticamente quando P supera la taratura. Almeno 2 per generatore, Ø_min=25mm",ex:"Scarico all'esterno obbligatorio per producibilità >2 t/h. Non intercettabili durante l'esercizio"},
  {term:"Valvola a molla diretta",cat:"sicurezza",def:"Tipo più diffuso di valvola di sicurezza. La molla compressa carica l'otturatore. Taratura con vite + piombatura",ex:"Compatta, affidabile, non sensibile alle vibrazioni. Usata nella quasi totalità delle caldaie industriali"},
  {term:"Manometro",cat:"sicurezza",def:"Fondo scala: 1,25-2× pressione di bollo. Segno rosso sulla P di bollo. Collegato con sifone (tubo a U pieno d'acqua)",ex:"Il sifone protegge il manometro dal vapore caldo e dalle pulsazioni di pressione"},
  {term:"PSHH (Pressure Switch High High)",cat:"sicurezza",def:"Pressostato di blocco: ferma il bruciatore se P supera il limite di sicurezza. Riarmo MANUALE obbligatorio",ex:"Indipendente elettricamente e meccanicamente dal pressostato di regolazione"},
  {term:"LSHH (Level Switch High High)",cat:"sicurezza",def:"Livellostato di blocco per basso livello acqua. Riarmo MANUALE obbligatorio. Il rischio più critico in caldaia",ex:"Dopo blocco: MAI aggiungere acqua fredda di colpo su caldaia calda. Shock termico → cricche → rottura"},
  {term:"Indicatore di livello",cat:"sicurezza",def:"Almeno 2 per generatore, uno a vetro. Altezza visibile minima: 150 mm, max 40 mm sotto il livello minimo",ex:"Tipi: tubo vetro (fino 15 bar), riflessione, trasparenza, magnetico, a due colori (vapore=rosso, acqua=verde)"},
  {term:"Livello minimo Cornovaglia",cat:"sicurezza",def:"Almeno 8 cm sopra la linea superiore della superficie di riscaldamento (focolare)",ex:"Sotto questo livello: il focolare si surriscalda a secco → deformazione → rottura"},
  {term:"Pressostato di regolazione",cat:"sicurezza",def:"Mantiene la pressione entro i limiti operativi agendo sull'accensione/spegnimento del bruciatore",ex:"Tarato a P inferiore al PSHH. Non richiede riarmo manuale dopo ogni intervento"},
  {term:"Logica fail-safe",cat:"sicurezza",def:"Qualsiasi guasto (mancanza tensione, filo rotto) porta il sistema nella condizione sicura = bruciatore spento",ex:"I blocchi devono agire DIRETTAMENTE sulla linea potenza del bruciatore, non attraverso il PLC"},
  {term:"Fotocellula UV",cat:"sicurezza",def:"Rileva raggi ultravioletti della fiamma. Funziona con TUTTI i combustibili incluso metano (fiamma blu)",ex:"Sonda a ionizzazione: ideale per metano, NON per nafta (depositi carboniosi sull'elettrodo)"},
  {term:"Sonda a ionizzazione",cat:"sicurezza",def:"Usa la conducibilità del plasma della fiamma. Ideale per metano. NON funziona con nafta",ex:"La fotocellula UV è più universale. Per doppia sicurezza: spesso entrambe in ridondanza"},
  {term:"Spurgo di fondo",cat:"sicurezza",def:"Scarica acqua dal punto più basso per rimuovere fanghi sedimentati (sali precipitati, ossidi). 1-2 volte al giorno",ex:"Si apre brevemente a caldaia in pressione. L'acqua scaricata è alla T di saturazione: gestirla con cautela"},
  {term:"Spurgo di superficie",cat:"sicurezza",def:"Rimuove acqua concentrata in sali dalla superficie libera per prevenire il priming e la schiuma",ex:"Può essere continuo (valvola regolatrice) o intermittente. Più frequente con TDS alto nell'acqua"},
  {term:"Pompa di alimento",cat:"sicurezza",def:"Almeno 2 pompe indipendenti, ciascuna al 200% della produzione max. Almeno una non dipendente dall'elettricità",ex:"H_prescritta = 1,30×H_pb + H_g + H_y. Ogni pompa con valvola di non ritorno sulla mandata"},
  {term:"Valvola di non ritorno",cat:"sicurezza",def:"Sulla mandata di ogni pompa di alimento: impedisce al vapore di rifluire verso la pompa ferma",ex:"Senza valvola di non ritorno: il vapore di caldaia entra nel corpo della pompa centrifuga → danni gravi"},
  {term:"Scaricatori di condensa",cat:"sicurezza",def:"Lasciano passare la condensa trattenendo il vapore. Bloccato aperto: perde vapore (≈100 kg/h per Ø1/2\" a 10 bar). Bloccato chiuso: accumulo→colpi d'ariete",ex:"Ispezione con ultrasuoni. In un impianto medio, 10 scaricatori guasti = 500-1.000 kg/h vapore sprecato"},
  {term:"Valvola di presa vapore",cat:"sicurezza",def:"Intercettazione principale tra generatore e rete. Obbligatoria. P>6 bar: automatica azionabile dall'esterno",ex:"In caso di rottura rete a valle: chiude per impedire che la caldaia alimenti indefinitamente la perdita"},
  {term:"Desurriscaldatore",cat:"sicurezza",def:"Riduce T vapore surriscaldato iniettando acqua nebulizzata. A iniezione diretta (acqua demineralizzata) o a superficie",ex:"Controllato da sistema che misura T vapore a valle. Usato quando le utenze richiedono T inferiore a quella prodotta"},
  {term:"Valvola di riduzione pressione",cat:"sicurezza",def:"Mantiene P costante a valle indipendentemente dalla portata. NON è un dispositivo di sicurezza: obbligatoria valvola di sicurezza a valle",ex:"La laminazione causa raffreddamento del vapore (Joule-Thomson) → possibile vapore parzialmente umido a valle"},
  {term:"D.M. 21.05.74",cat:"normativa",def:"Decreto ministeriale che regola esercizio, sicurezza e conduzione dei generatori di vapore in Italia (74 articoli)",ex:"Non abrogato dalla PED: la PED regola la costruzione, il D.M. regola l'esercizio. Coesistono"},
  {term:"PED 2014/68/UE",cat:"normativa",def:"Direttiva europea che regola la COSTRUZIONE e l'immissione sul mercato delle attrezzature a pressione",ex:"Categorie I-IV in base al rischio (PS×V). Obbligatoria marcatura CE per categoria I e superiore"},
  {term:"Marcatura CE",cat:"normativa",def:"Simbolo CE + numero Organismo Notificato + anno. Obbligatoria per tutte le attrezzature PED di categoria I+",ex:"Senza marcatura CE un generatore non può essere legalmente messo in servizio nell'UE"},
  {term:"Libretto matricolare",cat:"normativa",def:"Documento che accompagna la caldaia per tutta la vita operativa: dati tecnici, verbali collaudi, registro manutenzioni, analisi acque",ex:"Deve essere aggiornato e disponibile in sala caldaia. La perdita può comportare sospensione dell'esercizio"},
  {term:"Matricola INAIL",cat:"normativa",def:"Numero univoco assegnato dall'INAIL alla prima verifica di messa in servizio. Identifica il generatore per tutta la vita",ex:"Non cambia anche se la caldaia viene ceduta o spostata (va comunicato all'INAIL entro 30 giorni)"},
  {term:"Patente di 1° grado",cat:"normativa",def:"Abilita a caldaie di 2ª categoria (P×V≤30.000). Requisiti: 18 anni, 3ª media, 6 mesi di pratica documentata",ex:"Abilita anche alla firma settimanale del registro giornaliero per i generatori ex Art. 43"},
  {term:"Patente di 2° grado",cat:"normativa",def:"Abilita a caldaie di 1ª categoria (P×V>30.000). Requisiti: 21 anni, diploma superiore, 2 anni pratica con patente 1°",ex:"Conduzione senza patente adeguata = REATO PENALE (arresto fino a 3 mesi o ammenda)"},
  {term:"Art. 39 D.M. 74",cat:"normativa",def:"Esonero dalla sorveglianza continua: P≤1 bar, superficie≤100 m², producibilità≤2.000 kg/h",ex:"Non esonera da manutenzione, analisi acque e verifiche periodiche. Solo dalla presenza del conduttore"},
  {term:"Art. 43 D.M. 74",cat:"normativa",def:"Funzionamento non presidiato: P≤15 bar, producibilità≤3.000 kg/h + PSHH+LSHH+allarmi+registro settimanale",ex:"Registro giornaliero firmato settimanalmente da conduttore abilitato. Vistato dall'utente"},
  {term:"Prova idraulica",cat:"normativa",def:"1,5 × P_bollo con acqua (non vapore), 30 minuti. Si usa acqua: incomprimibile → nessun rischio flash evaporation",ex:"Periodicità: ogni 10 anni o dopo riparazioni alle parti in pressione. Prima verifica: all'atto della messa in servizio"},
  {term:"Verifiche INAIL",cat:"normativa",def:"Verifica integrità (visita interna): ogni 2 anni. Verifica funzionamento: ogni 2 anni. Prova idraulica: ogni 10 anni",ex:"L'INAIL può delegare agli Organismi Notificati (Bureau Veritas, TÜV, DNV) con pari valore legale"},
  {term:"Dichiarazione di Conformità (DoC)",cat:"normativa",def:"Documento del fabbricante che attesta conformità alla PED. Accompagna il generatore per tutta la vita",ex:"In assenza di DoC il generatore non può essere messo legalmente in servizio in Italia"},
  {term:"Denuncia di messa in servizio",cat:"normativa",def:"Comunicazione all'INAIL prima di mettere in servizio un generatore nuovo o trasferito. Segue prima verifica e assegnazione matricola",ex:"Documenti richiesti: certificato costruttore, DoC, disegno installazione, libretto matricolare"},
  {term:"Targa del costruttore",cat:"normativa",def:"Obbligatoria: nome costruttore, anno, matricola, P_bollo (bar), superficie riscaldamento (m²), producibilità (kg/h), CE",ex:"La pressione di bollo sulla targa è il riferimento per la taratura delle valvole e per la prova idraulica"},
  {term:"Registro giornaliero",cat:"normativa",def:"Documenta: pressione, livello, T vapore, analisi acque, test dispositivi sicurezza, anomalie. Firmato settimanalmente dal conduttore",ex:"Conservare almeno 2 anni. Assenza o incompletezza durante ispezione = sospensione esercizio"},
  {term:"Legge 615/1966",cat:"normativa",def:"Patentino per responsabili impianti termici con potenzialità >200.000 kcal/h (~232 kW)",ex:"Distinto dalla patente D.M. 21.05.74. Riguarda gli aspetti delle emissioni, non la conduzione operativa"},
  {term:"Denuncia incidente",cat:"normativa",def:"Denuncia a Polizia/Carabinieri + INAIL + ASL. NON toccare nulla fino all'ispezione INAIL",ex:"Spostare componenti prima dell'ispezione = alterazione del corpo del reato (reato penale aggiuntivo)"},
  {term:"Riparazioni parti in pressione",cat:"normativa",def:"Obbligatorio: comunicazione INAIL + officina qualificata + saldatori certificati (EN ISO 9606) + verifica INAIL post-lavori",ex:"Solo dopo verbale INAIL positivo: rimessa in servizio. Senza autorizzazione: reato"},
  {term:"D.Lgs. 81/2008",cat:"normativa",def:"Testo Unico Sicurezza sul Lavoro. DVR obbligatorio, RSPP, RLS, DPI, sorveglianza sanitaria, formazione",ex:"Mancata elaborazione DVR = reato penale (arresto 3-6 mesi o ammenda 2.500-6.400€)"},
  {term:"DVR",cat:"normativa",def:"Documento Valutazione Rischi: obbligatorio per tutte le aziende, non delegabile dal datore di lavoro",ex:"Contenuto: relazione rischi, misure prevenzione/DPI, programma attuazione, procedure, ruoli"},
  {term:"ATEX",cat:"normativa",def:"Normativa per atmosfere esplosive. Zone: 0 (continua), 1 (occasionale), 2 (anomalia). Apparecchiature certificate per categoria",ex:"In zona ATEX 2 (sala caldaia a gas): vietati cellulari non ATEX, fiamme libere, utensili non certificati"},
  {term:"D.Lgs. 152/2006",cat:"normativa",def:"Codice Ambientale: limiti emissioni NOx, SO₂, CO, polveri per impianti >1 MW termico",ex:"Obbliga ad autorizzazione alle emissioni (AUA), monitoraggio periodico, registro delle emissioni"},
  {term:"CPI (Certificato Prevenzione Incendi)",cat:"normativa",def:"Obbligatorio per sale caldaia con potenzialità >350 kW. Rilasciato dai VVF. Validità 5 anni",ex:"Procedura: SCIA antincendio + documenti tecnici. Mancanza = reato. Tra 116-350 kW: solo notifica"},
  {term:"TEE (Titoli Efficienza Energetica)",cat:"normativa",def:"1 TEE = 1 tep risparmiato. Certificati bianchi negoziabili sul mercato GME a ~200-300 €/TEE",ex:"Si ottengono realizzando interventi di efficienza (economizzatore, coibentazione, scaricatori, ecc.)"},
  {term:"Durezza totale",cat:"acque",def:"Concentrazione di Ca²⁺ e Mg²⁺ disciolti. 1°F = 10 mg/L di CaCO₃. Obiettivo in caldaia: <0,02 mmol/L (≈0)",ex:"Durezza temporanea (carbonatica): precipita per bollitura. Permanente (sulfati/cloruri): non precipita"},
  {term:"Addolcimento",cat:"acque",def:"Resine cationiche Na⁺ scambiano Ca²⁺ e Mg²⁺: R-Na+Ca²⁺→R-Ca+Na⁺. Durezza=0 ma TDS invariato",ex:"Non rimuove silice, solfati, cloruri. Non sufficiente per caldaie >40 bar e turbine"},
  {term:"Demineralizzazione",cat:"acque",def:"Rimozione totale dei sali. Colonna catonica (H⁺) + degasatore CO₂ + colonna anionica (OH⁻). Conducibilità <0,1 μS/cm",ex:"Obbligatoria per caldaie >60 bar, sistemi con turbine. Osmosi inversa alternativa valida"},
  {term:"Osmosi inversa",cat:"acque",def:"Pressione >P_osmotica (10-30 bar): acqua passa attraverso membrana lasciando i sali. Rimozione 95-99% sali",ex:"Produce permeato (~75%, TDS ridotto) + concentrato (~25%, TDS ×4). Richiede prefiltrazione"},
  {term:"Ossigeno disciolto",cat:"acque",def:"Causa pitting: micro-cavità non visibili fino alla rottura. Limite: <10 μg/L. Letale anche a ppb",ex:"Elimina con: degasazione termica (principale) + idrazina N₂H₄ (sequestrante residuo)"},
  {term:"Degasazione termica",cat:"acque",def:"Porta l'acqua a 105-130°C (1,2-2,7 bar): O₂ e CO₂ si liberano per legge di Henry e vengono evacuati",ex:"O₂ residuo: 5-10 μg/L. Per ridurlo ulteriormente: + idrazina. Sfiato obbligatorio sempre aperto"},
  {term:"Idrazina",cat:"acque",def:"N₂H₄+O₂→N₂+2H₂O. Elimina O₂ residuo e passiva le superfici. Dosaggio: 0,05-0,2 mg/L in eccesso",ex:"CANCEROGENA PROBABILE (IARC 2A). DPI: guanti neoprene+occhiali+maschera P2. Smaltimento rifiuto speciale"},
  {term:"pH ottimale in caldaia",cat:"acque",def:"Acqua di alimento: 8,5-9,5. Acqua in caldaia: 10-11 (zona magnetite protettiva)",ex:"pH<7: corrosione acida. pH>12: corrosione caustica sotto i depositi. Regolare con NaOH"},
  {term:"Conducibilità elettrica",cat:"acque",def:"Misura la concentrazione di ioni (sali) in μS/cm. Acqua pura: ~0,05. Acqua rete: 200-800. Caldaia: fino 5.000",ex:"Indicatore più rapido di qualità. Aumento improvviso nelle condense = perdita in uno scambiatore"},
  {term:"TDS (Total Dissolved Solids)",cat:"acque",def:"Solidi disciolti totali in mg/L. TDS ≈ conducibilità × 0,5-0,7",ex:"Determina la portata di spurgo: %spurgo = TDS_reintegro/(TDS_max_caldaia-TDS_reintegro)×100"},
  {term:"Fattore di concentrazione",cat:"acque",def:"FC = TDS_caldaia/TDS_reintegro. FC alto → meno spurgo → più risparmio ma rischio incrostazioni",ex:"FC=10 → spurgo=10%. FC=20 → spurgo=5% ma richiede acqua di alimento di qualità superiore"},
  {term:"Ammine volatili",cat:"acque",def:"Proteggono le tubazioni di condensa dalla corrosione da CO₂. Si volatilizzano col vapore",ex:"Morfolina: la più diffusa. pH condense target: 8,5-9,5. Troppa ammina: corrode rame nelle tubazioni"},
  {term:"Fosfati in caldaia",cat:"acque",def:"Reagiscono con Ca²⁺ → idrossiapatite (fango morbido rimovibile con spurgo). Concentrazione: 10-30 mg/L PO₄³⁻",ex:"Invece di incrostazioni dure di CaCO₃ si forma un precipitato controllabile e gestibile"},
  {term:"Silice in caldaia",cat:"acque",def:"Volatile ad alta pressione: si trasferisce nel vapore e precipita sulle palette come quarzo (9 Mohs)",ex:"Insolubile praticamente (solo HF la scioglie). Limite: <20 ppb per alte pressioni, <0,02 mg/L per turbine"},
  {term:"Corrosione per pitting",cat:"acque",def:"O₂ attacca un punto specifico → cella galvanica locale → cratere profondo mentre il metallo circostante è protetto",ex:"Insidiosa: non visibile esternamente fino alla rottura improvvisa. Prevenire con degasazione + idrazina"},
  {term:"Corrosione alcalina caustica",cat:"acque",def:"pH>12 o NaOH concentrato sotto i depositi (per evaporazione locale). Scioglie la magnetite protettiva",ex:"Localizzata e non visibile senza ispezione interna. Causa: fosfati insufficienti, dosaggio alcali eccessivo"},
  {term:"Recupero condense",cat:"acque",def:"Le condense sono già trattate, calde (80-100°C), durezza=0. Recuperarle risparmia energia e prodotti chimici",ex:"Rischio: contaminazione da perdite negli scambiatori. Controllare conducibilità in continuo"},
  {term:"Punto di rugiada acido",cat:"acque",def:"T alla quale H₂SO₄ condensa nei fumi. Metano: ~50°C (solo H₂O). Nafta ATZ: ~130-150°C",ex:"T_fumi al camino deve restare >20-30°C sopra il punto di rugiada per evitare la corrosione per acido"},
  {term:"Sistema Internazionale (SI)",cat:"fisica",def:"7 unità fondamentali: metro, kg, secondo, kelvin, ampere, mole, candela. Le grandezze derivate si ottengono combinandole",ex:"Newton = kg·m/s². Pascal = N/m². Joule = N·m. Watt = J/s"},
  {term:"Conversioni pressione",cat:"fisica",def:"1 bar = 100.000 Pa = 1,02 kg/cm² = 10,2 mH₂O = 750 mmHg. 1 MPa = 10 bar. 1 atm = 1,013 bar",ex:"Regola rapida: 1 bar ≈ 1 kg/cm² ≈ 10 mH₂O ≈ 1 atm. Sempre usare pressioni ASSOLUTE nelle leggi dei gas"},
  {term:"Conversioni energetiche",cat:"fisica",def:"1 kcal = 4,186 kJ. 1 kWh = 860 kcal = 3.600 kJ. 1 kW = 860 kcal/h. 1 tep = 11.630 kWh",ex:"Potenza utile caldaia [kW] = W[kg/h] × (h_s-h_a)[kcal/kg] / 860"},
  {term:"Scala Kelvin",cat:"fisica",def:"T[K] = T[°C] + 273,15. Lo zero assoluto = 0 K = -273,15°C. OBBLIGATORIA nelle leggi dei gas",ex:"In Celsius nelle formule dei gas → risultati completamente sbagliati. Esempio: 0°C ≠ 0 K"},
  {term:"Legge di Boyle",cat:"fisica",def:"P₁·V₁ = P₂·V₂ (T costante). Solo gas ideali. Il vapore saturo NON la segue (cambia di stato)",ex:"Esempio: 2 m³ a 5 bar → compressi a 10 bar: V₂=5×2/10=1 m³"},
  {term:"Legge di Gay-Lussac",cat:"fisica",def:"P₁/T₁ = P₂/T₂ (V costante, T in Kelvin). Riscaldando un serbatoio chiuso la pressione aumenta",ex:"Esempio: 1 bar a 20°C (293K) → 120°C (393K): P₂=1×393/293=1,34 bar"},
  {term:"Legge di Charles",cat:"fisica",def:"V₁/T₁ = V₂/T₂ (P costante, T in Kelvin). Riscaldando un gas a P costante il volume aumenta",ex:"Aria da 20°C (293K) a 300°C (573K): V₂/V₁=573/293=1,96 (quasi raddoppia)"},
  {term:"Gas perfetti",cat:"fisica",def:"P·V = m·R_sp·T. Aria: R_sp=287 J/kg·K. Vapore: R_sp=461 J/kg·K. Metano: R_sp=519 J/kg·K",ex:"Esempio: massa 1 m³ metano a 3 bar (300.000 Pa) e 20°C (293K): m=300.000/(519×293)=1,97 kg"},
  {term:"Numero di Reynolds",cat:"fisica",def:"Re=ρ·v·D/μ. Re<2.300: laminare. 2.300-4.000: transitorio. Re>4.000: turbolento (scambio ottimale)",ex:"Turbolatori nei tubi fumogeni aumentano Re da ~2.000 a >10.000 → Nu ×3 → scambio +200%"},
  {term:"Legge di Fourier",cat:"fisica",def:"q=λ·A·ΔT/d [W]. Per parete: Q=λ·A·(T₁-T₂)/d",ex:"Acciaio 10mm, A=1m², ΔT=100°C: Q=50×1×100/0,01=500.000W=500 kW. Il calcare riduce λ di 55 volte"},
  {term:"Legge di Stefan-Boltzmann",cat:"fisica",def:"P=ε·σ·A·T⁴ (T in Kelvin). σ=5,67×10⁻⁸ W/(m²·K⁴). Irraggiamento proporzionale alla quarta potenza di T",ex:"Focolare a 1.400°C (1.673K) irradia ~156 volte più potenza per m² rispetto ai fumi a 200°C (473K)"},
  {term:"Pressione idrostatica",cat:"fisica",def:"P=ρ·g·h [Pa]. Per acqua: P[bar]=h[m]/10,2",ex:"5 m di colonna d'acqua = 5/10,2 = 0,49 bar. Manometri a diverse altezze danno letture diverse per lo stesso vapore"},
  {term:"Dilatazione termica",cat:"fisica",def:"ΔL=L₀·α·ΔT. Acciaio: α=12×10⁻⁶ K⁻¹. 20m da 20°C a 200°C: ΔL=20×12×10⁻⁶×180=43,2 mm",ex:"Obbligatori giunti di dilatazione ogni 20-30 m nelle tubazioni a vapore"},
  {term:"Equazione di Bernoulli",cat:"fisica",def:"P+½ρv²+ρgh=costante. Usata per misure di portata con orifizio: Q=C·A·√(2ΔP/ρ)",ex:"C≈0,6-0,65 coefficiente di efflusso. Anche alla base del venturimetro e dei tubi di Pitot"},
  {term:"Calore specifico acqua",cat:"fisica",def:"c=1,000 kcal/kg·°C = 4,186 kJ/kg·K. Il più alto tra i liquidi comuni",ex:"L'acqua accumula ~4× più energia dell'acciaio (c=0,115) a parità di massa e temperatura"},
  {term:"Avviamento caldaia",cat:"conduzione",def:"Sequenza: verifica chiusure → allineamento strumentazione → riempimento a livello accensione → PURGA (30 sec, 30% ventilatore) → accensione",ex:"La purga è il passo più critico per la sicurezza. Senza purga: rischio deflagrazione/detonazione"},
  {term:"Arresto normale",cat:"conduzione",def:"Sequenza: riduzione carico → spegnimento bruciatore → chiusura valvola presa vapore → post-purga → mantenere pompa alimento attiva",ex:"Non aprire passi d'uomo finché P=0 e T sicura. Per fermo prolungato: conservazione umida o secca"},
  {term:"Blocco basso livello",cat:"conduzione",def:"Procedura: spegnere bruciatore → chiudere valvola presa → attendere raffreddamento parziale → alimentare acqua GRADUALMENTE",ex:"MAI aggiungere acqua fredda di colpo su metallo caldo: shock termico → cricche → rottura strutturale"},
  {term:"Blocco alta pressione",cat:"conduzione",def:"PSHH interviene: bruciatore spento. Verificare valvole sicurezza. Abbassare P aprendo utenze. NON resettare prima che P scenda",ex:"Identificare causa (pressostato regolazione guasto?) prima del riavvio. Documentare sul registro"},
  {term:"Blocco mancanza fiamma",cat:"conduzione",def:"Dopo blocco: attendere 60-120 secondi (dispersione gas). Verificare causa. Riarmare manualmente. NON tentare riaccensione immediata",ex:"Cause frequenti: fotocellula sporca, P gas bassa, elettrodo consumato, eccesso aria che spegne fiamma pilota"},
  {term:"Indice di vaporizzazione",cat:"conduzione",def:"I_vap = kg_vapore/Nm³_gas (o kg_combustibile). Metano normale: 10-11. Allarme se <9",ex:"Calo dell'indice = superfici sporche (fuliggine/calcare), eccesso aria eccessivo, combustione scadente"},
  {term:"Registro giornaliero",cat:"conduzione",def:"Documenta: P esercizio, livello, T vapore, analisi acque, test dispositivi sicurezza, anomalie",ex:"Firmato settimanalmente dal conduttore abilitato. Conservare 2 anni. Senza registro: rischio sospensione"},

let gcat='all',glet='all';
function sletup(){
  const ls=[...new Set(GL.map(t=>t.term[0].toUpperCase()))].sort();
  const el=document.getElementById('glets');
  el.innerHTML='<button class="lb active" onclick="sl(\'all\',this)">A–Z</button>';
  ls.forEach(l=>el.innerHTML+=`<button class="lb" onclick="sl('${l}',this)">${l}</button>`);
}
function sc(c,btn){gcat=c;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rg();}
function sl(l,btn){glet=l;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rg();}
function rg(){
  const q=(document.getElementById('gsrch').value||'').toLowerCase();
  const list=GL.filter(t=>{
    if(gcat!=='all'&&t.cat!==gcat)return false;
    if(glet!=='all'&&t.term[0].toUpperCase()!==glet)return false;
    if(q&&!t.term.toLowerCase().includes(q)&&!t.def.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>a.term.localeCompare(b.term));
  const el=document.getElementById('glist');
  if(!list.length){el.innerHTML='<div class="nr">Nessun termine trovato</div>';return;}
  el.innerHTML=list.map(t=>`<div class="tc">
    <div class="tcr">
      <span class="tcn">${t.term}</span>
      <span class="tct ${t.cat}">${t.cat}</span>
    </div>
    <p class="tcd">${t.def}</p>
    <p class="tce">${t.ex}</p>
  </div>`).join('');
}
function openG(){document.getElementById('gov').classList.add('open');rg();}
function closeG(){document.getElementById('gov').classList.remove('open');}

// CANVAS: particelle acqua/vapore/condensa + linee flusso ambra
function initCanvas(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H;
  function rsz(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);

  // Gradiente sfondo
  function drawBg(){
    const g=ctx.createRadialGradient(W*.3,H*.2,0,W*.3,H*.2,W*.8);
    g.addColorStop(0,'rgba(15,25,60,1)');
    g.addColorStop(.5,'rgba(8,12,28,1)');
    g.addColorStop(1,'rgba(4,6,14,1)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const g2=ctx.createRadialGradient(W*.75,H*.7,0,W*.75,H*.7,W*.6);
    g2.addColorStop(0,'rgba(20,10,40,0.6)');
    g2.addColorStop(1,'transparent');
    ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  }

  // Linee di flusso
  const FLOWS=Array.from({length:14},()=>({
    y:Math.random()*H,speed:Math.random()*.18+.05,
    amp:Math.random()*22+5,freq:Math.random()*.004+.002,
    phase:Math.random()*Math.PI*2,alpha:Math.random()*.05+.01
  }));

  // Particelle
  const PARTS=[];
  for(let i=0;i<140;i++){
    PARTS.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:-(Math.random()*.5+.07),
      size:Math.random()*2.5+.5,
      type:Math.random()<.35?'water':Math.random()<.55?'steam':'condensa',
      life:Math.random(),alpha:Math.random()*.6+.2
    });
  }

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    drawBg();
    t+=.004;

    // Linee flusso ambra
    FLOWS.forEach(f=>{
      ctx.beginPath();
      ctx.strokeStyle=`rgba(232,130,10,${f.alpha})`;ctx.lineWidth=.7;
      for(let x=0;x<W;x+=2){
        const y=f.y+Math.sin(x*f.freq+t+f.phase)*f.amp;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
      f.y-=f.speed*.15;if(f.y<-60)f.y=H+60;
    });

    // Particelle
    PARTS.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life+=.003;
      if(p.life>1||p.y<-10||p.x<-10||p.x>W+10){
        p.x=Math.random()*W;p.y=H+10;p.life=0;
        p.type=Math.random()<.35?'water':Math.random()<.55?'steam':'condensa';
        p.vy=-(Math.random()*.5+.07);p.vx=(Math.random()-.5)*.3;
      }
      const fade=p.life<.12?p.life/.12:p.life>.88?(1-p.life)/.12:1;
      const a=p.alpha*fade;

      if(p.type==='water'){
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*.8,0,Math.PI*2);
        ctx.fillStyle=`rgba(100,160,255,${a})`;ctx.fill();
      } else if(p.type==='steam'){
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*3.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,210,240,${a*.06})`;ctx.fill();
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,210,240,${a*.25})`;ctx.fill();
      } else {
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*.6,0,Math.PI*2);
        ctx.fillStyle=`rgba(140,200,255,${a*.8})`;ctx.fill();
      }
    });

    requestAnimationFrame(draw);
  }
  draw();
}

document.addEventListener('DOMContentLoaded',()=>{sletup();buildGrid();initCanvas();});

function getLibIcon(file){

  if(ext==='pdf') return '📄';
  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';

function renderLib(){
  const q=document.getElementById('libsrch').value.toLowerCase().trim();
  const el=document.getElementById('liblist');
  const filtered=DOCS.filter(d=>
    !q || d.name.toLowerCase().includes(q) || (d.desc||'').toLowerCase().includes(q)
  );

  if(DOCS.length===0){
    el.innerHTML='<div class="lib-empty">Nessun documento ancora.<br><span style="font-size:11px;opacity:.6">Aggiungi file nel repo GitHub e inseriscili nell\'array DOCS nell\'index.html</span></div>';
    return;
  }
  if(filtered.length===0){
    el.innerHTML='<div class="lib-empty">Nessun documento trovato.</div>';
    return;
  }

  const base=window.location.href.replace(/\/[^\/]*$/, '/');
  el.innerHTML='<div class="lib-grid">'+filtered.map(d=>{
    const icon=d.icon||getLibIcon(d.file);
    const ext=d.file?d.file.split('.').pop().toLowerCase():'';
    const isImg=['jpg','jpeg','png','gif','webp','svg'].includes(ext);
    const url=d.file.startsWith('http')?d.file:base+d.file;
    return `<a class="lib-card" href="${url}" target="_blank" rel="noopener">
      <div class="lib-icon">${icon}</div>
      <div class="lib-name">${d.name}</div>
      ${d.desc?`<div class="lib-desc">${d.desc}</div>`:''}
      <div><span class="lib-tag">${ext.toUpperCase()||'FILE'}</span></div>
    </a>`;
  }).join('')+'</div>';
}
