/* vignette leggero */
#bg::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 60%,
    rgba(0,0,0,0.55) 100%
  );
}

/* BARRA IN BASSO */
#loader{
  position:fixed;
  top:80%;left:0;right:0;
  z-index:10;
}

/* riga barra + percentuale */
.bar-row{
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 24px;
}

/* track grigio */
.bar-track{
  flex:1;
  height:2px;
  background:rgba(255,255,255,0.15);
  border-radius:1px;
  overflow:hidden;
}

/* fill arancione */
.bar-fill{
  height:100%;
  width:0%;
  background:#fb923c;
  border-radius:1px;
  transition:none;
  box-shadow:0 0 6px rgba(251,146,60,0.6);
}

/* percentuale */
.pct-label{
  font-family:'Courier New',Courier,monospace;
  font-size:13px;
  color:#fb923c;
  min-width:38px;
  text-align:right;
  letter-spacing:1px;
  font-weight:700;
  text-shadow:0 0 8px rgba(251,146,60,0.5);
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="loader">
  <div class="bar-row">
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <div class="pct-label" id="pct-label">0%</div>
  </div>
</div>

<script>
const fill  = document.getElementById('bar-fill');
const label = document.getElementById('pct-label');
const DURATION = 2500; // ms
let start = null;

function animate(ts) {
  if (!start) start = ts;
  const elapsed = ts - start;
  const pct = Math.min(100, Math.floor((elapsed / DURATION) * 100));
  fill.style.width  = pct + '%';
  label.textContent = pct + '%';
  if (pct < 100) {
    requestAnimationFrame(animate);
  } else {
    setTimeout(() => { window.location.replace('app.html'); }, 120);
  }
}

// Avvia dopo un frame per sicurezza
requestAnimationFrame(animate);
</script>
</body>
</html>
