  {q:"Come si calcola lo spessore minimo del fasciame di una caldaia?",opts:["s = P × D / σ_amm","s = (P × D) / (2 × σ_amm × η) + c — P=pressione di bollo (N/mm²), D=diametro interno (mm), η=coefficiente giuntura (0,7-1,0), c=sovraspessore corrosione","s = σ_amm × D / (2 × P)","s = P × D × η / σ_amm"],c:1,cat:"caldaie",expl:"Esempio: P=1,2 N/mm² (12 bar), D=1.000 mm, σ_amm=140 N/mm², η=0,85, c=2mm: s=(1,2×1.000)/(2×140×0,85)+2 = 5,04+2 = 7,04mm → si sceglie 8mm. Il coefficiente η penalizza lo spessore: η=0,70 invece di 1,0 aumenta lo spessore del 43%."},
  {q:"Cos'è la valvola a molla diretta per la sicurezza?",opts:["Una valvola di intercettazione della linea vapore","La tipologia più diffusa di valvola di sicurezza: l'otturatore è tenuto sulla sede da una molla compressa — quando P × area supera la forza della molla, la valvola si apre","Una valvola di riduzione pressione","Una valvola di non ritorno sulla pompa di alimento"],c:1,cat:"sicurezza",expl:"La valvola a molla diretta è compatta, affidabile, non sensibile alle vibrazioni. La taratura avviene comprimendo più o meno la molla con la vite di regolazione, poi bloccata con piombatura. Se la piomba è rotta: fermare la caldaia fino a ritaratura certificata. Test manuale obbligatorio: settimanale o mensile."},
  {q:"Cosa si intende per prova manuale delle valvole di sicurezza?",opts:["Test della tenuta a freddo con acqua","Sollevare la leva di prova con caldaia in pressione (almeno 75% della P di taratura) — la valvola deve aprirsi agevolmente e richiudersi perfettamente","Smontare la valvola e testarla su banco","Verificare la taratura con un manometro di riferimento"],c:1,cat:"sicurezza",expl:"Il test manuale verifica che la valvola si apra e chiuda correttamente. Con caldaia in pressione: sollevare la leva per 2-3 secondi, vapore scarica, rilasciare → chiusura ermetica. Se non si apre: incrostazione o corrosione → sostituire subito. Se non chiude: danni alla sede → sostituire. Registrare ogni test."},
  {q:"Cos'è il sistema LOTO e perché è fondamentale?",opts:["Un sistema di illuminazione della sala caldaia","Lock Out/Tag Out: applicazione di lucchetto personale su ogni fonte di energia prima della manutenzione — NESSUNO può rimuovere il lucchetto altrui","Un sistema di allarme per il basso livello","Un protocollo di comunicazione tra i turni"],c:1,cat:"sicurezza",expl:"LOTO garantisce che la macchina sia de-energizzata prima dei lavori. Ogni lavoratore applica IL PROPRIO lucchetto — neanche il responsabile può rimuoverlo. Si applica a: elettricità, vapore, combustibile, energia pneumatica. Il sistema ha ridotto di oltre il 90% gli infortuni da avviamento accidentale durante la manutenzione."},
  {q:"Cos'è il permesso di lavoro (PDL)?",opts:["Un documento contabile per le spese di manutenzione","Documento formale che autorizza lavori specifici su impianti: emittente (responsabile impianto) e ricevente (responsabile lavori) firmano — descrive rischi, misure sicurezza, orario di validità","Un registro degli infortuni sul lavoro","Un'autorizzazione per l'acquisto di ricambi"],c:1,cat:"sicurezza",expl:"Il PDL garantisce che: l'impianto sia messo in sicurezza (LOTO applicato), solo personale autorizzato acceda, i rischi siano stati identificati e le misure adottate. Obbligatorio per: spazi confinati, saldature, lavori elettrici, lavori su parti in pressione, ditte esterne."},
  {q:"Quali sono le condizioni obbligatorie per lavorare in uno spazio confinato (es. interno caldaia)?",opts:["Solo indossare casco e guanti","Analisi atmosfera (O₂ 18-21%, CO<35 ppm, gas<10% LEL) + ventilazione forzata + vigilante esterno sempre presente + sistema recupero (imbracatura+argano) + PDL firmato","Solo avvertire il responsabile","Solo usare autorespiratore"],c:1,cat:"sicurezza",expl:"D.P.R. 177/2011: tutte le condizioni devono essere rispettate contemporaneamente. Il vigilante esterno NON può entrare senza comunicazione e senza attrezzatura. Il sistema di recupero (imbracatura+treppiede+argano) deve essere installato e pronto prima dell'ingresso della prima persona."},
  {q:"Cosa sono le zone ATEX e come si classificano?",opts:["Zone dove il rischio di incendio è nullo","Zone con rischio di atmosfere esplosive: Zona 0 (continua), Zona 1 (occasionale), Zona 2 (solo in caso di anomalia) — richiedono attrezzature certificate per la categoria corrispondente","Zone di lavoro ad alta temperatura","Zone con rischio chimico da acidi"],c:1,cat:"sicurezza",expl:"Zona 0: interno serbatoi nafta (continua). Zona 1: intorno ai serbatoi nafta, area bruciatori (occasionale). Zona 2: sala caldaia a gas (solo in caso di perdita). In zona ATEX 2: vietati cellulari non ATEX, fiamme libere, utensili elettrici non certificati, saldature senza permesso speciale."},
  {q:"Cosa fare se scatta l'allarme CO in sala caldaia?",opts:["Aprire le finestre e continuare il lavoro con mascherina","Evacuare immediatamente senza usare interruttori — non rientrare senza autorespiratore autonomo (SCBA) — chiamare il 115","Usare un estintore CO₂ per diluire il CO","Aumentare la ventilazione del locale e aspettare che scenda"],c:1,cat:"sicurezza",expl:"Il CO è inodore e insidioso: 400 ppm per poche ore può essere letale. L'allarme CO è un'emergenza reale, non un falso positivo da ignorare. NON rientrare senza autorespiratore: il CO che ha causato l'allarme può ancora essere presente. I Vigili del Fuoco hanno autorespiratori SCBA."},
  {q:"Quali DPI sono obbligatori quando si lavora con l'idrazina?",opts:["Solo guanti da lavoro standard","Guanti in neoprene o nitrile, occhiali di sicurezza, semimascherina con filtro A2P2, abbigliamento protettivo — smaltimento come rifiuto speciale pericoloso","Solo mascherina chirurgica","Nessun DPI — l'idrazina è innocua se diluita"],c:1,cat:"sicurezza",expl:"L'idrazina è classificata IARC Gruppo 2A (cancerogena probabile). Assorbimento per inalazione e per via cutanea. I guanti in lattice NON sono adeguati (permeabilità). Smaltimento: rifiuto speciale pericoloso (CER 06 07 01). Alternative meno tossiche: DEHA, acido ascorbico, eritorbato di sodio."},
  {q:"Cos'è la segnaletica di avvertimento e come si riconosce?",opts:["Cartello circolare rosso/bianco — azione vietata","Cartello triangolare giallo/nero — indica un pericolo o rischio presente nell'area","Cartello rettangolare verde/bianco — via di uscita","Cartello circolare blu/bianco — obbligo DPI"],c:1,cat:"sicurezza",expl:"La segnaletica di sicurezza (D.Lgs. 81/2008, Titolo V): triangolo giallo/nero = avvertimento/pericolo. Circolare rosso/bianco = divieto. Circolare blu/bianco = obbligo. Rettangolare verde/bianco = salvataggio/emergenza. Rettangolare rosso/bianco = antincendio (posizione estintori)."},
  {q:"Cosa fare in caso di ustione da vapore?",opts:["Applicare ghiaccio direttamente sulla lesione","Raffreddare sotto acqua corrente fredda per almeno 20 minuti — NON ghiaccio, NON burro, NON forare le bolle","Applicare crema grassa per idratare","Coprire con tessuto bagnato e aspettare"],c:1,cat:"sicurezza",expl:"L'unico trattamento corretto immediato è acqua fredda corrente per 20 minuti. Il ghiaccio causa vasocostrizione e peggiora il danno. Il burro trattiene il calore. Le bolle proteggono dalla infezione — non forarle. Per ustioni significative: chiamare il 118."},
  {q:"Qual è il limite di esposizione professionale al CO (TLV-TWA per 8 ore)?",opts:["5 ppm","35 ppm","200 ppm","1.000 ppm"],c:1,cat:"sicurezza",expl:"TLV-TWA CO = 35 ppm per 8 ore di esposizione. STEL (15 min): 200 ppm. IDLH (pericolo vita immediato): 1.200 ppm. In caldaia: CO>100 ppm nei fumi = attenzione. CO>300 ppm = intervenire sul bruciatore. CO in locale caldaia >35 ppm = evacuare."},
  {q:"Cosa è obbligatorio comunicare all'INAIL in caso di incidente su un generatore di vapore?",opts:["Solo la riparazione eseguita","Denuncia immediata a Polizia/Carabinieri + INAIL + ASL — il generatore va lasciato nelle condizioni post-incidente fino all'ispezione INAIL — spostare i componenti è alterazione del corpo del reato","Solo la comunicazione scritta entro 30 giorni","Niente — gli incidenti si gestiscono internamente"],c:1,cat:"normativa",expl:"Obbligo di denuncia immediata: Polizia/Carabinieri (entro ore), INAIL (avvio indagine tecnica), ASL (infortuni lavoro). Il generatore incidentato NON va toccato fino alla liberatoria INAIL (salvo pericolo imminente). Alterazione del corpo del reato = reato penale aggiuntivo."},
  {q:"Cosa obbliga l'Art. 39 del D.M. 21.05.74 per l'esonero dalla sorveglianza continua?",opts:["Qualsiasi caldaia con sistema di allarme automatico","P≤1 bar + superficie≤100 m² + producibilità≤2.000 kg/h — tutte e tre le condizioni devono essere soddisfatte contemporaneamente","P≤6 bar con pressostato automatico","Solo per caldaie a gas naturale"],c:1,cat:"normativa",expl:"L'esonero Art. 39 non elimina gli obblighi di manutenzione, analisi acque e verifiche INAIL. Elimina solo l'obbligo della presenza fisica del conduttore durante il funzionamento. Il responsabile rimane il titolare della patente che firma il registro di manutenzione."},
  {q:"Quando è obbligatorio il Certificato di Prevenzione Incendi (CPI)?",opts:["Solo per caldaie a nafta","Per sale caldaia con potenzialità >350 kW (categoria C del D.P.R. 151/2011) — tra 116 e 350 kW: solo notifica VVF","Per tutte le caldaie con pressione >6 bar","Solo per impianti con più di 3 caldaie"],c:1,cat:"normativa",expl:"CPI obbligatorio >350 kW. Procedura: SCIA antincendio + documenti tecnici + sopralluogo VVF + rilascio CPI. Validità: 5 anni. Mancanza = reato. Modifiche significative dell'impianto richiedono aggiornamento o rinnovo del CPI."},
  {q:"Cosa è il DVR e chi deve elaborarlo?",opts:["Il Documento di Verifica del Rendimento","Il Documento di Valutazione dei Rischi — obbligo NON delegabile del datore di lavoro, obbligatorio per tutte le aziende con lavoratori — mancanza = reato penale","Un documento volontario per grandi aziende","Il Verbale delle verifiche INAIL"],c:1,cat:"normativa",expl:"DVR (Art. 28 D.Lgs. 81/2008): elaborato dal datore di lavoro con RSPP, medico competente e RLS. Contenuto: relazione rischi, misure prevenzione, DPI, programma attuazione. Mancata elaborazione: arresto 3-6 mesi o ammenda 2.500-6.400€. Per la sala caldaia deve includere ATEX, CO, rischio chimico, rumore, spazi confinati."},
  {q:"Cosa è la marcatura CE su un generatore di vapore?",opts:["Un marchio di qualità facoltativo","L'attestazione che il generatore è conforme alla Direttiva PED e ha superato la valutazione di conformità — obbligatoria per categorie I e superiori","Un marchio rilasciato dall'INAIL italiano","Una certificazione per le sole caldaie a gas"],c:1,cat:"normativa",expl:"La marcatura CE comprende: simbolo CE + numero Organismo Notificato (per cat. II-IV) + anno. Senza marcatura CE il generatore non può essere venduto né messo in servizio nell'UE. Non è un marchio di qualità assoluta ma attesta la conformità ai Requisiti Essenziali di Sicurezza (RES) della PED."},
  {q:"Cos'è il DUVRI e quando è obbligatorio?",opts:["Un documento per la diagnosi energetica annuale","Documento Unico di Valutazione Rischi da Interferenza — obbligatorio quando ditte esterne lavorano all'interno dell'impianto insieme ai lavoratori interni","Un documento che sostituisce il DVR in caso di appalto","Un registro per le ispezioni delle ditte di manutenzione"],c:1,cat:"normativa",expl:"DUVRI (Art. 26 D.Lgs. 81/2008): il committente (proprietario caldaia) deve elaborarlo quando un'impresa appaltatrice opera all'interno dell'impianto. Analizza i rischi da interferenza tra le attività. Deve essere allegato al contratto d'appalto."},
  {q:"Cosa si intende per Organismo Notificato (ON) nella PED?",opts:["L'INAIL che effettua le verifiche periodiche","Ente di certificazione accreditato dalla Commissione Europea che effettua le valutazioni di conformità PED per le categorie che lo richiedono (II, III, IV)","Il costruttore della caldaia","L'ente che rilascia la patente di conduttore"],c:1,cat:"normativa",expl:"ON accreditati in Italia: Bureau Veritas, TÜV SÜD, DNV, SGS, IMQ. Il numero identificativo dell'ON appare accanto al simbolo CE sulla targa. La marcatura CE + numero ON garantisce che un ente terzo indipendente abbia verificato la conformità."},
  {q:"Qual è la periodicità della diagnosi energetica obbligatoria per grandi imprese?",opts:["Ogni anno","Ogni 2 anni","Ogni 4 anni (D.Lgs. 102/2014)","Ogni 10 anni"],c:2,cat:"normativa",expl:"Obbligatoria ogni 4 anni per: grandi imprese (>250 dipendenti O fatturato >50 M€) e aziende ad alto consumo (>1.000 tep/anno). Trasmissione risultati ENEA entro 90 giorni. Sanzione mancata diagnosi: fino a 40.000€. Esonerate le aziende certificate ISO 50001."},
  {q:"Cosa stabilisce il D.Lgs. 152/2006 per i generatori di vapore?",opts:["Solo i requisiti costruttivi","Limiti di emissione in atmosfera (NOx, SO₂, CO, polveri) per impianti con potenzialità termica >1 MW — obbliga a autorizzazione alle emissioni (AUA) e monitoraggio periodico","Le periodicità delle verifiche INAIL","I requisiti per la patente di conduttore"],c:1,cat:"normativa",expl:"Il Codice Ambientale (D.Lgs. 152/2006, Parte V): autorizzazione alle emissioni (AUA) obbligatoria prima della messa in servizio per impianti >1 MW, monitoraggio periodico (≥annuale), registro delle emissioni. Per impianti IPPC/IED: si applicano le BAT europee con limiti ancora più restrittivi."},
  {q:"Cos'è l'alcalinità P di un'acqua?",opts:["La misura dell'acidità totale","L'alcalinità misurata alla fenolftaleina (pH>8,3), dovuta a OH⁻ e CO₃²⁻ — indica il contributo degli idrossidi liberi e dei carbonati","La misura della durezza totale in gradi francesi","La concentrazione di cloruri in mg/L"],c:1,cat:"acque",expl:"Alcalinità P (fenolftaleina): si misura titolando fino a pH 8,3. Indica la presenza di OH⁻ e CO₃²⁻. Alcalinità M (metilarancio): fino a pH 4,3, include anche HCO₃⁻. In caldaia, alcalinità P target: 250-500 mg/L CaCO₃ per mantenere pH 10-11. Eccesso: rischio corrosione alcalina."},
  {q:"Cosa sono i cloruri nell'acqua di caldaia e perché sono pericolosi?",opts:["Sali benefici che proteggono l'acciaio dalla corrosione","Ioni Cl⁻ che promuovono corrosione intergranulare e pitting nell'acciaio inox — limite: <100 mg/L per bassa P, <5 mg/L per >100 bar","Additivi per aumentare la conducibilità termica dell'acqua","Indicatori della qualità del vapore prodotto"],c:1,cat:"acque",expl:"I cloruri non vengono rimossi dall'addolcimento. Solo demineralizzazione e osmosi inversa li riducono efficacemente. Un aumento improvviso dei cloruri nelle condense segnala una perdita in uno scambiatore che usa acqua di raffreddamento salata (marina o di pozzo) → dirottare condense allo scarico."},
  {q:"Cos'è la conduttività elettrica dell'acqua e cosa indica?",opts:["La capacità dell'acqua di condurre il calore","La capacità di condurre corrente elettrica, proporzionale alla concentrazione di ioni disciolti — acqua pura: ~0,05 μS/cm, rete: 200-800 μS/cm, caldaia: fino 5.000 μS/cm","La viscosità dell'acqua a diverse temperature","Il contenuto di ossigeno disciolto"],c:1,cat:"acque",expl:"La conducibilità è il parametro più rapido da misurare. Tre usi fondamentali: 1) verifica qualità acqua demineralizzata (<0,5 μS/cm), 2) controllo TDS in caldaia (trigger per lo spurgo), 3) rilevazione contaminazione condense (aumento improvviso → perdita in scambiatore)."},
  {q:"Cos'è l'osmosi inversa e come funziona?",opts:["Un processo di filtrazione meccanica grossolana","Tecnologia membranale che rimuove il 95-99% dei sali applicando pressione superiore alla pressione osmotica (10-30 bar) — produce permeato (75% flusso, TDS ridotto) e concentrato (25%, TDS×4)","Un sistema di addolcimento con resine","Un processo di degasazione chimica"],c:1,cat:"acque",expl:"L'osmosi inversa rimuove silice (>99,5%), batteri (>99,9%), sali. Richiede prefiltrazione per proteggere le membrane. Il permeato è leggermente acido (CO₂ passa le membrane). Consumo energetico: 0,4-0,8 kWh/m³. Manutenzione: pulizia chimica (CIP) memebrane ogni 3-12 mesi."},
  {q:"Cos'è la corrosione per pitting e perché è la più pericolosa?",opts:["Corrosione generalizzata uniforme della superficie","Corrosione localizzata causata dall'O₂ disciolto che crea crateri profondi non visibili esternamente — la parete appare integra mentre internamente può essere quasi perforata, rottura improvvisa","Corrosione da acido solforico sui condotti fumi","Corrosione galvanica tra metalli diversi"],c:1,cat:"acque",expl:"Il pitting è insidioso: non visibile dall'esterno fino alla rottura improvvisa. La corrente di corrosione si concentra in un punto minuscolo → alta densità → alta velocità di corrosione locale. Prevenzione: O₂ <7-10 μg/L e pH 10-11 (magnetite protettiva). Il degasatore + idrazina è l'unico sistema efficace."},
  {q:"Cosa si intende per recupero delle condense e perché è vantaggioso?",opts:["Recuperare il combustibile condensato nei bruciatori","Restituire alla caldaia l'acqua di condensa calda (80-100°C) già trattata chimicamente e priva di durezza — risparmio energetico, risparmio di prodotti chimici, riduzione dello spurgo","Raccogliere l'acqua piovana per usarla in caldaia","Recuperare il calore dai fumi con un economizzatore"],c:1,cat:"acque",expl:"Vantaggi del recupero condense: energia (acqua già calda), prodotti chimici (già trattata, durezza=0), spurgo ridotto (TDS basso → FC più alto). Rischio: contaminazione da perdite negli scambiatori → monitoraggio conducibilità in continuo → se sale improvvisamente: dirottare le condense allo scarico."},
  {q:"Cos'è la durezza permanente dell'acqua?",opts:["La durezza che si elimina per bollitura","La durezza causata da solfati e cloruri di calcio e magnesio — NON precipita per bollitura, richiede addolcimento con resine a scambio ionico per essere rimossa","La durezza causata solo dal magnesio","La durezza dell'acqua dopo il trattamento chimico"],c:1,cat:"acque",expl:"Durezza permanente (non carbonatica): CaSO₄, MgSO₄, CaCl₂. Non precipita per bollitura → rimane in soluzione anche ad alta T → si concentra in caldaia → rischio incrostazioni di solfato di calcio (più dure e aderenti del CaCO₃). Richiede addolcimento con resine o demineralizzazione."},
  {q:"Cos'è il punto di rugiada acido dei fumi e perché è importante?",opts:["La temperatura di ebollizione degli acidi nel combustibile","La temperatura alla quale H₂SO₄ e altri acidi condensano sui condotti fumi — per nafta ATZ ~130-150°C, per metano ~50°C — la T fumi al camino deve restare sopra questo valore","La temperatura alla quale il combustibile inizia a bruciare","La temperatura della fiamma al bruciatore"],c:1,cat:"acque",expl:"Sotto il punto di rugiada acido, H₂SO₄ condensa sulle superfici metalliche → corrosione rapida (>10 mm/anno). Per nafta ATZ (S~2%): T_fumi min al camino = 150-170°C. Per metano (S~0%): limite è solo il punto di rugiada dell'acqua (~57°C) → le caldaie a condensazione possono scendere sotto 57°C."},
  {q:"Cosa afferma la legge di Charles?",opts:["A T costante, PV = costante","A P costante, V/T = costante (T in Kelvin) — l'aria riscaldanda si espande","A V costante, P/T = costante","La massa è proporzionale al volume"],c:1,cat:"fisica",expl:"Legge di Charles (isobaro): V₁/T₁ = V₂/T₂. Esempio: aria da 20°C (293K) a 300°C (573K) a P costante: V₂ = 1 × 573/293 = 1,96 m³ per ogni m³ di partenza. I condotti fumi devono essere dimensionati per i fumi caldi, molto più voluminosi dell'aria fredda in ingresso."},
  {q:"Qual è l'equazione di stato dei gas perfetti?",opts:["PV = mRT","PV = m × R_specifico × T (T in Kelvin, P in Pa, V in m³)","P/V = m × R × T","P = m × R × T / V²"],c:1,cat:"fisica",expl:"PV = m × R_sp × T. R_specifico: aria=287 J/kg·K, metano=519 J/kg·K, vapore=461 J/kg·K. Esempio: massa di 1 Nm³ metano a 3 bar (300.000 Pa) e 20°C (293K): m = 300.000×1/(519×293) = 1,97 kg."},
  {q:"Cos'è la pressione idrostatica e come si calcola?",opts:["La pressione del vapore alla valvola di presa","P = ρ × g × h — la pressione esercitata da una colonna di fluido. Per l'acqua: 10 m di colonna ≈ 1 bar","La pressione misurata dal manometro in esercizio","La differenza di pressione tra caldaia e utenze"],c:1,cat:"fisica",expl:"P = ρ×g×h. Per acqua (ρ=1.000 kg/m³): P[bar] ≈ h[m]/10,2. Manometri installati a diverse altezze sulla stessa caldaia danno letture diverse per la stessa pressione del vapore. Le valvole di sicurezza devono essere tarare tenendo conto della loro altezza rispetto al manometro di riferimento."},
  {q:"Cos'è la dilatazione termica e come si calcola?",opts:["La variazione di densità dell'acqua con la temperatura","ΔL = L₀ × α × ΔT — l'allungamento di un materiale per variazione di temperatura. Acciaio: α=12×10⁻⁶ K⁻¹","La variazione di pressione per variazione di temperatura","L'espansione del vapore nell'espansione in turbina"],c:1,cat:"fisica",expl:"Esempio: tubo acciaio 30 m da 20°C a 200°C (ΔT=180°C): ΔL = 30 × 12×10⁻⁶ × 180 = 64,8 mm. Quasi 6,5 cm: senza giunti di dilatazione le forze sulle flange e sui supporti sarebbero enormi. Giunti obbligatori ogni 20-30 m nelle tubazioni a vapore."},
  {q:"Come si calcola la prevalenza necessaria per le pompe di alimento?",opts:["H = P_bollo / 10","H = 1,30 × P_bollo[mH₂O] + dislivello geodetico + perdite di carico (tutto in mH₂O) — il margine del 30% garantisce l'alimentazione anche con P_caldaia al massimo","H = P_bollo × volume specifico vapore","H = P_bollo / rendimento pompa"],c:1,cat:"fisica",expl:"Esempio: P=10 bar (102 mH₂O), dislivello=5m, perdite=15m: H = 1,30×102 + 5 + 15 = 152,6 mH₂O ≈ 15 bar. La pompa deve vincere la pressione di caldaia + dislivello + perdite con margine del 30% per funzionare correttamente anche a piena P."},
  {q:"Cos'è la conducibilità termica λ e cosa indica?",opts:["La velocità di propagazione delle onde di pressione in un fluido","La capacità di un materiale di trasmettere calore per conduzione — legge di Fourier: Q = λ × A × ΔT / d","La resistenza elettrica di un materiale","Il rendimento di uno scambiatore di calore"],c:1,cat:"fisica",expl:"λ [W/m·K]: acciaio=50, calcare=0,9 (55× più isolante), fuliggine=0,1 (500×), lana di roccia=0,035. La legge di Fourier: Q = λ × A × (T₁-T₂)/d. Esempio: parete acciaio 10mm, A=1m², ΔT=100°C: Q = 50×1×100/0,01 = 500.000 W = 500 kW."},
  {q:"Cos'è il numero di Nusselt (Nu)?",opts:["Il numero di cavitazioni nelle pompe","Nu = h×D/λ_fluido — adimensionale che lega il coefficiente convettivo h alle proprietà del fluido. Con la correlazione di Dittus-Boelter: Nu = 0,023 × Re⁰·⁸ × Pr⁰·⁴","Il rapporto tra viscosità cinematica e dinamica","Il numero di scambi di calore in una caldaia"],c:1,cat:"fisica",expl:"Il Nusselt permette di calcolare il coefficiente di scambio termico convettivo h. Per acqua a 80°C in tubo D=25mm a v=1,5 m/s: Re≈100.000, Pr≈2,2, Nu≈525, h = 525 × 0,67/0,025 ≈ 14.070 W/m²·K. L'acqua ha coefficienti h altissimi — ottimo fluido termovettore."},
  {q:"Cos'è il NPSH e perché è importante per le pompe di alimento?",opts:["Il numero di stadi di una pompa centrifuga","Net Positive Suction Head: pressione netta disponibile all'aspirazione sopra la tensione di vapore del liquido — se NPSH_disponibile < NPSH_richiesto si verifica la cavitazione che distrugge la girante","La portata massima garantita dal costruttore","La prevalenza massima della pompa a portata nulla"],c:1,cat:"fisica",expl:"Cavitazione: la pressione locale scende sotto la tensione di vapore → bolle di vapore che collassano violentemente sulle palette → erosione rapida. Segnale: rumore di ghiaia. Cause: livello serbatoio basso, filtro aspirazione intasato, acqua troppo calda. Azione: passare alla pompa di riserva subito."},
  {q:"Cos'è la consegna del turno e perché è critica?",opts:["Una semplice firma sul registro di presenza","Il trasferimento formale della responsabilità di conduzione: verifica fisica congiunta, lettura strumenti, comunicazione anomalie in corso e lavori in atto — dalla firma in poi è responsabile il conduttore entrante","Una riunione periodica tra tutti i conduttori","Un controllo bimestrale della documentazione"],c:1,cat:"conduzione",expl:"La consegna turno è critica perché problemi mal comunicati causano incidenti nelle ore successive. Il conduttore che firma assume la responsabilità legale da quel momento, incluse le anomalie pregresse non ricevute correttamente. La verifica fisica congiunta è obbligatoria — non basta la comunicazione verbale."},
  {q:"Cos'è il colpo d'ariete e come si previene?",opts:["Un urto meccanico sulla valvola di sicurezza","Fenomeno violento causato dalla condensazione istantanea del vapore in sacche di condensa: il volume si riduce di 1.725 volte in millisecondi → impulso di pressione distruttivo","Una vibrazione normale nelle pompe di alimento","L'urto dell'acqua sulle pale della turbina"],c:1,cat:"conduzione",expl:"Prevenzione: aprire sempre le valvole vapore LENTAMENTE, specialmente su linee fredde o rimaste ferme. Prima di introdurre vapore in una tubazione fredda: aprire i drenaggi e attendere che la condensa defluisca. Verificare periodicamente tutti gli scaricatori di condensa. Pendenza tubazioni ≥1% verso gli scaricatori."},
  {q:"Come si riconosce il priming in atto?",opts:["La pressione sale improvvisamente sopra il set-point","Livello che oscilla violentemente nell'indicatore, pressione instabile, colpi d'ariete nelle tubazioni principali, gorgoglio alla valvola di presa vapore","Il bruciatore si spegne automaticamente","La conducibilità dell'acqua scende sotto i limiti"],c:1,cat:"conduzione",expl:"Il priming causa vapore umido → sali che si depositano sulle palette turbine (incrostazioni di silice quasi impossibili da rimuovere). Gestione immediata: ridurre carico bruciatore + spurgo di superficie per abbassare TDS + ridurre livello se troppo alto. Non aumentare il prelievo vapore finché non cessa."},
  {q:"Cos'è l'indice di vaporizzazione e come si usa?",opts:["Il rapporto tra pressione e volume della caldaia","I_v = kg_vapore / Nm³_gas (o kg_combustibile) — indica l'efficienza operativa. Metano normale: 10-11. Calo progressivo = superfici sporche. Calo brusco = anomalia bruciatore o perdita di vapore","Il rapporto tra produzione di vapore e superficie di riscaldamento","La temperatura dei fumi divisa per la pressione di esercizio"],c:1,cat:"conduzione",expl:"Monitorare l'indice di vaporizzazione quotidianamente permette di rilevare il degrado prima che diventi un problema grave. Calo lento (settimane): fuliggine o calcare in formazione → pianificare pulizia. Calo brusco (ore): anomalia seria → indagare subito (perdita vapore, bruciatore guasto, qualità combustibile)."},

// ── ENGINE ─────────────────────────────────────────────────────
let qSession = [];
let qIdx = 0;
let score = 0;
let wrongList = [];
let answered = false;
let selectedQty = 0;
let infiniteMode = false;
let qPool = [];

document.getElementById('hdr-count').textContent = QB.length + ' DOMANDE';
document.querySelector('.start-sub').innerHTML = 'Domande in ordine casuale da tutti gli argomenti.<br>Scegli quante domande vuoi affrontare.';

function selQty(n, el) {
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  selectedQty = n;
  document.getElementById('btn-go').classList.add('ready');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSession() {
  if (!selectedQty) return;
  infiniteMode = selectedQty === -1;
  qPool = shuffle(QB);
  if (!infiniteMode) qPool = qPool.slice(0, Math.min(selectedQty === -2 ? QB.length : selectedQty, QB.length));
  qSession = [...qPool];
  qIdx = 0; score = 0; wrongList = []; answered = false;
  document.getElementById('s-start').style.display = 'none';
  document.getElementById('s-quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  // In infinite mode: when we exhaust the pool, reshuffle
  if (infiniteMode && qIdx >= qSession.length) {
    qSession = [...qSession, ...shuffle(QB)];
  }
  const total = infiniteMode ? '∞' : qSession.length;
  const q = qSession[qIdx];
  answered = false;

  // Progress
  const pct = infiniteMode ? 0 : Math.round((qIdx + 1) / qSession.length * 100);
  document.getElementById('prog-lbl').textContent = (qIdx + 1) + ' / ' + total;
  document.getElementById('prog-pct').textContent = infiniteMode ? '' : pct + '%';
  document.getElementById('prog-fill').style.width = infiniteMode ? '0%' : pct + '%';

  // Stats
  document.getElementById('st-n').textContent = qIdx + 1;
  document.getElementById('st-ok').textContent = score;
  document.getElementById('st-ko').textContent = wrongList.length;
  const done = score + wrongList.length;
  document.getElementById('st-pct').textContent = done > 0 ? Math.round(score / done * 100) + '%' : '—';

  // Category
  const cats = {
    termodinamica:'🌡️ Termodinamica', combustione:'🔥 Combustione',
    caldaie:'⚙️ Caldaie', sicurezza:'🛡️ Sicurezza',
    normativa:'📋 Normativa', acque:'💧 Acque',
    fisica:'📐 Fisica', conduzione:'🕹️ Conduzione'
  };
  document.getElementById('q-cat').textContent = cats[q.cat] || q.cat;
  document.getElementById('q-text').textContent = q.q;

  // Options
  const letters = ['A','B','C','D'];
  const wrap = document.getElementById('opts');
  wrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = '<span class="opt-letter">' + letters[i] + '</span>' + opt;
    btn.onclick = () => answerQ(i, btn);
    wrap.appendChild(btn);
  });

  document.getElementById('expl-box').className = 'expl-box';
  document.getElementById('btn-next').className = 'btn-next';
  const isLast = !infiniteMode && qIdx >= qSession.length - 1;
  document.getElementById('btn-next').textContent = isLast ? 'Vedi risultato →' : 'Prossima →';
}

function answerQ(chosen, btn) {
  if (answered) return;
  answered = true;
  const q = qSession[qIdx];
  const opts = document.querySelectorAll('.opt');

  opts.forEach((o, i) => {
    if (i === q.c) o.classList.add('correct');
    else o.classList.add('disabled');
  });

  if (chosen === q.c) {
    score++;
    btn.classList.remove('disabled');
  } else {
    btn.classList.add('wrong');
    opts[q.c].classList.add('correct');
    if (!infiniteMode) wrongList.push({ q: q.q, correct: q.opts[q.c] });
  }

  if (q.expl) {
    document.getElementById('expl-text').textContent = q.expl;
    document.getElementById('expl-box').className = 'expl-box show';
  }

  document.getElementById('btn-next').className = 'btn-next show';
  document.getElementById('st-ok').textContent = score;
  document.getElementById('st-ko').textContent = wrongList.length;
  const done = score + wrongList.length;
  document.getElementById('st-pct').textContent = done > 0 ? Math.round(score / done * 100) + '%' : '—';
}

function nextQ() {
  if (!infiniteMode && qIdx >= qSession.length - 1) {
    showRecap();
    return;
  }
  qIdx++;
  renderQ();
}

function showRecap() {
  document.getElementById('s-quiz').style.display = 'none';
  document.getElementById('s-recap').style.display = 'block';
  const total = qSession.length;
  const pct = Math.round(score / total * 100);
  const medal = pct >= 90 ? '🏆' : pct >= 70 ? '✅' : pct >= 50 ? '📚' : '💪';
  document.getElementById('r-medal').textContent = medal;
  document.getElementById('r-score').textContent = score + '/' + total;
  document.getElementById('r-sub').textContent = pct >= 70 ? 'Ottimo lavoro! Continua così.' : 'Continua ad allenarti — ci stai arrivando!';
  document.getElementById('r-ok').textContent = score;
  document.getElementById('r-ko').textContent = wrongList.length;
  document.getElementById('r-pct').textContent = pct + '%';

  const ws = document.getElementById('wrong-section');
  if (wrongList.length === 0) {
    ws.innerHTML = '<div style="text-align:center;padding:20px;color:#4ade80;font-size:14px">🎯 Nessun errore! Perfetto.</div>';
  } else {
    ws.innerHTML = '<div class="wrong-title">Domande sbagliate</div>' +
      wrongList.map(w =>
        '<div class="wrong-item"><div class="wrong-q">❌ ' + w.q + '</div><div class="wrong-a">✓ ' + w.correct + '</div></div>'
      ).join('');
  }
}

function restartSame() {
  document.getElementById('s-recap').style.display = 'none';
  startSession();
}

function selAll(el){selQty(QB.length,el);document.getElementById("lbl-all").textContent=QB.length+" domande";}
function goHome() { window.location.href = 'index.html'; }
</script>
