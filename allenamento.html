<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Allenamento — VaporeLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c18;--glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.1);--accent:#c0420a;--purple:#534AB7;
  --green:#1a7a3a;--text1:#f0f0f0;--text2:#b0b8c8;--text3:#606880;
  --adim:rgba(192,66,10,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text1);font-family:'Geist',sans-serif}

.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.back-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--glass2);color:var(--text1)}
.header-title{font-family:'Instrument Serif',serif;font-size:20px;flex:1}
.header-count{font-family:'Geist Mono',monospace;font-size:10px;color:var(--accent);background:var(--adim);border:1px solid rgba(192,66,10,0.3);padding:4px 10px;border-radius:20px;letter-spacing:1px}

.main{max-width:680px;margin:0 auto;padding:24px 18px 80px}

/* START SCREEN */
.start-wrap{text-align:center;padding:32px 0}
.start-icon{font-size:52px;margin-bottom:16px}
.start-title{font-family:'Instrument Serif',serif;font-size:34px;margin-bottom:10px}
.start-sub{color:var(--text3);font-size:14px;line-height:1.6;margin-bottom:32px}
.qty-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.qty-btn{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:18px 12px;cursor:pointer;transition:all .2s;text-align:center}
.qty-btn:hover,.qty-btn.sel{background:var(--adim);border-color:var(--accent);transform:translateY(-2px)}
.qty-num{font-family:'Instrument Serif',serif;font-size:32px;color:var(--accent);margin-bottom:4px}
.qty-label{font-size:12px;color:var(--text3)}
.btn-go{width:100%;padding:16px;background:var(--accent);border:none;border-radius:16px;color:#fff;font-family:'Geist',sans-serif;font-size:17px;font-weight:600;cursor:pointer;transition:.18s;margin-top:8px;opacity:.4;pointer-events:none}
.btn-go.ready{opacity:1;pointer-events:auto}
.btn-go.ready:hover{opacity:.85}

/* STATS */
.stats-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-pill{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:7px 12px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.stat-pill strong{font-size:15px;color:var(--text1)}
.stat-pill.g strong{color:#4ade80}
.stat-pill.r strong{color:#f87171}
.stat-pill.o strong{color:#fb923c}

/* PROGRESS */
.prog-wrap{margin-bottom:18px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px;font-family:'Geist Mono',monospace}
.prog-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}

/* QUESTION */
.q-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:22px;margin-bottom:14px}
.q-cat{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
.q-text{font-family:'Instrument Serif',serif;font-size:21px;line-height:1.5;color:var(--text1)}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.opt{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .18s;font-size:15px;color:var(--text2);text-align:left;font-family:'Geist',sans-serif;display:flex;align-items:flex-start;gap:10px;width:100%}
.opt:hover:not(:disabled){background:var(--glass2);border-color:rgba(255,255,255,0.2);color:var(--text1)}
.opt.correct{background:rgba(26,122,58,0.2);border-color:rgba(74,222,128,0.6);color:#4ade80;pointer-events:none}
.opt.wrong{background:rgba(220,38,38,0.15);border-color:rgba(248,113,113,0.5);color:#f87171;pointer-events:none}
.opt.disabled{pointer-events:none;opacity:.45}
.opt-letter{width:22px;height:22px;min-width:22px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;color:var(--text3);flex-shrink:0}
.opt.correct .opt-letter{background:rgba(74,222,128,0.2);color:#4ade80}
.opt.wrong .opt-letter{background:rgba(248,113,113,0.2);color:#f87171}

/* EXPLANATION */
.expl-box{background:rgba(83,74,183,0.1);border:1px solid rgba(83,74,183,0.3);border-radius:14px;padding:16px;margin-bottom:18px;display:none}
.expl-box.show{display:block}
.expl-label{font-size:10px;letter-spacing:1.5px;color:#a78bfa;font-family:'Geist Mono',monospace;text-transform:uppercase;margin-bottom:8px}
.expl-text{font-size:14px;color:var(--text2);line-height:1.6}

/* NEXT */
.btn-next{width:100%;padding:15px;background:var(--accent);border:none;border-radius:16px;color:#fff;font-family:'Geist',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:.18s;display:none}
.btn-next.show{display:block}
.btn-next:hover{opacity:.85}

/* RECAP */
.recap-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:28px;text-align:center;margin-bottom:20px}
.recap-medal{font-size:52px;margin-bottom:10px}
.recap-score{font-family:'Instrument Serif',serif;font-size:60px;color:var(--accent);margin-bottom:6px}
.recap-sub{font-size:14px;color:var(--text3);margin-bottom:24px}
.recap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.rc{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 8px;text-align:center}
.rc-val{font-size:26px;font-weight:700;margin-bottom:4px}
.rc-lbl{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace}
.rc.g .rc-val{color:#4ade80}
.rc.r .rc-val{color:#f87171}
.rc.o .rc-val{color:var(--accent)}
.recap-btns{display:flex;gap:10px}
.btn-recap{flex:1;padding:14px;border-radius:14px;font-family:'Geist',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.18s;border:none}
.btn-recap.primary{background:var(--accent);color:#fff}
.btn-recap.primary:hover{opacity:.85}
.btn-recap.secondary{background:var(--glass);color:var(--text2);border:1px solid var(--glass-border)}
.wrong-section{margin-top:20px;text-align:left}
.wrong-title{font-size:11px;color:var(--text3);letter-spacing:1.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;margin-bottom:12px}
.wrong-item{background:rgba(220,38,38,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:12px;padding:14px;margin-bottom:8px}
.wrong-q{font-size:13px;color:var(--text2);margin-bottom:6px}
.wrong-a{font-size:12px;color:#4ade80}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← Home</a>
  <div class="header-title">🏋️ Allenamento</div>
  <div class="header-count" id="hdr-count">97 DOMANDE</div>
</header>

<main class="main">

  <!-- START -->
  <div id="s-start">
    <div class="start-wrap">
      <div class="start-icon">🏋️</div>
      <div class="start-title">Allenamento Quiz</div>
      <div class="start-sub">Domande in ordine casuale da tutti gli argomenti.<br>Scegli quante domande vuoi affrontare.</div>
      <div class="qty-grid" id="qty-grid">
        <div class="qty-btn" onclick="selQty(20,this)"><div class="qty-num">20</div><div class="qty-label">domande</div></div>
        <div class="qty-btn" onclick="selQty(50,this)"><div class="qty-num">50</div><div class="qty-label">domande</div></div>
        <div class="qty-btn" onclick="selAll(this)"><div class="qty-num">TUTTE</div><div class="qty-label" id="lbl-all">175 domande</div></div>
        <div class="qty-btn" onclick="selQty(-1,this)"><div class="qty-num">∞</div><div class="qty-label">loop infinito</div></div>
      </div>
      <button class="btn-go" id="btn-go" onclick="startSession()">Inizia →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="s-quiz" style="display:none">
    <div class="stats-bar">
      <div class="stat-pill"><span>N°</span><strong id="st-n">1</strong></div>
      <div class="stat-pill g"><span>✓</span><strong id="st-ok">0</strong></div>
      <div class="stat-pill r"><span>✗</span><strong id="st-ko">0</strong></div>
      <div class="stat-pill o"><span>%</span><strong id="st-pct">—</strong></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-info"><span id="prog-lbl">0/0</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-cat" id="q-cat"></div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="options" id="opts"></div>
    <div class="expl-box" id="expl-box">
      <div class="expl-label">💡 Spiegazione</div>
      <div class="expl-text" id="expl-text"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Prossima →</button>
  </div>

  <!-- RECAP -->
  <div id="s-recap" style="display:none">
    <div class="recap-card">
      <div class="recap-medal" id="r-medal">🏆</div>
      <div class="recap-score" id="r-score">—</div>
      <div class="recap-sub" id="r-sub">—</div>
      <div class="recap-grid">
        <div class="rc g"><div class="rc-val" id="r-ok">—</div><div class="rc-lbl">Corrette</div></div>
        <div class="rc r"><div class="rc-val" id="r-ko">—</div><div class="rc-lbl">Sbagliate</div></div>
        <div class="rc o"><div class="rc-val" id="r-pct">—</div><div class="rc-lbl">Percentuale</div></div>
      </div>
      <div class="recap-btns">
        <button class="btn-recap secondary" onclick="goHome()">← Home</button>
        <button class="btn-recap primary" onclick="restartSame()">Ricomincia</button>
      </div>
    </div>
    <div class="wrong-section" id="wrong-section"></div>
  </div>

</main>

<script>
const QB=[
  {q:"Cos'è la caloria (kcal)?",opts:["Energia per riscaldare 1 kg d'aria di 1°C","Energia per alzare di 1°C la temperatura di 1 kg d'acqua distillata (da 14,5 a 15,5°C)","Unità di misura della potenza termica","Energia per vaporizzare 1 kg d'acqua"],c:1,cat:"termodinamica",expl:"1 kcal = energia per alzare di 1°C (da 14,5 a 15,5°C) 1 kg di acqua distillata. Equivale a 4,186 kJ. Non è una unità di potenza (quella è il Watt) né si riferisce all'aria o al vapore."},
  {q:"Qual è il calore specifico dell'acqua?",opts:["2 kcal/kg°C","0,5 kcal/kg°C","1 kcal/kg°C","0,24 kcal/kg°C"],c:2,cat:"termodinamica",expl:"Il calore specifico dell'acqua è 1 kcal/kg°C = 4,186 kJ/kg·K. È il valore più alto tra i liquidi comuni — per questo l'acqua è il miglior fluido termovettore. Confronto: acciaio=0,115, nafta=0,5, aria=0,24."},
  {q:"Cosa si intende per calore latente di vaporizzazione?",opts:["Calore che varia la temperatura dell'acqua","Calore necessario per vaporizzare 1 kg d'acqua a temperatura costante (540 kcal/kg a 1 bar)","Calore dei fumi in uscita dal camino","Calore assorbito dal combustibile"],c:1,cat:"termodinamica",expl:"Il calore latente è l'energia per completare il cambio di stato (liquido→vapore) a T e P costanti. A 1 bar vale 540 kcal/kg. Diminuisce all'aumentare della pressione fino ad annullarsi al punto critico (221 bar)."},
  {q:"A 10 bar assoluti, qual è la temperatura di saturazione dell'acqua?",opts:["100°C","152°C","184°C","212°C"],c:2,cat:"termodinamica",expl:"A 10 bar la T_sat è 184°C. La relazione P-T è biunivoca: ad ogni pressione corrisponde una sola temperatura di saturazione. A 5 bar: 152°C. A 20 bar: 212°C. Nota: se il manometro segna 9 bar, la pressione assoluta è ~10 bar → T_sat=184°C."},
  {q:"Di quante volte aumenta il volume dell'acqua che evapora a pressione atmosferica?",opts:["100 volte","540 volte","1.725 volte","10 volte"],c:2,cat:"termodinamica",expl:"1 kg di acqua liquida occupa ~1 litro (0,001 m³). 1 kg di vapore saturo secco a 1 bar occupa 1,671 m³. Il rapporto è 1.671/0,001 = 1.671 ≈ 1.725 volte. Questo spiega l'enorme energia distruttiva di uno scoppio di caldaia."},
  {q:"Cosa indica il titolo del vapore (X)?",opts:["La pressione del vapore in bar","La temperatura del vapore surriscaldato","La frazione in peso di vapore secco in 1 kg di vapore saturo umido (0=liquido, 1=vapore secco)","Il numero di tubi nel generatore"],c:2,cat:"termodinamica",expl:"X varia da 0 (liquido saturo puro) a 1 (vapore saturo secco). X=0,9 significa che 900 g su 1 kg sono vapore e 100 g sono acqua in goccioline. In turbina X<0,92 causa erosione delle palette."},
  {q:"Cosa si intende per vapore saturo secco?",opts:["Vapore a temperatura superiore a T_sat","Vapore con X=1: tutto il liquido è evaporato, nessuna goccia d'acqua","Vapore a bassa pressione","Vapore senza umidità atmosferica"],c:1,cat:"termodinamica",expl:"Il vapore saturo secco (X=1) si trova alla T_sat della pressione data. A 10 bar: T=184°C, h=664 kcal/kg. Qualsiasi aggiunta di calore a P costante porta al surriscaldamento (T supera T_sat)."},
  {q:"Cos'è il vapore surriscaldato?",opts:["Vapore con X>0,9","Vapore a temperatura superiore a T_sat alla stessa pressione","Vapore a pressione superiore a 100 bar","Vapore umido con goccioline"],c:1,cat:"termodinamica",expl:"Il vapore surriscaldato ha T > T_sat alla pressione data. Ogni 10°C di surriscaldamento aggiunge ~4,8 kcal/kg. È ideale per le turbine perché ha maggiore entalpia e mantiene X>0,92 durante l'espansione."},
  {q:"Qual è il punto critico dell'acqua?",opts:["100°C e 1 bar","221 bar e 374°C — oltre il quale non esiste distinzione tra fase liquida e gassosa","150°C e 10 bar","374 bar e 221°C"],c:1,cat:"termodinamica",expl:"Oltre il punto critico (221 bar, 374°C) il fluido è in stato supercritico: non esiste distinzione tra liquido e vapore. Le caldaie supercritiche operano oltre questi valori e raggiungono rendimenti del 45-50%."},
  {q:"Come si converte la temperatura da Celsius a Kelvin?",opts:["T[K] = T[°C] × 1,8 + 32","T[K] = T[°C] + 273","T[K] = T[°C] - 273","T[K] = T[°C] / 100"],c:1,cat:"termodinamica",expl:"T[K] = T[°C] + 273,15 ≈ T[°C] + 273. Nelle leggi dei gas (Boyle, Gay-Lussac, Charles) e nel rendimento di Carnot si usa SEMPRE Kelvin. Usare Celsius porta a risultati fisicamente errati."},
  {q:"Cosa afferma il primo principio della termodinamica?",opts:["È impossibile convertire tutto il calore in lavoro","L'energia si conserva: non si crea né si distrugge, si trasforma","Il calore fluisce sempre dalla sorgente fredda a quella calda","L'entropia aumenta sempre nei processi reali"],c:1,cat:"termodinamica",expl:"Il primo principio è la conservazione dell'energia. Per una caldaia: tutto il calore del combustibile (B×Hi) finisce nell'entalpia del vapore (utile) o nelle perdite (camino, irraggiamento, ecc.)."},
  {q:"Cosa afferma il secondo principio della termodinamica?",opts:["L'energia si conserva in tutti i processi","È impossibile costruire una macchina che converta tutto il calore in lavoro senza cedere nulla a una sorgente fredda","Il calore fluisce sempre dal corpo freddo a quello caldo","La pressione e la temperatura sono sempre proporzionali"],c:1,cat:"termodinamica",expl:"Il secondo principio fissa il limite massimo di rendimento: η_Carnot = 1 - T_fredda/T_calda. Nessuna macchina reale può superarlo. Spiega perché aumentare la T del vapore (sorgente calda) migliora il rendimento."},
  {q:"Qual è il rendimento massimo di Carnot tra 400°C e 30°C?",opts:["37%","55%","70%","85%"],c:1,cat:"termodinamica",expl:"η_Carnot = 1 - T_cold/T_hot = 1 - 303/673 = 55%. T in Kelvin: 400+273=673K, 30+273=303K. È il limite teorico insuperabile da qualsiasi macchina termica reale."},
  {q:"Cosa descrive il diagramma di Mollier (h-s)?",opts:["La distribuzione delle temperature nei fumi","Il profilo della fiamma nel focolare","La relazione entalpia-entropia per il vapore acqueo, con zone liquido, bifase e surriscaldato","Le perdite di carico nelle tubazioni"],c:2,cat:"termodinamica",expl:"Il diagramma di Mollier ha l'entalpia h sull'asse verticale e l'entropia s su quello orizzontale. L'espansione isentropica in turbina è una linea verticale. Strumento fondamentale per analizzare cicli a vapore."},
  {q:"Cosa si intende per flash evaporation?",opts:["Accensione rapida del combustibile","Vaporizzazione istantanea di un liquido caldo per brusco abbassamento di pressione","Condensazione rapida del vapore","Ebollizione controllata in caldaia"],c:1,cat:"termodinamica",expl:"La flash evaporation avviene quando un liquido a alta T e P subisce un calo brusco di pressione. Una parte vaporizza istantaneamente. A 10 bar→1 bar il 15,9% dell'acqua vaporizza in millisecondi. Spiega la pericolosità degli scoppi."},
  {q:"A quale temperatura 1 litro di acqua pesa esattamente 1 kg?",opts:["0°C","4°C","20°C","100°C"],c:1,cat:"termodinamica",expl:"L'acqua ha densità massima a 4°C (999,97 kg/m³ ≈ 1 kg/L). A temperature più alte o più basse la densità diminuisce. Questo anomalo comportamento è fondamentale per la circolazione naturale nelle caldaie."},
  {q:"Cosa si intende per calore sensibile?",opts:["Energia che cambia lo stato fisico di un corpo","Energia che cambia la temperatura di un corpo senza modificarne lo stato (Q = m·c·ΔT)","Calore percepibile al tatto sulla superficie della caldaia","Calore dei fumi misurato al camino"],c:1,cat:"termodinamica",expl:"Il calore sensibile cambia T senza cambio di stato: Q = m × c × ΔT. Per l'acqua: c = 1 kcal/kg°C. Esempio: riscaldare 500 kg di acqua da 20°C a 80°C richiede 500 × 1 × 60 = 30.000 kcal."},
  {q:"Il passaggio di stato da vapore ad acqua si chiama:",opts:["Sublimazione","Evaporazione","Condensazione","Solidificazione"],c:2,cat:"termodinamica",expl:"La condensazione è il passaggio da vapore a liquido. Avviene cedendo il calore latente (540 kcal/kg a 1 bar). Il processo inverso (liquido→vapore) si chiama evaporazione o vaporizzazione. La sublimazione è il passaggio diretto da solido a gas."},
  {q:"Quando il calore passa attraverso un fluido in moto, si dice che è trasmesso per:",opts:["Conduzione","Irraggiamento","Convezione","Radiazione"],c:2,cat:"termodinamica",expl:"La convezione è la trasmissione del calore attraverso il moto di un fluido (liquido o gas). La conduzione avviene per contatto diretto tra solidi. L'irraggiamento avviene tramite onde elettromagnetiche senza necessità di un mezzo."},
  {q:"Qual è il potere calorifico inferiore (Hi) del metano?",opts:["6.500 kcal/Nm³","8.570 kcal/Nm³","10.200 kcal/Nm³","12.000 kcal/Nm³"],c:1,cat:"combustione",expl:"Hi metano = 8.570 kcal/Nm³ = 35.900 kJ/Nm³. Per confronto: gasolio ~10.200 kcal/kg, nafta ~9.800 kcal/kg, carbone 6.500-7.500 kcal/kg. Hi è il riferimento per il calcolo del rendimento nelle caldaie convenzionali."},
  {q:"Qual è la differenza tra Hi e Hs?",opts:["Hi è per i combustibili solidi, Hs per i gassosi","Hs include il calore latente del vapore acqueo prodotto dalla combustione — Hi no. Hi è il riferimento per le caldaie convenzionali","Hs è sempre inferiore di Hi del 10%","Non c'è differenza pratica"],c:1,cat:"combustione",expl:"Hs (potere calorifico superiore) include il calore latente di condensazione dell'acqua prodotta. Hi (inferiore) non lo include. Per metano: Hs-Hi ≈ 10%. Solo le caldaie a condensazione recuperano questa differenza, superando il 100% di rendimento riferito a Hi."},
  {q:"Qual è la formula di Hassenstein per le perdite al camino?",opts:["P% = CO₂% / (T_fumi - T_aria)","P% = K × (T_fumi - T_aria) / CO₂%, con K=0,46 per metano","P% = T_fumi × CO₂% / K","P% = K × CO₂% × T_fumi"],c:1,cat:"combustione",expl:"P_camino% = K × (T_fumi - T_aria) / CO₂%. K: metano=0,46, nafta=0,58, carbone=0,65. Esempio: metano, T_fumi=220°C, T_aria=20°C, CO₂=9%: P = 0,46 × 200/9 = 10,2%. Ogni 10°C di riduzione T_fumi → +0,5% rendimento."},
  {q:"Cosa indica la presenza di CO nei fumi?",opts:["Eccesso d'aria ottimale","Combustione completa e ben regolata","Combustione incompleta — il carbonio si è ossidato solo a CO invece di CO₂, energia sprecata e gas tossico","Alta temperatura di fiamma"],c:2,cat:"combustione",expl:"CO indica combustione incompleta. Il carbonio cede solo 2.449 kcal/kg invece di 8.130 (solo il 30%). Il CO è tossico: limite sicurezza 35 ppm (TLV-TWA), letale a 1.600 ppm. Oltre 300 ppm in caldaia: fermare il bruciatore."},
  {q:"Qual è il LEL del metano (limite inferiore di esplosività)?",opts:["1% in volume nell'aria","5% in volume nell'aria","10% in volume nell'aria","15% in volume nell'aria"],c:1,cat:"combustione",expl:"LEL metano = 5%, UEL = 15% in aria. Fuori da questo intervallo la miscela non esplode. I rilevatori devono allarmare al 20% del LEL = 1% vol. Il metano è più leggero dell'aria → sensori in ALTO (a soffitto). Il GPL è più pesante → sensori in BASSO."},
  {q:"Perché è obbligatoria la purgatura prima di ogni accensione?",opts:["Per raffreddare la camera","Per eliminare residui di gas combustibile che potrebbero causare deflagrazione o detonazione all'accensione","Per preriscaldare il combustibile","Per controllare la qualità dell'aria"],c:1,cat:"combustione",expl:"La purga è obbligatoria per legge: ≥30 secondi con ventilatore ≥30%. Gas residui + scintilla = deflagrazione (1-5 bar) o detonazione (15-30 bar in microsecondi). Omettere la purga è reato penale."},
  {q:"Qual è l'eccesso d'aria ottimale per una caldaia a metano?",opts:["O₂=0% nei fumi (stechiometrico)","O₂=1-2% nei fumi","O₂=5-8% nei fumi","O₂=10-15% nei fumi"],c:1,cat:"combustione",expl:"Con O₂=1-2% la combustione è completa (CO≈0) con minimo eccesso aria. Meno eccesso aria = meno fumi = meno perdite al camino. Con O₂>4%: ogni 1% in più aggiunge ~0,02% di perdite. Con O₂<1%: rischio CO e incombusti."},
  {q:"Cosa indica il fumo nero al camino di una caldaia a nafta?",opts:["Eccesso d'aria troppo alto","Combustione ottimale con massima efficienza","Combustione incompleta per aria insufficiente o atomizzazione scadente della nafta","Alta temperatura dei fumi"],c:2,cat:"combustione",expl:"Fumo nero = carbonio non bruciato (fuliggine). Cause: aria insufficiente, nafta viscosa (>5°E), ugelli intasati, T focolare bassa. Azione: aumentare aria, verificare temperature di preriscaldo nafta, controllare ugelli."},
  {q:"Qual è la viscosità ottimale della nafta per una buona atomizzazione?",opts:["1-2°E","3-5°E","10-15°E","20-30°E"],c:1,cat:"combustione",expl:"Viscosità ottimale per ugelli meccanici a pressione: 3-5°E (~20-36 cSt). Con viscosità maggiore le goccioline sono troppo grandi → vaporizzazione incompleta → fumo nero. Si raggiunge preriscaldando la nafta a 50-120°C (dipende dal tipo)."},
  {q:"Cos'è l'aria teorica stechiometrica per il metano?",opts:["17,2 kg/kg (o 9,52 Nm³/Nm³)","5 kg/kg","21 kg/kg","50 kg/kg"],c:0,cat:"combustione",expl:"CH₄ + 2O₂ → CO₂ + 2H₂O. L₀ = 2/0,21 = 9,52 Nm³ aria/Nm³ metano = 17,2 kg/kg. È la quantità minima teorica. In pratica si usa sempre un eccesso (n>1) perché la miscelazione perfetta è impossibile."},
  {q:"Cosa si intende per eccesso d'aria?",opts:["L'aria che manca per la combustione completa","La quantità di aria fornita in più rispetto all'aria teorica stechiometrica per garantire combustione completa","L'aria che entra dal camino per raffreddamento","L'aria secondaria del bruciatore"],c:1,cat:"combustione",expl:"Eccesso d'aria = (L_reale - L₀) / L₀ × 100%. Necessario perché la miscelazione perfetta è impossibile. Troppo poco: CO e incombusti. Troppo: fumi più voluminosi e caldi → perdite al camino maggiori."},
  {q:"Ogni 10°C di riduzione della temperatura dei fumi, il rendimento migliora di circa:",opts:["0,1%","0,5%","2%","5%"],c:1,cat:"combustione",expl:"Regola empirica fondamentale: ogni 10°C di riduzione T_fumi → +0,5% di rendimento. Su 1 MW, abbassare i fumi di 40°C (da 250 a 210°C) vale +2% = 20 kW risparmiati continuamente."},
  {q:"Qual è il punto di infiammabilità minimo della nafta da riscaldamento per legge?",opts:["21°C","38°C","55°C","100°C"],c:2,cat:"combustione",expl:"Per legge il punto di infiammabilità della nafta da riscaldamento deve essere ≥55°C (BTZ) o ≥65°C (ATZ). Sotto questo valore i vapori non formano miscela infiammabile. Con il preriscaldo la nafta raggiunge 90-120°C: attenzione alle perdite nelle zone calde."},
  {q:"Cosa sono i NOx e come si formano?",opts:["Ossidi di zolfo formati dalla combustione di combustibili con zolfo","Ossidi di azoto (NO+NO₂) formati dall'ossidazione dell'N₂ dell'aria a temperature >1.300°C","Monossido di carbonio per combustione incompleta","Particolato fine emesso dalla combustione del gasolio"],c:1,cat:"combustione",expl:"Il thermal NOx si forma a T>1.300°C per ossidazione dell'azoto dell'aria. La formazione è esponenziale sopra 1.500°C. Limiti: 100-200 mg/Nm³ per gas. Riduzione: bruciatori low-NOx, ricircolo fumi (FGR)."},
  {q:"Cos'è la CO₂ massima di combustione del metano?",opts:["5,7%","11,7%","15,4%","21%"],c:1,cat:"combustione",expl:"CO₂_max del metano (n=1, stechiometrico) = 11,7%. Con eccesso d'aria il CO₂% scende perché i fumi vengono diluiti dall'azoto. CO₂=9% → eccesso aria = (11,7/9-1)×100 = 30%. Gasolio: CO₂_max=15,4%."},
  {q:"Qual è la differenza tra caldaie a tubi di fumo e a tubi d'acqua?",opts:["Nelle caldaie a tubi di fumo l'acqua scorre nei tubi; nei tubi d'acqua i fumi scorrono dentro","Nelle caldaie a tubi di fumo i fumi scorrono dentro i tubi immersi nell'acqua; nelle caldaie a tubi d'acqua l'acqua scorre dentro i tubi riscaldati esternamente","Le caldaie a tubi di fumo sono sempre più efficienti","Non c'è differenza costruttiva significativa"],c:1,cat:"caldaie",expl:"Tubi di fumo (Cornovaglia, tre giri): i gas caldi circolano dentro i tubi immersi nell'acqua. Grande volume d'acqua, avviamento lento (2-3h), P_max ~20 bar. Tubi d'acqua (B&W): l'acqua circola dentro i tubi riscaldati dai fumi. Piccolo volume, avviamento rapido (20-40 min), P illimitata."},
  {q:"Perché le caldaie B&W sono dette \"non esplodenti\"?",opts:["Perché hanno valvole di sicurezza più efficaci","Perché il piccolo volume d'acqua nei tubi riduce l'energia liberata in caso di rottura — una fessura locale, non un'esplosione catastrofica","Perché operano a pressioni più basse","Perché sono fatte di materiali più resistenti"],c:1,cat:"caldaie",expl:"Il volume d'acqua contenuto nei piccoli tubi è ridotto. In caso di rottura di un tubo si ha uno squarcio localizzato con energia limitata, non un'esplosione del grande corpo cilindrico di una Cornovaglia. Meno acqua sotto pressione = minor potenziale distruttivo."},
  {q:"Cos'è la circolazione naturale in caldaia?",opts:["Il moto dell'acqua generato da una pompa La Mont","Il moto spontaneo dell'acqua per differenza di densità: acqua fredda (densa) scende nei downcomer, miscela acqua-vapore (leggera) sale nei riser","Il tiraggio naturale dei fumi nel camino","La circolazione dell'aria di combustione nel bruciatore"],c:1,cat:"caldaie",expl:"La circolazione naturale avviene per effetto di Archimede: l'acqua densa (ρ≈887 kg/m³ a 10 bar) scende e spinge la miscela acqua-vapore più leggera (ρ≈500 kg/m³) verso l'alto. Diventa insufficiente ad alte pressioni dove le densità si avvicinano."},
  {q:"Qual è il livello minimo dell'acqua nelle caldaie Cornovaglia?",opts:["20 mm sopra il focolare","50 mm sopra il focolare","80 mm (8 cm) sopra la generatrice superiore del focolare","Al centro del corpo cilindrico"],c:2,cat:"caldaie",expl:"Il D.M. 21.05.74 fissa il livello minimo a 80 mm sopra la linea superiore del focolare. Sotto questo limite il focolare emerge dall'acqua → surriscaldamento a secco in pochi secondi → deformazione plastica → rottura catastrofica."},
  {q:"Cos'è il \"duomo\" in un generatore di vapore?",opts:["La camera di combustione","Un'appendice cilindrica sulla sommità del corpo cilindrico dove il vapore viene raccolto risultando più secco per la distanza dalla superficie dell'acqua","Il collettore inferiore dei fanghi","La sezione dei tubi fumogeni superiori"],c:1,cat:"caldaie",expl:"Il duomo è un'appendice sulla sommità del corpo cilindrico. La bassa velocità del fluido e la distanza dalla superficie dell'acqua permettono alle goccioline di ricadere per gravità. Dal duomo parte la valvola di presa vapore."},
  {q:"Cos'è un economizzatore?",opts:["Un sistema che riduce l'eccesso d'aria del bruciatore","Uno scambiatore che recupera il calore residuo dei fumi per preriscaldare l'acqua di alimento — ogni 10°C di preriscaldo = +0,5% rendimento","Un dispositivo per ridurre i NOx","Una valvola di riduzione pressione"],c:1,cat:"caldaie",expl:"L'economizzatore è posizionato nel percorso fumi dopo il surriscaldatore. Recupera calore altrimenti disperso al camino. L'uscita acqua deve restare in subcooling (T < T_sat - 5°C) per evitare vaporizzazione. Payback tipico: 1-3 anni."},
  {q:"Cosa sono i turbolatori nei tubi fumogeni?",opts:["Barre che ostruiscono i tubi per ridurre il tiraggio","Barre metalliche a elica che aumentano la turbolenza nei fumi migliorando lo scambio termico del 20-30%","Dispositivi per misurare la temperatura dei fumi","Sistemi di pulizia automatica"],c:1,cat:"caldaie",expl:"I turbolatori aumentano il numero di Reynolds da ~2.000-3.000 (laminare) a >10.000 (turbolento), migliorando il coefficiente di scambio del 20-30%. Sono estraibili per la pulizia. Aumentano anche le perdite di carico del 10-20%."},
  {q:"Cosa causa le incrostazioni calcaree nelle caldaie?",opts:["L'eccesso di ossigeno disciolto","La precipitazione di CaCO₃ e altri sali sulle superfici calde per inversione di solubilità — CaCO₃ diventa meno solubile all'aumentare della temperatura","Il dosaggio eccessivo di fosfati","La presenza di fuliggine lato fumi"],c:1,cat:"caldaie",expl:"L'inversione di solubilità porta CaCO₃ a precipitare sulle superfici più calde. λ_calcare = 0,9 W/m·K (55× più isolante dell'acciaio). 1 mm di calcare → -2-3% rendimento. 5 mm → -10% rendimento + rischio deformazione focolare."},
  {q:"Cosa sono le pareti membranate?",opts:["Pareti in refrattario per la camera di combustione","Pareti formate da tubi saldati tra loro con piattine d'acciaio — superficie continua a tenuta di gas raffreddata ad acqua, senza muratura","Pareti con doppio strato di isolamento termico","Pareti dove scorrono i fumi"],c:1,cat:"caldaie",expl:"Le pareti membranate eliminano la muratura refrattaria. Vantaggi: zero aria falsa (che altera le analisi di combustione), avviamento rapido, massima superficie di scambio, manutenzione minima. Standard nelle caldaie a tubi d'acqua moderne."},
  {q:"Qual è il prodotto P×V e come classifica il generatore?",opts:["P=potenza in kW, V=volume vapore","P_bollo[kg/cm²] × Volume[litri]: >30.000 → 1ª cat. → patente 2°; 8.000-30.000 → 2ª cat. → patente 1°; ≤8.000 → 3ª cat.","P=pressione in Pa, V=velocità vapore","È un parametro solo per tubi d'acqua"],c:1,cat:"caldaie",expl:"P×V misura l'energia immagazzinata nel generatore. Esempio: P=12 bar (≈12 kg/cm²), V=3.000L → P×V=36.000 → 1ª categoria → patente 2° grado. Più alta l'energia immagazzinata, più severi i requisiti."},
  {q:"Cos'è il passo d'uomo e quali sono le dimensioni minime?",opts:["Un rubinetto di prova del livello","Un'apertura nel corpo cilindrico per l'accesso interno: ellittico minimo 300×400 mm, circolare minimo Ø400 mm","La distanza minima tra la caldaia e le pareti del locale","La valvola di sicurezza principale"],c:1,cat:"caldaie",expl:"Il passo d'uomo permette l'accesso interno per ispezioni e pulizie. I passi d'uomo \"autoclave\" sfruttano la pressione interna per la tenuta: più alta la pressione, meglio chiude. Va aperto SOLO con pressione = zero."},
  {q:"Qual è la differenza tra caldaia Cornovaglia e Lancashire?",opts:["La Cornovaglia ha due focolari, la Lancashire uno","La Cornovaglia ha un unico focolare interno; la Lancashire ne ha due, con maggiore producibilità a parità di ingombro","Non c'è differenza costruttiva","La Cornovaglia è verticale, la Lancashire orizzontale"],c:1,cat:"caldaie",expl:"La Cornovaglia classica ha un unico tubo focolare centrale. La Lancashire ha due focolari: maggiore superficie di riscaldamento, produzione di vapore superiore a parità di ingombro e maggiore flessibilità operativa."},
  {q:"Cos'è il burn-out nelle caldaie?",opts:["Lo spegnimento normale del bruciatore","La crisi termica in cui lo strato di vapore isolante sostituisce il liquido a contatto con la parete → surriscaldamento rapido e cedimento del tubo","L'esaurimento del combustibile","Il blocco del sistema di automazione"],c:1,cat:"caldaie",expl:"Il burn-out avviene quando lo strato di vapore (cattivo conduttore) sostituisce il liquido a contatto con la parete del tubo. La temperatura sale rapidissimamente oltre il limite di snervamento dell'acciaio. Prevenuto con portata minima garantita in ogni tubo."},
  {q:"Qual è la funzione principale delle valvole di sicurezza?",opts:["Regolare la pressione di esercizio","Scaricare automaticamente il vapore in eccesso quando la pressione supera la taratura, impedendo lo scoppio","Intercettare il vapore in caso di emergenza","Controllare la qualità del vapore"],c:1,cat:"sicurezza",expl:"Le valvole di sicurezza sono il dispositivo finale contro la sovrapressione. D.M. 21.05.74: almeno 2 per generatore, Ø min 25mm, non intercettabili, taratura ≤ P_bollo, scarico all'esterno per producibilità >2 t/h. Test manuale: settimanale o mensile."},
  {q:"Quanti indicatori di livello sono obbligatori per legge?",opts:["Uno, purché affidabile","Almeno due indipendenti, di cui almeno uno a visione diretta (a vetro)","Tre con ridondanza elettronica","Il numero non è specificato"],c:1,cat:"sicurezza",expl:"D.M. 21.05.74: almeno 2 indicatori di livello indipendenti per generatore, di cui almeno 1 a lettura diretta. Altezza visibile minima: 150 mm. Devono avere rubinetti di prova (superiore = vapore, inferiore = acqua) per verificarne la funzionalità."},
  {q:"Cos'è il PSHH?",opts:["Un manometro ad alta precisione","Il pressostato di blocco di sicurezza che spegne il bruciatore se la pressione supera il set-point — riarmo MANUALE obbligatorio","Il pressostato di regolazione automatica","Un sensore di temperatura dei fumi"],c:1,cat:"sicurezza",expl:"PSHH (Pressure Switch High High): blocca automaticamente il bruciatore se P supera il set-point (superiore al pressostato di regolazione). Il riarmo MANUALE impone al conduttore di verificare fisicamente la causa prima di riavviare."},
  {q:"Cos'è il LSHH e perché è il dispositivo più critico?",opts:["Un indicatore di livello ottico","Il livellostato di blocco che spegne il bruciatore se il livello scende sotto il minimo — riarmo MANUALE — il basso livello causa surriscaldamento a secco e rottura catastrofica del focolare","Un sistema di controllo automatico del livello","Un misuratore della portata di vapore"],c:1,cat:"sicurezza",expl:"LSHH: spegne il bruciatore quando il livello scende sotto il minimo di sicurezza. Il basso livello è il rischio più grave in caldaia: il focolare scoperto si surriscalda a 400-600°C in secondi → deformazione → rottura esplosiva."},
  {q:"Cosa è obbligatoriamente presente su ogni manometro di caldaia?",opts:["Un secondo manometro di riserva","Un segno rosso indelebile sulla pressione di bollo, fondo scala 1,25-2× P_bollo, collegamento con sifone","Un display digitale con registrazione","Una valvola di sicurezza integrata"],c:1,cat:"sicurezza",expl:"Il manometro deve avere: segno rosso sulla P_bollo (per verificare a colpo d'occhio), fondo scala 1,25-2× P_bollo, sifone (tubo a U pieno d'acqua che protegge lo strumento dal vapore caldo). Minimo 1 per generatore."},
  {q:"Quante pompe di alimento sono obbligatorie per legge?",opts:["Una, purché affidabile","Almeno due indipendenti, ciascuna al 200% della producibilità massima — almeno una indipendente dalla rete elettrica","Tre pompe con sistema a cascata","Il numero dipende dalla potenzialità"],c:1,cat:"sicurezza",expl:"D.M. 21.05.74: almeno 2 pompe indipendenti, ciascuna capace di fornire il 200% della producibilità. Almeno una deve funzionare senza energia elettrica (a vapore, diesel, turbina) per garantire l'alimentazione in caso di blackout."},
  {q:"Come funziona la logica fail-safe nei sistemi di sicurezza?",opts:["Mantiene il bruciatore acceso in caso di guasto per evitare il raffreddamento","Qualsiasi guasto (filo rotto, mancanza tensione) porta automaticamente il sistema nella condizione più sicura: bruciatore spento","Attiva automaticamente la pompa di riserva in caso di guasto","Chiude la valvola di presa vapore in caso di anomalia"],c:1,cat:"sicurezza",expl:"La logica fail-safe usa contatti normalmente chiusi (NC). Il bruciatore è alimentato solo se TUTTI i contatti sono chiusi. Qualsiasi guasto → circuito aperto → bruciatore spento automaticamente. Opposto a ciò che penserebbe un profano."},
  {q:"Cos'è la chiusura \"autoclave\" dei passi d'uomo?",opts:["Un sistema con bulloni ad alta resistenza","Il portello montato dall'interno: la pressione interna lo spinge contro la guarnizione — più alta la pressione, migliore la tenuta","Un sistema di chiusura rapida con cerniere","Un portello con doppio strato di gomma"],c:1,cat:"sicurezza",expl:"Nella chiusura autoclave il portello è leggermente più grande dell'apertura e viene introdotto dall'interno in diagonale. La pressione interna crea la tenuta. Per aprire: ridurre a P=0, poi smontare. Non aprire mai con pressione residua."},
  {q:"Come si riconosce un guasto \"aperto\" in uno scaricatore di condensa?",opts:["Il vapore smette di circolare nell'utenza","Vapore vivo passa continuamente allo scarico — perdita quantificabile: ~100 kg/h per Ø1/2\" a 10 bar","Il livello in caldaia sale improvvisamente","La pressione in caldaia scende"],c:1,cat:"sicurezza",expl:"Scaricatore bloccato aperto: vapore vivo allo scarico → perdita energetica enorme. 10 scaricatori guasti in un impianto medio = ~1.000 kg/h vapore perso = 200.000 €/anno. Ispezione con ultrasuoni: il vapore che passa genera segnale continuo."},
  {q:"Perché dopo il blocco LSHH NON va aggiunta acqua fredda di colpo?",opts:["Perché abbassa troppo la pressione","Perché il focolare a 400-600°C subisce shock termico (ΔT di centinaia di gradi) → tensioni termiche → cricche istantanee nelle pareti in pressione","Perché la valvola di alimento potrebbe rompersi","Perché l'acqua fredda causa priming"],c:1,cat:"sicurezza",expl:"Lo shock termico da acqua fredda su metallo arroventato supera il limite di snervamento dell'acciaio in pochi secondi → cricche irreversibili nelle pareti in pressione. Attendere il raffreddamento parziale (almeno 30 min) poi alimentare gradualmente."},
  {q:"Qual è la funzione del sifone collegato al manometro?",opts:["Misurare la portata del vapore","Proteggere l'elemento sensibile del manometro dalla temperatura e dalle pulsazioni del vapore — il tubo a U si riempie di acqua condensata","Ridurre la pressione prima della lettura","Filtrare le impurità nel vapore"],c:1,cat:"sicurezza",expl:"Il sifone (tubo a U) condensa il vapore al suo interno: il manometro legge la pressione dell'acqua fredda nel tubo, non del vapore caldo. Protegge la molla di Bourdon dalla temperatura che ne causerebbe deformazione permanente."},
  {q:"Quale decreto regola l'esercizio dei generatori di vapore in Italia?",opts:["D.Lgs. 81/2008","D.M. 21.05.74 — 74 articoli su costruzione, esercizio, sicurezza e conduzione dei generatori di vapore in Italia","PED 2014/68/UE","D.P.R. 412/1993"],c:1,cat:"normativa",expl:"Il D.M. 21.05.74 regola l'ESERCIZIO in Italia (verifiche INAIL, patenti, registro, dispositivi obbligatori). La PED 2014/68/UE regola la COSTRUZIONE e l'immissione sul mercato europeo. Le due normative coesistono su ambiti complementari."},
  {q:"Quali sono i requisiti per la patente di 1° grado?",opts:["21 anni, diploma superiore, 2 anni di pratica","18 anni, licenza media (3ª media), 6 mesi di pratica documentata, idoneità medica","25 anni, laurea, 5 anni di pratica","Nessun requisito — basta un corso"],c:1,cat:"normativa",expl:"Patente 1° grado: ≥18 anni, licenza media inferiore, ≥6 mesi di pratica documentata dal datore di lavoro, certificato medico di idoneità. Abilita alla 2ª categoria (P×V ≤ 30.000). Esame teorico + pratico davanti a commissione regionale."},
  {q:"A cosa abilita la patente di 2° grado?",opts:["Solo ai generatori di 3ª categoria","Ai generatori di 1ª categoria (P×V > 30.000) — include le caldaie delle grandi centrali","Ai generatori di qualsiasi categoria senza limiti","Solo alle caldaie a gas naturale"],c:1,cat:"normativa",expl:"La patente di 2° grado abilita alla 1ª categoria (P×V > 30.000). Requisiti: ≥21 anni, diploma superiore (5 anni), ≥2 anni pratica con patente 1° grado su 1ª o 2ª categoria. Condurre caldaie di categoria superiore alla propria patente è reato penale."},
  {q:"Cosa prevede la prova idraulica periodica?",opts:["Riempire di vapore a 2× la pressione di bollo per 1 ora","Riempire di acqua a 1,5× la pressione di bollo per 30 minuti con ispezione visiva","Testare le valvole di sicurezza alla pressione massima","Verificare la tenuta a pressione di esercizio"],c:1,cat:"normativa",expl:"Prova idraulica: acqua (non vapore — incomprimibile, più sicura in caso di cedimento) a 1,5 × P_bollo per 30 minuti. Periodicità: prima messa in servizio, ogni 10 anni, dopo riparazioni alle parti in pressione."},
  {q:"Con quale frequenza avvengono le verifiche periodiche INAIL?",opts:["Ogni anno per tutte le verifiche","Verifica integrità e funzionamento: ogni 2 anni; prova idraulica: ogni 10 anni","Ogni 5 anni per tutte le verifiche","Solo alla prima messa in servizio"],c:1,cat:"normativa",expl:"INAIL: verifica di integrità (visita interna) ogni 2 anni, verifica di funzionamento ogni 2 anni, prova idraulica ogni 10 anni. Scadenze non rispettate → messa fuori servizio obbligatoria del generatore fino all'effettuazione della verifica."},
  {q:"Cosa è la Direttiva PED 2014/68/UE?",opts:["La normativa italiana per l'esercizio","La direttiva europea che regola progettazione, fabbricazione e conformità delle attrezzature a pressione (PS>0,5 bar) per il mercato europeo","Il regolamento europeo per le patenti","La direttiva sulle emissioni"],c:1,cat:"normativa",expl:"PED (Pressure Equipment Directive): regola la COSTRUZIONE. Classifica le attrezzature in 4 categorie (I-IV) per rischio. Richiede marcatura CE. Un generatore marcato CE deve comunque rispettare il D.M. 21.05.74 per essere esercito in Italia."},
  {q:"Cosa contiene il libretto matricolare?",opts:["Solo le analisi dell'acqua settimanali","Dati tecnici, verbali di tutte le verifiche INAIL, analisi acque, registrazione manutenzioni significative — accompagna il generatore per tutta la vita","Il manuale operativo del costruttore","Solo i dati del costruttore"],c:1,cat:"normativa",expl:"Il libretto matricolare è il documento storico del generatore. Deve essere tenuto aggiornato e disponibile in sala caldaia per le ispezioni. In caso di cessione, passa obbligatoriamente all'acquirente. La perdita richiede ricostruzione con INAIL e probabile nuova prova idraulica."},
  {q:"Cosa prevedono i requisiti dell'Art. 43 del D.M. 21.05.74 per il funzionamento non presidiato?",opts:["Qualsiasi caldaia con sistema di allarme","P ≤ 15 bar + producibilità ≤ 3.000 kg/h + PSHH + LSHH + allarmi ottico-acustici + registro settimanale firmato","P ≤ 1 bar e producibilità ≤ 500 kg/h","Solo caldaie a gas"],c:1,cat:"normativa",expl:"Art. 43: tutte le condizioni devono essere soddisfatte simultaneamente. Il registro giornaliero deve essere firmato settimanalmente da conduttore patentato. La firma implica la responsabilità del corretto funzionamento settimanale dell'impianto."},
  {q:"Cosa è obbligatorio fare prima di mettere in servizio un nuovo generatore?",opts:["Solo comunicarlo verbalmente all'INAIL","Presentare denuncia all'INAIL con documenti tecnici, attendere la prima verifica e l'assegnazione della matricola INAIL","Avviarlo e comunicarlo entro 30 giorni","Solo affiggere il libretto in sala caldaia"],c:1,cat:"normativa",expl:"Denuncia INAIL obbligatoria PRIMA dell'avviamento: certificato costruttore, DoC CE, disegno installazione, libretto matricolare. L'INAIL assegna la matricola univoca dopo la prima verifica positiva. Avviare senza denuncia è illegale."},
  {q:"Cosa è il DVR e chi deve elaborarlo?",opts:["Il Documento di Verifica del Rendimento — elaborato dall'INAIL","Il Documento di Valutazione dei Rischi — obbligo NON delegabile del datore di lavoro per tutte le aziende. Mancanza = reato penale (arresto 3-6 mesi)","Un documento volontario per le grandi aziende","Il verbale delle verifiche INAIL"],c:1,cat:"normativa",expl:"DVR (D.Lgs. 81/2008, Art. 28): obbligatorio per tutte le aziende con lavoratori. Non delegabile dal datore di lavoro (insieme alla nomina RSPP). Per la sala caldaia deve includere: ATEX, CO, rischio chimico, rumore, calore, spazi confinati."},
  {q:"Cos'è la durezza temporanea dell'acqua?",opts:["Durezza causata da solfati di calcio che non precipita per bollitura","Durezza causata da bicarbonati di calcio e magnesio che precipitano come CaCO₃ quando l'acqua viene riscaldata — principale causa di incrostazioni","Durezza causata dal cloro dell'acqua potabile","Una caratteristica senza effetti sulle caldaie"],c:1,cat:"acque",expl:"La durezza temporanea (carbonatica): Ca(HCO₃)₂ → CaCO₃↓ + H₂O + CO₂↑ con il riscaldamento. Si deposita come calcare bianco sulle superfici calde. La durezza permanente (solfati, cloruri) non precipita per bollitura — richiede addolcimento con resine."},
  {q:"Perché l'ossigeno disciolto è pericoloso nelle caldaie?",opts:["Perché aumenta il pH dell'acqua","Perché causa corrosione per pitting — crateri localizzati profondi non visibili esternamente, portano alla rottura improvvisa","Perché favorisce le incrostazioni calcaree","Perché riduce il calore latente del vapore"],c:1,cat:"acque",expl:"Il pitting è la forma di corrosione più pericolosa: si sviluppa in profondità invisibilmente. Limite: <10 μg/L. Eliminare con degasazione termica + idrazina (N₂H₄ + O₂ → N₂ + 2H₂O). L'idrazina è cancerogena probabile (IARC 2A): DPI obbligatori."},
  {q:"Qual è il pH ottimale dell'acqua nel corpo cilindrico?",opts:["6,5-7,5 (neutro)","8,0-9,0","10-11 — zona di stabilità della magnetite protettiva (Fe₃O₄)","12-13"],c:2,cat:"acque",expl:"A pH 10-11 si forma magnetite Fe₃O₄: strato protettivo aderente. pH<7: corrosione acida rapida e generalizzata. pH>12: corrosione caustica localizzata sotto i depositi (l'NaOH si concentra per evaporazione locale). Regolare con NaOH."},
  {q:"Come funziona il trattamento con fosfati in caldaia?",opts:["Si aggiunge H₃PO₄ per abbassare il pH","I fosfati reagiscono con il Ca²⁺ formando idrossiapatite — un fango morbido non aderente rimovibile con lo spurgo, invece di incrostazioni dure di CaCO₃","I fosfati eliminano l'ossigeno disciolto","I fosfati aumentano la conducibilità dell'acqua"],c:1,cat:"acque",expl:"Idrossiapatite Ca₅(OH)(PO₄)₃: precipitato morbido che si raccoglie sul fondo e viene rimosso dallo spurgo di fondo. Invece di calcare duro si forma un fango controllabile. Concentrazione: 10-30 mg/L PO₄³⁻. Eccesso: precipitazione di fosfato di magnesio (più duro)."},
  {q:"Cos'è il fattore di concentrazione e come si calcola?",opts:["FC = P_bollo / P_esercizio","FC = TDS_caldaia / TDS_reintegro. FC alto = meno spurgo = risparmio ma rischio incrostazioni. % spurgo = TDS_alimento / (TDS_max - TDS_alimento) × 100","FC = portata vapore / portata alimento","FC = numero di avviamenti per anno"],c:1,cat:"acque",expl:"FC = TDS_caldaia / TDS_reintegro = 1/(% spurgo /100). Con TDS_alimento=200 e limite=3.000: % spurgo = 200/(3.000-200) × 100 = 7,1%. FC=14. Ogni miglioramento della qualità dell'acqua di alimento permette FC più alto con stessa qualità in caldaia."},
  {q:"Cosa sono le ammine volatili e a cosa servono?",opts:["Additivi per aumentare il potere calorifico","Sostanze che si volatilizzano nel vapore, si ridissolvono nelle condense innalzando il pH (target 8,5-9,5) e proteggendo le tubazioni di ritorno dalla corrosione da CO₂","Inibitori di corrosione per le parti esterne della caldaia","Acceleratori della combustione"],c:1,cat:"acque",expl:"Le ammine (morfolina, cicloesilammina) proteggono il circuito condense dalla CO₂ che forma acido carbonico. La morfolina è la più diffusa e biodegradabile. Eccesso: corrode le leghe di rame. Controllare periodicamente il pH delle condense in più punti."},
  {q:"Qual è il principio della degasazione termica?",opts:["Filtrare l'acqua con membrane semipermeabili","Riscaldare l'acqua alla T di saturazione: la solubilità dei gas (O₂ e CO₂) scende a zero per Legge di Henry — i gas vengono evacuati dallo sfiato sempre aperto","Aggiungere prodotti chimici che reagiscono con i gas","Applicare una corrente elettrica"],c:1,cat:"acque",expl:"La Legge di Henry: la solubilità dei gas diminuisce all'aumentare della T. Il degasatore porta l'acqua a 105-130°C (1,2-2,7 bar): O₂ e CO₂ si liberano. O₂ residuo: 5-10 μg/L. Lo sfiato deve essere SEMPRE aperto — se si chiude i gas restano nell'acqua."},
  {q:"Perché la silice è pericolosa negli impianti con turbine?",opts:["Perché abbassa il pH dell'acqua","Ad alta pressione è volatile e si trasferisce nel vapore, precipitando sulle palette come quarzo (durezza 9/10 Mohs) — quasi impossibile da rimuovere","Perché reagisce con l'acciaio","Perché riduce il calore latente"],c:1,cat:"acque",expl:"La silice volatile a P>30-50 bar precipita sulle palette come quarzo. Altera il profilo aerodinamico, causa vibrazioni, rischio rottura. Solubile praticamente solo in HF (acido fluoridrico, pericolosissimo). Limite: <20 ppb per alte pressioni. Solo la demineralizzazione la rimuove efficacemente."},
  {q:"Cosa si intende per addolcimento dell'acqua?",opts:["Ridurre la temperatura dell'acqua prima dell'ingresso in caldaia","Rimuovere Ca²⁺ e Mg²⁺ (durezza) con resine cationiche Na⁺ — durezza=0 ma TDS e conducibilità rimangono invariati","Rimuovere tutti i sali disciolti","Abbassare il pH dell'acqua"],c:1,cat:"acque",expl:"Addolcimento: resine cationiche Na⁺ scambiano Ca²⁺ e Mg²⁺ con Na⁺. Risultato: durezza=0. Ma TDS e conducibilità rimangono uguali (i sali di sodio sono altrettanto ionizzati). Non rimuove silice, solfati, cloruri. Sufficiente per caldaie fino a 40-60 bar."},
  {q:"Come si esegue lo spurgo di fondo?",opts:["Si apre lo sfiato del duomo brevemente","Si apre la valvola di spurgo dal punto più basso del corpo cilindrico per 15-30 secondi — rimuove i fanghi sedimentati (ossidi, precipitati)","Si scarica il manometro principale","Si apre la valvola di presa vapore"],c:1,cat:"acque",expl:"Lo spurgo di fondo rimuove i fanghi sedimentati (CaCO₃ precipitato, ossidi di ferro). Frequenza: 1-2 volte/giorno. L'acqua a 184°C esce sotto pressione — convogliarla in sicurezza. Dopo: verificare che la valvola sia completamente chiusa. Registrare sul registro."},
  {q:"Quanti Pascal equivale 1 bar?",opts:["1.000 Pa","10.000 Pa","100.000 Pa","1.000.000 Pa"],c:2,cat:"fisica",expl:"1 bar = 100.000 Pa = 100 kPa = 0,1 MPa. Altre conversioni: 1 bar ≈ 1 kg/cm² ≈ 10,2 mH₂O ≈ 1 atm ≈ 750 mmHg. Regola pratica: 1 bar ≈ 1 kg/cm² ≈ 10 mH₂O."},
  {q:"Quante kcal equivale 1 kWh?",opts:["100 kcal","430 kcal","860 kcal","4.186 kcal"],c:2,cat:"fisica",expl:"1 kWh = 860 kcal = 3.600 kJ. Inverso: 1 kcal = 4,186 kJ. Potenza: 1 kW = 860 kcal/h. Formula potenza caldaia: P[kW] = W[kg/h] × (h_s - h_a)[kcal/kg] / 860."},
  {q:"Cosa afferma la Legge di Boyle?",opts:["A pressione costante, V è proporzionale a T","A temperatura costante, P × V = costante per un gas ideale — NON vale per il vapore saturo che cambia stato","A volume costante, P è proporzionale a T","Il volume è proporzionale alla massa"],c:1,cat:"fisica",expl:"Boyle (isotermo): P₁V₁ = P₂V₂. ATTENZIONE: vale solo per gas ideali, NON per vapore saturo. Per il vapore saturo la pressione resta costante durante la condensazione/vaporizzazione (usa le tavole del vapore, non Boyle)."},
  {q:"Cosa afferma la Legge di Gay-Lussac?",opts:["A temperatura costante, PV = costante","A volume costante, P/T = costante (T in Kelvin)","A pressione costante, V/T = costante","La massa è proporzionale al volume"],c:1,cat:"fisica",expl:"Gay-Lussac (isocoro): P₁/T₁ = P₂/T₂. T in Kelvin obbligatoriamente. Esempio: gas a 2 bar e 20°C (293K) riscaldato a 120°C (393K): P₂ = 2 × 393/293 = 2,68 bar. Spiega perché una caldaia con valvola bloccata e bruciatore acceso va rapidamente in pressione."},
  {q:"La pressione idrostatica di 10 m di colonna d'acqua è circa:",opts:["0,1 bar","1 bar","10 bar","0,5 bar"],c:1,cat:"fisica",expl:"P = ρ×g×h = 1.000 × 9,81 × 10 = 98.100 Pa ≈ 1 bar. Regola pratica: 10 m di colonna d'acqua ≈ 1 bar. Importante per capire le letture di manometri installati a diverse altezze sulla stessa caldaia."},
  {q:"Qual è la conducibilità termica λ della fuliggine rispetto all'acciaio?",opts:["Uguale all'acciaio (50 W/m·K)","5 volte inferiore","500 volte inferiore (λ_fuliggine≈0,1 vs λ_acciaio≈50 W/m·K)","2 volte inferiore"],c:2,cat:"fisica",expl:"λ_fuliggine ≈ 0,1 W/m·K vs λ_acciaio ≈ 50 W/m·K → 500 volte più isolante. Il calcare è 55 volte più isolante (λ≈0,9). 1 mm di fuliggine → +20-30°C T_fumi e -2-3% rendimento. Meno spessore, più danno rispetto al calcare."},
  {q:"Qual è il coefficiente di dilatazione lineare dell'acciaio?",opts:["1,2×10⁻⁴ K⁻¹","12×10⁻⁶ K⁻¹","1,2×10⁻⁶ K⁻¹","50×10⁻⁶ K⁻¹"],c:1,cat:"fisica",expl:"α_acciaio = 12×10⁻⁶ K⁻¹. Esempio: tubo 20 m da 20°C a 200°C → ΔL = 20 × 12×10⁻⁶ × 180 = 43,2 mm. Per questo sono obbligatori giunti di dilatazione ogni 20-30 m nelle tubazioni a vapore."},
  {q:"Cosa indica Re > 4.000 (numero di Reynolds)?",opts:["Regime laminare con scambio termico scarso","Zona di transizione instabile","Regime turbolento con ottimo scambio termico","Regime supersonico"],c:2,cat:"fisica",expl:"Re = ρ×v×D/μ. Re<2.300: laminare. 2.300-4.000: transitorio. Re>4.000: turbolento → rimescolamento intenso → scambio termico ottimale. I turbolatori nei tubi fumogeni aumentano Re da ~2.000 a >10.000, migliorando il coefficiente di scambio del 20-30%."},
  {q:"Qual è la formula dello spessore minimo del fasciame?",opts:["s = P × D / σ_amm","s = (P × D) / (2 × σ_amm × η) + c — dove η è il coefficiente di giuntura e c il sovraspessore di corrosione","s = σ_amm × D / (P × η)","s = P × D × η / (2 × σ_amm)"],c:1,cat:"fisica",expl:"η dipende dalla qualità del controllo saldature: 1,0 con radiografia 100%, 0,85 parziale, 0,70 senza. Un η=0,70 invece di 1,0 aumenta lo spessore del 43%. c (corrosione) = 1-3 mm tipicamente."},
  {q:"Qual è la sequenza obbligatoria di avviamento da freddo?",opts:["Accendere bruciatore → riempire d'acqua → verificare strumenti","Verifica pre-avviamento → sfiati aperti → riempimento acqua → verifica PSHH e LSHH → PURGA ≥30 sec ≥30% ventilatore → accensione → salita progressiva","Riempire d'acqua → accendere subito — la caldaia si autoregola","Accendere a minima potenza senza purgare se ferma meno di 24h"],c:1,cat:"conduzione",expl:"La purga è il passaggio più critico e OBBLIGATORIO per legge. Gas residui + scintilla = deflagrazione o detonazione. Omettere è reato penale. Il tempo di salita da freddo: Cornovaglia 2-3h, B&W 20-40 min. Salita troppo rapida → tensioni termiche nelle giunzioni."},
  {q:"Cos'è il fenomeno dello \"swell\"?",opts:["Lo scorrimento lento dell'acqua nei riser","L'innalzamento APPARENTE del livello per formazione di bolle nell'acqua riscaldata — il livello reale può stare scendendo","L'aumento di pressione durante la salita a regime","La dilatazione del fasciame per calore"],c:1,cat:"conduzione",expl:"Lo swell è paradossale: il livello apparente sale (più bolle = più volume) ma la massa d'acqua può diminuire. Un conduttore inesperto potrebbe ridurre l'alimentazione — errore pericoloso. Attendere la stabilizzazione prima di agire sul livello."},
  {q:"Cosa deve fare il conduttore dopo il blocco LSHH?",opts:["Resettare subito e aggiungere acqua a piena portata","Spegnere il bruciatore (automatico), chiudere valvola presa, attendere raffreddamento parziale (≥30 min), poi alimentare GRADUALMENTE — mai acqua fredda di colpo","Aprire lo spurgo e poi riempire la caldaia","Chiamare l'INAIL prima di qualsiasi azione"],c:1,cat:"conduzione",expl:"Il focolare può essere a 400-600°C. Acqua fredda di colpo → ΔT di centinaia di gradi in secondi → cricche per shock termico. Attendere raffreddamento parziale poi alimentare lentamente. Identificare la causa del basso livello prima del riavvio."},
  {q:"Come si collega correttamente una caldaia al collettore vapore comune?",opts:["Aprire la valvola principale a tutta apertura immediatamente","Portare la caldaia a P leggermente SUPERIORE al collettore → preriscaldare il tronchetto → aprire LENTAMENTE la valvola principale","Aprire metà valvola per 5 minuti, poi completamente","L'ordine non è importante se le valvole sono dimensionate correttamente"],c:1,cat:"conduzione",expl:"Se P_caldaia < P_collettore: il vapore del collettore entra nella caldaia più fredda → condensazione istantanea → colpi d'ariete violenti. La caldaia da collegare deve avere P leggermente superiore. Aprire lentamente per preriscaldare il tronchetto di collegamento."},
  {q:"Cos'è il priming e come si gestisce?",opts:["Il preriscaldo della nafta prima dell'accensione","Il trascinamento di goccioline d'acqua di caldaia nel vapore. Gestione: ridurre il bruciatore + spurgo di superficie per abbassare TDS + ridurre il livello se alto","Il blocco della pompa per eccesso di pressione","La procedura di avviamento dopo lungo fermo"],c:1,cat:"conduzione",expl:"Segnali di priming: livello oscillante, pressione instabile, colpi d'ariete, gorgoglio alla valvola di presa. TDS alto abbassa la tensione superficiale → le bolle non collassano → schiuma → priming. Vapore umido → depositi di sali sulle palette turbine."},
  {q:"Quali analisi dell'acqua deve eseguire quotidianamente il conduttore?",opts:["Solo il pH una volta a settimana","Durezza acqua alimento, pH (alimento + caldaia), conducibilità, O₂ disciolto — tutto registrato con data, ora e firma","Solo analisi visiva del colore dell'acqua","Solo analisi chimiche mensili affidate a laboratorio"],c:1,cat:"conduzione",expl:"Analisi giornaliere obbligatorie: durezza acqua alimento, pH alimento e caldaia, conducibilità, O₂ disciolto. Settimanali: fosfati, alcalinità, cloruri. Mensili: silice, ferro, rame. Registrare sempre con valori numerici, non \"nella norma\"."},
  {q:"Cosa deve contenere il registro giornaliero?",opts:["Solo la firma del conduttore e la data","Pressione, livello, temperature, analisi acque con valori numerici, test dispositivi sicurezza, anomalie con azione correttiva — data e ora precisa, firma","Solo i valori fuori norma","Solo il consumo di combustibile"],c:1,cat:"conduzione",expl:"Errori gravi da evitare: compilazione anticipata, uso bianchetto (usare linea con data e firma), voci generiche \"nella norma\", spazi vuoti, omissione di anomalie. Il registro è documento legale: consultabile da INAIL in qualsiasi momento."},
  {q:"Cosa fare in caso di perdita di gas in sala caldaia?",opts:["Accendere le luci e verificare l'entità della perdita","Chiudere la valvola principale del gas, aprire porte e finestre, evacuare, NON usare interruttori elettrici, chiamare VVF (115) e gestore gas dall'esterno","Continuare l'esercizio e chiamare la manutenzione","Usare un estintore CO₂ per diluire il gas"],c:1,cat:"conduzione",expl:"Il metano è più leggero dell'aria: sale verso il soffitto. NON usare interruttori (scintille!). Prima chiudere il gas, poi ventilare ed evacuare. Chiamare sempre dall'esterno del locale — il telefono all'interno potrebbe innescare una scintilla."},
  {q:"Cos'è lo spurgo di superficie e a cosa serve?",opts:["Scarica l'acqua dal fondo per rimuovere i fanghi","Scarica l'acqua dalla zona superficiale dove i sali si concentrano per evaporazione — abbassa TDS e previene schiuma e priming","Raffredda il vapore in eccesso","Rimuove il vapore dal duomo in caso di alta pressione"],c:1,cat:"conduzione",expl:"Lo spurgo di superficie rimuove l'acqua dalla zona dove TDS è più alto (superficie libera, per effetto dell'evaporazione continua). Abbassa la conducibilità/TDS dell'acqua in caldaia. Può essere continuo (con valvola regolatrice) o intermittente."},
  {q:"Cosa indica un aumento progressivo della temperatura dei fumi nel tempo?",opts:["Eccesso d'aria aumentato","Bruciatore che lavora a potenza inferiore","Sporcamento progressivo delle superfici di scambio (fuliggine lato fumi o calcare lato acqua)","La caldaia è in ottimo stato di manutenzione"],c:2,cat:"conduzione",expl:"Il segnale più precoce di sporcamento: la T_fumi sale lentamente settimane/mesi. Fuliggine o calcare isolano le superfici → meno calore ceduto all'acqua → più calore nei fumi. Anche l'indice di vaporizzazione cala. Pianificare pulizia quando T_fumi supera +15-20°C dal valore di riferimento."},
  {q:"Qual è l'entalpia del vapore saturo secco a 10 bar?",opts:["186 kcal/kg","478 kcal/kg","664 kcal/kg","540 kcal/kg"],c:2,cat:"termodinamica",expl:"A 10 bar: h_liquido=186 kcal/kg, calore latente r=478 kcal/kg, h_vapore_secco=186+478=664 kcal/kg. L'entalpia del vapore saturo secco si calcola sempre come h_v = h_l + r. Dalle tavole del vapore si legge direttamente."},
  {q:"Qual è l'entalpia approssimativa dell'acqua di alimento a 80°C?",opts:["800 kcal/kg","80 kcal/kg","8 kcal/kg","180 kcal/kg"],c:1,cat:"termodinamica",expl:"Per l'acqua liquida fino a ~120°C vale l'approssimazione pratica: h_a [kcal/kg] ≈ T [°C]. Quindi a 80°C: h_a ≈ 80 kcal/kg. Errore <2%. Utile per calcoli rapidi della potenza utile della caldaia senza consultare le tavole."},
  {q:"Come si calcola la potenza utile di una caldaia in kW?",opts:["P = W × Hi / 860","P = W × (h_vapore - h_alimento) / 860","P = B × Hi × rendimento","P = W × h_vapore / 3600"],c:1,cat:"termodinamica",expl:"P[kW] = W[kg/h] × (h_s - h_a)[kcal/kg] / 860. Il denominatore 860 converte da kcal/h a kW (1 kW = 860 kcal/h). Esempio: 2.000 kg/h a 10 bar con acqua alimento a 80°C: P = 2.000 × (664-80)/860 = 1.358 kW."},
  {q:"Cosa si intende per processo adiabatico?",opts:["Processo a pressione costante","Processo a temperatura costante","Processo senza scambio di calore con l'esterno (Q=0)","Processo a volume costante"],c:2,cat:"termodinamica",expl:"In un processo adiabatico Q=0: nessun calore entra o esce dal sistema. L'espansione del vapore in turbina è approssimabile come adiabatica. Per un gas ideale in espansione adiabatica reversibile (isentropica): P·Vᵞ = costante."},
  {q:"Cosa si intende per processo isobaro?",opts:["Processo a volume costante","Processo a entropia costante","Processo a pressione costante — il riscaldamento dell'acqua in caldaia avviene a P costante","Processo a temperatura costante"],c:2,cat:"termodinamica",expl:"In un processo isobaro P = costante. Il riscaldamento dell'acqua di alimento in caldaia (dalla T di ingresso a T_sat) e la vaporizzazione avvengono entrambi a pressione costante. Il calore scambiato: Q = m×c_p×ΔT per i liquidi, Q = m×r per la vaporizzazione."},
  {q:"Cosa si intende per entalpia di un fluido?",opts:["La temperatura del fluido in gradi Kelvin","Il contenuto energetico totale per unità di massa: h = energia interna + lavoro di pressione (Pv)","La pressione moltiplicata per il volume specifico","La velocità del fluido nella tubazione"],c:1,cat:"termodinamica",expl:"L'entalpia h = u + Pv [kcal/kg o kJ/kg]. Nelle caldaie è la grandezza fondamentale perché include sia l'energia interna sia il termine di flusso. La differenza di entalpia tra vapore prodotto e acqua di alimento determina la potenza utile della caldaia."},
  {q:"Cosa accade al calore latente di vaporizzazione all'aumentare della pressione?",opts:["Rimane costante a 540 kcal/kg","Aumenta progressivamente","Diminuisce progressivamente fino ad annullarsi al punto critico (221 bar)","Raddoppia ogni 10 bar"],c:2,cat:"termodinamica",expl:"Il calore latente r diminuisce all'aumentare della pressione: a 1 bar r=540 kcal/kg, a 10 bar r=478, a 50 bar r=362, a 100 bar r=270, fino ad annullarsi a 221 bar (punto critico). Questo spiega perché le caldaie ad alta pressione richiedono meno energia per la vaporizzazione ma il vapore è meno \"energico\"."},
  {q:"Qual è il calore latente di fusione dell'acqua (ghiaccio → acqua)?",opts:["540 kcal/kg","100 kcal/kg","80 kcal/kg","1 kcal/kg"],c:2,cat:"termodinamica",expl:"Il calore latente di fusione dell'acqua è 80 kcal/kg (335 kJ/kg), molto inferiore al latente di vaporizzazione (540 kcal/kg). Per sciogliere il ghiaccio serve 80 kcal/kg; per vaporizzare l'acqua serve 540 kcal/kg — quasi 7 volte di più."},
  {q:"Cosa si intende per subcooling (sottoraffreddamento)?",opts:["Vapore con titolo X inferiore a 1","Liquido a temperatura inferiore alla sua T_sat alla pressione locale — condizione obbligatoria nell'economizzatore","Raffreddamento rapido del vapore con acqua","La zona al di sotto del livello minimo in caldaia"],c:1,cat:"termodinamica",expl:"Il subcooling (T < T_sat) è fondamentale nell'economizzatore: l'uscita dell'acqua deve restare almeno 5°C sotto T_sat per evitare vaporizzazione locale (bolle → colpi d'ariete). A 10 bar (T_sat=184°C): T_uscita economizzatore max = 179°C."},
  {q:"Come si calcola l'entalpia del vapore saturo umido con titolo X?",opts:["h = h_l × X + h_v × (1-X)","h = (1-X)×h_l + X×h_v","h = h_v / X","h = h_l + r"],c:1,cat:"termodinamica",expl:"h_umido = (1-X)×h_l + X×h_v. Esempio a 10 bar con X=0,9: h = (0,1×186) + (0,9×664) = 18,6 + 597,6 = 616 kcal/kg. Con X=1 (vapore secco): h = h_v = 664. Con X=0 (liquido saturo): h = h_l = 186."},
  {q:"Cosa indica il triangolo di Ostwald?",opts:["Il profilo di velocità dell'aria nel bruciatore","Un diagramma CO₂% vs O₂% che mostra se la combustione è completa — punti sulla linea = CO assente, punti interni = CO presente","Le temperature in camera di combustione","Le perdite di calore per irraggiamento"],c:1,cat:"combustione",expl:"Il triangolo di Ostwald è specifico per ogni combustibile. La CO₂_max del metano è 11,7%. Con O₂ e CO₂ misurati si verifica se il punto cade sulla linea di combustione completa (CO=0) o all'interno (CO presente). Metodo alternativo all'analisi diretta del CO."},
  {q:"Qual è la CO₂ massima di combustione del gasolio?",opts:["11,7%","13,2%","15,4%","18,0%"],c:2,cat:"combustione",expl:"CO₂_max gasolio = 15,4%. Nafta ≈ 15,8%. Metano = 11,7%. Carbone ~18-20%. Più alto è il contenuto di C/H nel combustibile, più alta è CO₂_max. Se misuro CO₂=10% su gasolio: eccesso aria = (15,4/10-1)×100 = 54% — troppo."},
  {q:"Cos'è la temperatura di autoaccensione del gasolio?",opts:["100°C","250°C","537°C","700°C"],c:1,cat:"combustione",expl:"Gasolio: autoaccensione ~250°C. Metano: ~537°C. Nafta: ~230-280°C. Se una superficie è a temperatura superiore all'autoaccensione del combustibile, il combustibile si incendia spontaneamente. Una perdita di gasolio su una flangia non isolata a 300°C → incendio immediato."},
  {q:"Cosa si intende per bruciatore a premiscelazione?",opts:["Bruciatore dove aria e combustibile si miscelano dopo l'accensione","Bruciatore dove gas e aria vengono miscelati prima della combustione — miscela omogenea, T fiamma più bassa, meno NOx","Bruciatore con due stadi di combustione","Bruciatore per combustibili liquidi"],c:1,cat:"combustione",expl:"Nei bruciatori a premiscelazione la miscela gas-aria è formata prima di raggiungere la testa bruciante. Vantaggi: combustione completa, bassi NOx (<30 ppm), modulazione fino al 20%. Rischio: flashback (ritorno di fiamma nel venturi) se la velocità scende sotto la velocità di propagazione."},
  {q:"Cos'è il ricircolo fumi (FGR) e a cosa serve?",opts:["Ricircolare i fumi nel serbatoio del combustibile per preriscaldarlo","Ricircolare una parte dei fumi (10-30%) verso il bruciatore per diluire l'aria comburente e abbassare la T di fiamma — riduce i NOx del 40-60%","Ricircolare i fumi per recuperare calore prima del camino","Ricircolare l'aria di combustione per aumentare l'efficienza"],c:1,cat:"combustione",expl:"FGR (Flue Gas Recirculation): i fumi già raffreddati vengono reimmessi nel venturi del bruciatore. Meno O₂ disponibile + maggiore calore specifico della miscela = T fiamma più bassa = meno NOx. Usato in combinazione con bruciatori low-NOx per raggiungere <50 mg/Nm³."},
  {q:"Come si riconosce la combustione ottimale dall'analisi fumi?",opts:["CO₂=0%, O₂=21%, CO=0 ppm","CO₂ vicina al massimo, O₂=1-2% per il metano, CO<100 ppm","CO₂ al massimo, O₂=0%, CO=0 ppm","O₂=10%, CO₂ bassa, CO=0 ppm"],c:1,cat:"combustione",expl:"La combustione ottimale per il metano: CO₂ vicino a 10-11% (prossimo al max di 11,7%), O₂=1-2%, CO<100 ppm. Con O₂=0% si avrebbe combustione incompleta (CO). Con O₂>4%: eccesso eccessivo con perdite al camino aumentate. Il punto ottimale bilancia le due perdite."},
  {q:"Qual è il potere calorifico inferiore del gasolio?",opts:["6.500 kcal/kg","8.570 kcal/kg","10.200 kcal/kg","12.000 kcal/kg"],c:2,cat:"combustione",expl:"Hi gasolio ≈ 10.200 kcal/kg = 42.700 kJ/kg. Per confronto: metano 8.570 kcal/Nm³ (ma 1 Nm³ pesa solo 0,717 kg → Hi_metano ≈ 11.950 kcal/kg su base massica). Nafta ATZ ≈ 9.800 kcal/kg. Carbone bituminoso ≈ 6.500-7.500 kcal/kg."},
  {q:"Cos'è l'indice di Wobbe e perché è importante?",opts:["Il rapporto tra eccesso d'aria e CO₂","W = Hi / √(densità relativa) — gas con stesso indice di Wobbe danno la stessa potenza termica dallo stesso bruciatore senza regolazione","Il rendimento del bruciatore in percentuale","Il tempo di ritardo tra accensione pilota e accensione principale"],c:1,cat:"combustione",expl:"L'indice di Wobbe W = Hi/√d caratterizza l'intercambiabilità dei gas. Se la composizione del gas di rete cambia (es. più CO₂ o N₂ per miscelazione con biometano), W cambia → cambia la potenza del bruciatore → il conduttore deve verificare le analisi fumi."},
  {q:"Perché la purgatura deve durare almeno 30 secondi?",opts:["Per preriscaldare la camera di combustione","Per garantire almeno 3 ricambi d'aria della camera e dei condotti fumi, eliminando qualsiasi residuo di gas combustibile","Per stabilizzare la pressione del combustibile","Per verificare il funzionamento del ventilatore"],c:1,cat:"combustione",expl:"I 30 secondi al 30% del ventilatore garantiscono almeno 3 ricambi dell'aria in camera di combustione. Con meno ricambi potrebbero restare sacche di gas in zone poco ventilate (angoli, cavità) che all'accensione portano a deflagrazione. Il tempo minimo è fissato dalla norma EN 746-2."},
  {q:"Cos'è la deflagrazione e come si distingue dalla detonazione?",opts:["Sono sinonimi — entrambe distruggono istantaneamente la caldaia","Deflagrazione: fronte di fiamma subsonico (10-100 m/s), sovrapressione 1-5 bar, meno distruttiva. Detonazione: supersonica (1.500-3.000 m/s), sovrapressione 15-30 bar, catastrofica","Deflagrazione riguarda i gas, detonazione i liquidi","Deflagrazione avviene sempre, detonazione mai in caldaia"],c:1,cat:"combustione",expl:"La deflagrazione può danneggiare il bruciatore e la camera ma la caldaia può sopravvivere. La detonazione (DDT: Deflagration-to-Detonation Transition) distrugge completamente la struttura. Entrambe si prevengono con la purgatura obbligatoria prima di ogni accensione."},
  {q:"Cosa si intende per viscosità in gradi Engler (°E)?",opts:["Unità di misura della temperatura di accensione","Rapporto tra il tempo di efflusso del combustibile e quello dell'acqua allo stesso strumento a 50°C — misura la viscosità dei combustibili liquidi","Unità di misura della densità relativa","Il grado di purezza del combustibile"],c:1,cat:"combustione",expl:"°E = tempo efflusso combustibile / tempo efflusso acqua a 50°C nel viscosimetro Engler. Target per buona atomizzazione: 3-5°E (~20-36 cSt). Nafta BTZ a 50°C: 7-15°E → preriscaldo a 60-80°C. Nafta ATZ densa: 15-40°E → preriscaldo a 90-120°C."},
  {q:"Qual è il tempo di avviamento tipico di una caldaia Cornovaglia da freddo?",opts:["5-10 minuti","2-3 ore","8-10 ore","30 minuti"],c:1,cat:"caldaie",expl:"La caldaia Cornovaglia richiede 2-3 ore da freddo per il grande volume d'acqua (inerzia termica elevata). La caldaia B&W a tubi d'acqua richiede solo 20-40 minuti per il piccolo volume. La caldaia monotobolure: 3-5 minuti. L'avviamento lento della Cornovaglia è un limite operativo importante."},
  {q:"Cos'è il surriscaldatore e dove è posizionato?",opts:["Scambiatore che preriscalda l'acqua di alimento","Fascio tubiero che porta il vapore saturo secco oltre T_sat a P costante — posizionato nelle zone più calde dei fumi (600-900°C), protetto dal naso refrattario","Dispositivo che abbassa la temperatura del vapore prodotto","Valvola che aumenta la pressione del vapore"],c:1,cat:"caldaie",expl:"Il surriscaldatore è nelle zone calde dei fumi perché serve una ΔT significativa tra fumi e vapore per il trasferimento di calore. Il naso refrattario schermata dall'irraggiamento diretto della fiamma (600 kW/m² a 1.400°C) che brucierebbe i tubi. Ogni 10°C di surriscaldamento aggiunge ~4,8 kcal/kg."},
  {q:"Cos'è il drum superiore (steam drum) nelle caldaie a tubi d'acqua?",opts:["Il collettore inferiore dove si accumulano i fanghi","Il collettore superiore che raccoglie l'acqua dai downcomer, la distribuisce ai riser e separa il vapore dall'acqua tramite cicloni interni — vapore X>0,99 in uscita","La camera di combustione superiore","Il serbatoio del combustibile"],c:1,cat:"caldaie",expl:"Il steam drum ha tre funzioni: ricevere l'acqua dai downcomer, distribuirla ai riser, separare vapore-acqua. La separazione avviene per gravità + cicloni centrifughi + demisters in rete metallica. Il titolo in uscita deve essere X>0,99 per evitare priming nelle utenze."},
  {q:"Cosa si intende per producibilità specifica di una caldaia?",opts:["La pressione massima di esercizio","Il rapporto tra produzione massima di vapore e superficie di riscaldamento in kg/m²·h — la superficie si misura sempre dal lato fumi","Il consumo di combustibile per ora","La portata massima della pompa di alimento"],c:1,cat:"caldaie",expl:"PS = W_max/A_riscaldamento [kg/m²·h]. Valori tipici: Cornovaglia 25-30, tre giri 30-50, B&W 20-100. Alta producibilità specifica → maggiore flusso termico → temperatura parete più alta → maggiore tendenza alle incrostazioni → acqua di qualità superiore richiesta."},
  {q:"Cos'è la caldaia a ritorno di fiamma?",opts:["Caldaia dove i fumi ritornano nel focolare","Caldaia a tubi di fumo con focolare a fondo cieco: i fumi invertono la direzione all'interno del focolare stesso, poi percorrono i tubi fumogeni — più compatta della tre giri","Caldaia dove il combustibile brucia in due stadi","Caldaia con bruciatore rivolto verso il basso"],c:1,cat:"caldaie",expl:"La caldaia a ritorno di fiamma ha la camera di inversione integrata nel focolare (no camera esterna). Più compatta della tre giri a parità di prestazioni. Molto diffusa nelle taglie 500 kg/h - 5 t/h. Meno comoda per la pulizia rispetto alla tre giri con camera di inversione posteriore separata."},
  {q:"Cosa sono i downcomer nelle caldaie a tubi d'acqua?",opts:["I tubi dove avviene la vaporizzazione","I tubi non riscaldati (lato freddo) dove l'acqua densa scende dal drum superiore al drum inferiore per effetto della gravità — motore della circolazione naturale","I tubi del surriscaldatore","I condotti dei fumi"],c:1,cat:"caldaie",expl:"Nei downcomer circola solo acqua liquida fredda e densa (ρ≈887 kg/m³ a 10 bar). Nei riser circola la miscela acqua-vapore calda e leggera (ρ≈500 kg/m³). La differenza di densità genera la forza motrice della circolazione naturale: circa 0,038 bar/m di altezza a 10 bar."},
  {q:"Come si definisce la circolazione La Mont?",opts:["Circolazione naturale per effetto di Archimede","Circolazione forzata con pompa La Mont che garantisce portata uniforme a tutti i riser — usata per caldaie ad alta pressione dove la circolazione naturale è insufficiente","Circolazione del combustibile nel bruciatore","Sistema di ricircolo dell'acqua di alimento"],c:1,cat:"caldaie",expl:"La circolazione La Mont è necessaria ad alte pressioni (>60 bar) perché la differenza di densità liquido/vapore diminuisce avvicinandosi al punto critico. La pompa garantisce portata minima in ogni tubo evitando il burn-out. In caso di guasto della pompa: fermata immediata obbligatoria."},
  {q:"Cos'è il LUVO (preriscaldatore d'aria)?",opts:["Un sistema di pulizia automatica dei tubi fumogeni","Scambiatore che recupera il calore residuo dei fumi per preriscaldare l'aria comburente — posizionato dopo l'economizzatore, ogni 10°C di preriscaldo aria = +0,5% rendimento","Un sistema di riduzione dei NOx","Un dispositivo per misurare la temperatura dei fumi"],c:1,cat:"caldaie",expl:"LUVO (Luftvorwärmer): posizionato nel percorso fumi dopo l'economizzatore (fumi ~200-300°C). Ogni 10°C di preriscaldo aria → +0,5% rendimento. Rischio: se i fumi scendono sotto il punto di rugiada nel LUVO si forma H₂SO₄ corrosiva. T_uscita fumi dal LUVO deve restare >punto di rugiada +20°C."},
  {q:"Qual è il pericolo principale se il livello scende sotto il minimo in una caldaia Cornovaglia?",opts:["La pressione sale bruscamente","Il focolare emerge dall'acqua → surriscaldamento a secco in pochi secondi → deformazione plastica del metallo → rottura esplosiva del focolare","Il vapore diventa umido","Il bruciatore si spegne automaticamente"],c:1,cat:"caldaie",expl:"La parete superiore del focolare (generatrice superiore) è la superficie più sollecitata. Senza acqua di raffreddamento, raggiunge 400-600°C in secondi con il bruciatore acceso. A queste temperature l'acciaio perde resistenza meccanica e la pressione interna ne causa la deformazione → rottura → esplosione con flash evaporation."},
  {q:"Cos'è il decapaggio chimico e quando si esegue?",opts:["La verniciatura esterna anticorrosione della caldaia","La rimozione delle incrostazioni interne con HCl 3-5% + inibitore di corrosione, seguita da passivazione — eseguita ogni 3-7 anni o quando il rendimento cala significativamente","La pulizia dei condotti fumi dalla fuliggine","La sostituzione delle guarnizioni delle flange"],c:1,cat:"caldaie",expl:"Decapaggio: circolazione HCl 3-5% + inibitore di corrosione a 60-70°C per 4-8h (scioglie CaCO₃ senza attaccare l'acciaio) → risciacquo → neutralizzazione alcalina → passivazione (con idrazina o Na₂SO₃ per formare magnetite protettiva). Da ditte specializzate. Payback: spesso <1 mese."},
  {q:"Cos'è la passivazione delle superfici interne?",opts:["La verniciatura anticorrosiva esterna","La formazione intenzionale di magnetite (Fe₃O₄) protettiva sulle superfici interne a pH 10-11 con O₂ basso: 3Fe + 4H₂O → Fe₃O₄ + 4H₂","La sterilizzazione chimica dell'acqua di caldaia","Il rivestimento in teflon delle superfici di scambio"],c:1,cat:"caldaie",expl:"La magnetite è uno strato aderente e impermeabile che protegge l'acciaio. Si forma spontaneamente in esercizio a pH 10-11 con O₂ basso. Si esegue intenzionalmente dopo decapaggio o prima della prima messa in servizio: acqua alcalina pH 11-12 + ossigeno scavenger a T progressive."},
