<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Segnalazioni — VaporeLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c18;--glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.1);--accent:#c0420a;--purple:#534AB7;
  --green:#1a7a3a;--text1:#f0f0f0;--text2:#b0b8c8;--text3:#606880;
  --adim:rgba(192,66,10,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text1);font-family:'Geist',sans-serif}

.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(8,12,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border)}
.back-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:8px 14px;border-radius:12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--glass2);color:var(--text1)}
.header-title{font-family:'Instrument Serif',serif;font-size:20px;flex:1}

.main{max-width:600px;margin:0 auto;padding:32px 18px 80px}

.intro{text-align:center;margin-bottom:36px}
.intro-icon{font-size:48px;margin-bottom:14px}
.intro-title{font-family:'Instrument Serif',serif;font-size:30px;margin-bottom:8px}
.intro-sub{color:var(--text3);font-size:14px;line-height:1.6}

.form-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:20px}

.field{display:flex;flex-direction:column;gap:8px}
.field-label{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-family:'Geist Mono',monospace}
.field-label span{color:var(--accent)}

select,textarea,input[type=text]{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--glass-border);
  border-radius:12px;
  color:var(--text1);
  font-family:'Geist',sans-serif;
  font-size:15px;
  padding:12px 14px;
  width:100%;
  outline:none;
  transition:.18s;
  -webkit-appearance:none;
}
select:focus,textarea:focus,input[type=text]:focus{border-color:var(--accent);background:rgba(255,255,255,0.08)}
select option{background:#0e1220;color:var(--text1)}
textarea{resize:vertical;min-height:120px;line-height:1.5}

/* SCREENSHOT UPLOAD */
.upload-area{border:2px dashed var(--glass-border);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-area:hover{border-color:var(--accent);background:var(--adim)}
.upload-area.has-file{border-color:rgba(74,222,128,0.5);background:rgba(26,122,58,0.1)}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-label{font-size:14px;color:var(--text2)}
.upload-sub{font-size:12px;color:var(--text3);margin-top:4px}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-preview{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:10px;margin-top:10px}
.file-preview img{width:48px;height:48px;object-fit:cover;border-radius:6px}
.file-preview-name{font-size:13px;color:#4ade80;flex:1}
.file-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}
.file-remove:hover{color:#f87171}

/* SUBMIT */
.btn-submit{width:100%;padding:16px;background:var(--accent);border:none;border-radius:16px;color:#fff;font-family:'Geist',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover:not(:disabled){opacity:.85}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.btn-submit .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{opacity:0.6}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUCCESS / ERROR */
.feedback{border-radius:14px;padding:16px 18px;font-size:14px;line-height:1.5;display:none;margin-top:4px}
.feedback.success{background:rgba(26,122,58,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80;display:block}
.feedback.error{background:rgba(220,38,38,0.1);border:1px solid rgba(248,113,113,0.4);color:#f87171;display:block}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← Home</a>
  <div class="header-title">📣 Segnalazioni</div>
</header>

<main class="main">

  <div class="intro">
    <div class="intro-icon">🔍</div>
    <div class="intro-title">Hai trovato un errore?</div>
    <div class="intro-sub">Segnala informazioni errate, imprecise o poco chiare.<br>Luca riceverà la tua segnalazione direttamente su Telegram.</div>
  </div>

  <div class="form-card">

    <div class="field">
      <label class="field-label">Modulo <span>*</span></label>
      <select id="sel-modulo">
        <option value="">— Seleziona il modulo —</option>
        <option value="Modulo 1 — Termodinamica del Vapore">Modulo 1 — Termodinamica del Vapore</option>
        <option value="Modulo 2 — Combustione e Combustibili">Modulo 2 — Combustione e Combustibili</option>
        <option value="Modulo 3 — Costruzione dei Generatori">Modulo 3 — Costruzione dei Generatori</option>
        <option value="Modulo 4 — Accessori e Sicurezze">Modulo 4 — Accessori e Sicurezze</option>
        <option value="Modulo 5 — Normativa e Legislazione">Modulo 5 — Normativa e Legislazione</option>
        <option value="Modulo 6 — Trattamento Acque">Modulo 6 — Trattamento Acque</option>
        <option value="Modulo 7 — Rendimento e Risparmio">Modulo 7 — Rendimento e Risparmio</option>
        <option value="Modulo 8 — Fisica Applicata">Modulo 8 — Fisica Applicata</option>
        <option value="Modulo 9 — Sicurezza sul Lavoro">Modulo 9 — Sicurezza sul Lavoro</option>
        <option value="Modulo 10 — Conduzione">Modulo 10 — Conduzione</option>
        <option value="Sezione Allenamento / Quiz">Sezione Allenamento / Quiz</option>
        <option value="Glossario">Glossario</option>
        <option value="Altro">Altro</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">Descrizione del problema <span>*</span></label>
      <textarea id="txt-desc" placeholder="Descrivi il problema nel modo più preciso possibile. Se conosci la risposta corretta, indicala qui." maxlength="1500"></textarea>
    </div>

    <div class="field">
      <label class="field-label">Screenshot <span style="color:var(--text3)">(opzionale)</span></label>
      <div class="upload-area" id="upload-area">
        <div class="upload-icon">📎</div>
        <div class="upload-label">Tocca per allegare uno screenshot</div>
        <div class="upload-sub">JPG, PNG — max 5 MB</div>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this)">
      </div>
      <div class="file-preview" id="file-preview" style="display:none">
        <img id="preview-img" src="" alt="">
        <span class="file-preview-name" id="preview-name"></span>
        <button class="file-remove" onclick="removeFile()">✕</button>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="inviaSegna()" disabled>
      <div class="spinner"></div>
      <span class="btn-text">📣 Invia segnalazione</span>
    </button>

    <div class="feedback" id="feedback"></div>

  </div>

</main>

<script>
const NTFY_CHANNEL = 'vaporelab-segnalazioni-8f3kq2zp19';

let selectedFile = null;

// Enable/disable submit based on required fields
function checkForm() {
  const modulo = document.getElementById('sel-modulo').value;
  const desc = document.getElementById('txt-desc').value.trim();
  document.getElementById('btn-submit').disabled = !(modulo && desc.length >= 10);
}
document.getElementById('sel-modulo').addEventListener('change', checkForm);
document.getElementById('txt-desc').addEventListener('input', checkForm);

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('Il file è troppo grande. Massimo 5 MB.');
    input.value = '';
    return;
  }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('upload-area').classList.add('has-file');
  };
  reader.readAsDataURL(file);
}

function removeFile() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-preview').style.display = 'none';
  document.getElementById('upload-area').classList.remove('has-file');
}

async function inviaSegna() {
  const modulo = document.getElementById('sel-modulo').value;
  const desc = document.getElementById('txt-desc').value.trim();
  const btn = document.getElementById('btn-submit');
  const feedback = document.getElementById('feedback');

  btn.classList.add('loading');
  btn.disabled = true;
  feedback.className = 'feedback';

  const testo = `🔔 *NUOVA SEGNALAZIONE — VaporeLab*\n\n📚 *Modulo:* ${modulo}\n\n📝 *Descrizione:*\n${desc}\n\n⏰ ${new Date().toLocaleString('it-IT')}`;

  try {
    const res = await fetch(`https://ntfy.sh/${NTFY_CHANNEL}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain; charset=utf-8',
        'Title': '🔔 Nuova segnalazione VaporeLab',
        'Priority': 'default',
        'Tags': 'warning,memo'
      },
      body: messaggio
    });
    if (!res.ok) throw new Error('Errore invio: ' + res.status);

    if (selectedFile) {
      try {
        await fetch(`https://ntfy.sh/${NTFY_CHANNEL}`, {
          method: 'POST',
          headers: {
            'Title': `📎 Screenshot — ${modulo}`,
            'Filename': selectedFile.name,
            'Content-Type': selectedFile.type
          },
          body: selectedFile
        });
      } catch(e) { /* screenshot non critico */ }
    }

        feedback.className = 'feedback success';
    feedback.textContent = '✅ Segnalazione inviata con successo! Luca la riceverà a breve.';
    document.getElementById('sel-modulo').value = '';
    document.getElementById('txt-desc').value = '';
    removeFile();
    checkForm();

  } catch (err) {
    feedback.className = 'feedback error';
    feedback.textContent = '❌ Errore nell\'invio: ' + err.message + '. Riprova o contatta Luca direttamente.';
  }

  btn.classList.remove('loading');
  checkForm();
}
</script>

</body>
</html>
